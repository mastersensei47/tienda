<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Pro</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#f5f5f5;
  --accent:#0a84ff;
  --green:#00c853;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111;
    --text:#fff;
    --card:#1e1e1e;
  }
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--accent);color:white;}
.cart-icon{position:relative;cursor:pointer;font-size:22px;}
.cart-count{position:absolute;top:-8px;right:-10px;background:red;color:white;font-size:12px;padding:3px 6px;border-radius:50%;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:20px;}
.card{background:var(--card);padding:15px;border-radius:10px;text-align:center;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:8px;}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;cursor:pointer;background:var(--accent);color:white;}
.promo{color:var(--green);font-weight:bold;}
.tachado{text-decoration:line-through;color:gray;}

#cartModal{position:fixed;top:0;right:-100%;width:350px;height:100%;background:var(--bg);box-shadow:-5px 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;overflow:auto;}
#cartModal.active{right:0;}
.close-cart{background:red;float:right;}

.qty-btn{padding:3px 8px;font-size:14px}

.admin-btn{
  position:fixed;bottom:15px;left:15px;width:40px;height:40px;
  background:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png') center/cover;
  opacity:.4;cursor:pointer;
}
.admin-panel{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg);padding:20px;border-radius:10px;width:420px;
  max-height:90vh;overflow:auto;box-shadow:0 0 20px rgba(0,0,0,.5);
}
.admin-item{
  background:var(--card);
  padding:8px;
  border-radius:6px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
input,select{width:100%;padding:6px;margin:4px 0;}
.whatsapp{background:#25D366;}
</style>
</head>
<body>

<header>
  <h2>Mi Tienda</h2>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span class="cart-count" id="cartCount">0</span>
  </div>
</header>

<div class="grid" id="productos"></div>

<div id="cartModal">
  <button class="close-cart" onclick="toggleCart()">X</button>
  <h3>Carrito</h3>
  <div id="cartItems"></div>

  <label>
    <input type="checkbox" id="envioCheck" onchange="actualizarCarrito()">
    Agregar envío (+$<span id="envioPrecioTexto"></span>)
  </label>

  <h3 id="total"></h3>

  <button class="whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
  <button onclick="confirmarCompra()">Confirmar Compra</button>
</div>

<div class="admin-btn" onclick="abrirAdmin()"></div>

<div class="admin-panel" id="adminPanel">
  <h3>Modo Admin</h3>
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="verificarAdmin()">Entrar</button>

  <div id="adminContent" style="display:none;">
    <hr>
    <input id="nombreInput" placeholder="Nombre">
    <input id="precioInput" type="number" placeholder="Precio normal">
    <input id="imagenInput" placeholder="URL Imagen">
    <input id="stockInput" type="number" placeholder="Stock">

    <select id="tipoPromo">
      <option value="">Sin promo</option>
      <option value="3x2">3x2</option>
      <option value="2precio">2 pagás menos</option>
    </select>

    <input id="precioEspecialInput" type="number" placeholder="Precio especial (precio por 2)">

    <button onclick="guardarProducto()">Guardar Producto</button>
    <button onclick="cerrarAdmin()">Cerrar</button>

    <hr>
    <div id="adminLista"></div>
  </div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let envioPrecio = Number(localStorage.getItem("envioPrecio")) || 500;
let editIndex = null;

document.getElementById("envioPrecioTexto").innerText = envioPrecio;

function guardarDatos(){
  localStorage.setItem("productos", JSON.stringify(productos));
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function toggleCart(){
  document.getElementById("cartModal").classList.toggle("active");
}

function calcularSubtotal(p, cantidad){
  let precioNormal = p.precio * cantidad;
  let subtotal = precioNormal;

  if(p.promo?.tipo==="2precio" && cantidad>=2){
    let pares=Math.floor(cantidad/2);
    let resto=cantidad%2;
    subtotal=(pares*p.promo.precioEspecial)+(resto*p.precio);
  }

  if(p.promo?.tipo==="3x2" && cantidad>=3){
    let grupos=Math.floor(cantidad/3);
    let resto=cantidad%3;
    subtotal=(grupos*(p.precio*2))+(resto*p.precio);
  }

  return {subtotal, precioNormal};
}

function actualizarCarrito(){
  cartItems.innerHTML="";
  let total=0;
  let ahorroTotal=0;
  let cantidadTotal=0;

  carrito.forEach((item,i)=>{
    let p=productos[item.index];
    let calc=calcularSubtotal(p,item.cantidad);
    let ahorro=calc.precioNormal-calc.subtotal;

    total+=calc.subtotal;
    ahorroTotal+=ahorro;
    cantidadTotal+=item.cantidad;

    cartItems.innerHTML+=`
    <div>
      <strong>${p.nombre}</strong><br>
      <button class="qty-btn" onclick="restar(${i})">−</button>
      ${item.cantidad}
      <button class="qty-btn" onclick="sumar(${i})">+</button><br>
      ${ahorro>0?
        `<span class="tachado">$${calc.precioNormal}</span><br>
         <span class="promo">$${calc.subtotal}</span><br>
         <small class="promo">Ahorrás $${ahorro}</small>`
        :`$${calc.subtotal}`
      }
      <hr>
    </div>`;
  });

  if(document.getElementById("envioCheck").checked){
    total+=envioPrecio;
  }

  totalDiv.innerHTML=`Total: $${total}
  ${ahorroTotal>0?`<br><span class="promo">Ahorro total: $${ahorroTotal}</span>`:""}`;

  cartCount.innerText=cantidadTotal;
}

function sumar(i){
  let item=carrito[i];
  if(item.cantidad < productos[item.index].stock){
    item.cantidad++;
  }
  guardarDatos();
  actualizarCarrito();
}

function restar(i){
  let item=carrito[i];
  item.cantidad--;
  if(item.cantidad<=0){
    carrito.splice(i,1);
  }
  guardarDatos();
  actualizarCarrito();
}

function agregarCarrito(i){
  let p=productos[i];
  if(p.stock<=0){alert("Sin stock");return;}
  let item=carrito.find(x=>x.index===i);
  if(item && item.cantidad<p.stock) item.cantidad++;
  else if(!item) carrito.push({index:i,cantidad:1});
  guardarDatos();
  actualizarCarrito();
}

function confirmarCompra(){
  carrito.forEach(item=>{
    productos[item.index].stock-=item.cantidad;
  });
  carrito=[];
  guardarDatos();
  renderProductos();
  actualizarCarrito();
  alert("Compra confirmada ✅");
}

function abrirAdmin(){adminPanel.style.display="block";}
function cerrarAdmin(){adminPanel.style.display="none";}

function verificarAdmin(){
  if(adminPass.value==="1234"){
    document.getElementById("adminContent").style.display="block";
    renderAdmin();
  } else alert("Contraseña incorrecta");
}

function guardarProducto(){
  let promo=null;

  if(tipoPromo.value==="3x2") promo={tipo:"3x2"};
  if(tipoPromo.value==="2precio") promo={tipo:"2precio",precioEspecial:Number(precioEspecialInput.value)};

  let nuevo={
    nombre:nombreInput.value,
    precio:Number(precioInput.value),
    imagen:imagenInput.value,
    stock:Number(stockInput.value),
    promo
  };

  if(editIndex!==null){
    productos[editIndex]=nuevo;
    editIndex=null;
  } else {
    productos.push(nuevo);
  }

  nombreInput.value="";
  precioInput.value="";
  imagenInput.value="";
  stockInput.value="";
  precioEspecialInput.value="";
  tipoPromo.value="";

  guardarDatos();
  renderProductos();
}

function renderProductos(){
  productosDiv.innerHTML="";
  productos.forEach((p,i)=>{
    let promoTexto="";
    if(p.promo?.tipo==="3x2") promoTexto="🎁 3x2";
    if(p.promo?.tipo==="2precio") promoTexto=`2x $${p.promo.precioEspecial}`;

    productosDiv.innerHTML+=`
    <div class="card">
      <img src="${p.imagen}">
      <h4>${p.nombre}</h4>
      <p>$${p.precio}</p>
      ${promoTexto?`<p class="promo">${promoTexto}</p>`:""}
      <p>Stock: ${p.stock}</p>
      <button onclick="agregarCarrito(${i})">Agregar</button>
    </div>`;
  });
  renderAdmin();
}

function renderAdmin(){
  adminLista.innerHTML="";
  productos.forEach((p,i)=>{
    adminLista.innerHTML+=`
      <div class="admin-item">
        <div>
          ${p.nombre}<br>
          <small>Stock: ${p.stock}</small>
        </div>
        <div>
          <button onclick="editarProducto(${i})">✏</button>
          <button onclick="eliminarProducto(${i})">🗑</button>
        </div>
      </div>`;
  });
}

function editarProducto(i){
  let p=productos[i];
  nombreInput.value=p.nombre;
  precioInput.value=p.precio;
  imagenInput.value=p.imagen;
  stockInput.value=p.stock;
  editIndex=i;
}

function eliminarProducto(i){
  productos.splice(i,1);
  guardarDatos();
  renderProductos();
}

renderProductos();
actualizarCarrito();
</script>

</body>
</html>
