<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
            --img-bg: rgba(255,255,255,0.05);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9; --img-bg: #ffffff;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(128,128,128,0.1);
            height: 90px; box-sizing: border-box; 
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .main-logo { height: 70px; width: auto; object-fit: contain; filter: drop-shadow(0 0 8px var(--accent)); }
        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; display: flex; align-items: center; padding: 8px; border-radius: 50%; }

        .hero {
            height: 30vh; min-height: 200px;
            background: linear-gradient(rgba(15,23,42,0.7), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1500&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px; max-width: 900px; margin: -30px auto 30px; position: relative; z-index: 10; }
        .cat-card { background: var(--card); padding: 15px 5px; border-radius: var(--radius); text-align: center; cursor: pointer; border: 1px solid rgba(128,128,128,0.2); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .cat-card:hover, .cat-card.active { transform: translateY(-5px); border-color: var(--accent); background: var(--accent); color: white; }
        .cat-card span { font-size: 20px; display: block; margin-bottom: 5px; }
        .cat-card b { font-size: 10px; text-transform: uppercase; }

        .search-container { max-width: 600px; margin: 0 auto 20px; padding: 0 15px; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; font-size: 16px; outline: none; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; } }
        
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: var(--promo); color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; }
        .stock-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 9px; padding: 3px 6px; border-radius: 4px; z-index: 5; }
        
        .img-box { background: var(--img-bg); width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { margin: 0 0 8px; font-size: 14px; font-weight: 600; height: 34px; overflow: hidden; }
        .price-val { font-size: 22px; font-weight: 800; color: var(--accent); }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: auto; }

        .drawer { position: fixed; top: 0; width: 85%; max-width: 350px; height: 100%; background: var(--card); transition: 0.4s; z-index: 5000; padding: 25px; box-shadow: 0 0 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; box-sizing: border-box; }
        #infoDrawer { left: -100%; } #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; } #cartDrawer.active { right: 0; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; z-index: 4000; }
        .overlay.active { display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 15px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; box-sizing: border-box; outline: none; }

        /* ADMIN TABS */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; border: none; color: white; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); }

        .admin-item { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-actions { display: flex; gap: 8px; margin-left: auto; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" alt="Logo" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:10px; padding:2px 6px; border-radius:10px; position:absolute; top:0; right:0">0</b></div>
    </div>
</header>

<div class="products-grid" id="productsCont" style="padding-top:20px"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <h2 style="color:var(--accent)">Mi Cuenta</h2>
    <div id="userBadge" style="display:none; color:var(--success); font-weight:800; margin-bottom:20px">✓ MAYORISTA ACTIVO</div>
    <p>¿Sos comerciante? Registrate para ver precios mayoristas.</p>
    <button class="btn-add" onclick="abrirModal('regModal')">CREAR CUENTA</button>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:12px; border-radius:10px; width:100%; cursor:pointer; margin-top:auto">Cerrar Sesión</button>
</div>

<div class="modal" id="regModal">
    <div class="modal-content" style="max-width:400px">
        <h2>Solicitud Mayorista</h2>
        <input id="regUser" placeholder="Nombre de Usuario">
        <input id="regPass" type="password" placeholder="Contraseña">
        <input id="regTel" placeholder="WhatsApp (sin 0 ni 15)">
        <button class="btn-add" style="width:100%; margin-top:15px" onclick="crearCuenta()">ENVIAR SOLICITUD</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-prods')">Productos</button>
            <button class="tab-btn" onclick="switchTab('tab-users')">Usuarios</button>
            <button class="tab-btn" onclick="switchTab('tab-orders')">Historial</button>
        </div>

        <div id="tab-prods" class="admin-tab-content">
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:18px; margin-bottom:20px">
                <input type="hidden" id="editId">
                <input id="fNom" placeholder="Nombre">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <input id="fPre" type="number" placeholder="Precio Público">
                    <input id="fPreM" type="number" placeholder="Precio Mayor">
                </div>
                <input id="fPromo" placeholder="Promo Lógica (ej: 3x2 o 2x5000)">
                <input id="fImg" placeholder="Link Imagen">
                <input id="fStock" type="number" placeholder="Stock">
                <button class="btn-add" style="width:100%; background:var(--success)" onclick="guardarProducto()">GUARDAR</button>
            </div>
            <div id="adminProdsList"></div>
        </div>

        <div id="tab-users" class="admin-tab-content" style="display:none">
            <h3>Solicitudes de Cuenta</h3>
            <div id="adminUsersList"></div>
        </div>

        <div id="tab-orders" class="admin-tab-content" style="display:none">
            <h3>Últimos Pedidos</h3>
            <div id="adminOrdersList"></div>
        </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h2>Ingresar</h2>
        <input id="userInp" placeholder="Usuario">
        <input id="passInp" type="password" placeholder="Contraseña">
        <button class="btn-add" style="width:100%" onclick="checkLogin()">ENTRAR</button>
    </div>
</div>

<div id="cartDrawer" class="drawer">
    <h2>Mi Pedido</h2>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto"></div>
    <div id="cartTotalText" style="font-weight:800; font-size:20px; color:var(--accent); margin:15px 0">Total: $0</div>
    <button class="btn-add" style="width:100%; background:#25d366" onclick="finalizarPedido()">ENVIAR POR WHATSAPP</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [], usuarios = [], pedidos = [];
    let esMayorista = localStorage.getItem("ms47_may") === "true";

    // CARGA DE DATOS REAL-TIME
    db.collection("productos").onSnapshot(s => { productos = s.docs.map(d => ({id:d.id, ...d.data()})); render(); renderAdminProds(); });
    db.collection("usuarios").onSnapshot(s => { usuarios = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdminUsers(); });
    db.collection("pedidos").orderBy("fecha", "desc").limit(20).onSnapshot(s => { pedidos = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdminOrders(); });

    function render() {
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <h4 class="product-title">${p.nombre}</h4>
                    <div class="price-val">$${esMayorista ? p.precio_may : p.precio}</div>
                    <button class="btn-add" onclick="addToCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
    }

    // LÓGICA DE PROMOS Y TOTALES
    function updateCartUI() {
        let total = 0;
        const list = document.getElementById("cartItemsList");
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            let precioUnitario = esMayorista ? p.precio_may : p.precio;
            let subtotal = precioUnitario * it.qty;

            // APLICAR PROMO SI EXISTE (Ej: 3x2 o 2x5000)
            if(p.promo && p.promo.toLowerCase().includes('x')) {
                const parts = p.promo.toLowerCase().split('x');
                const cantPromo = parseInt(parts[0]);
                const valorPromo = parseInt(parts[1]);

                if(it.qty >= cantPromo) {
                    if(p.promo.includes('$')) { // Caso 2x5000
                        const grupos = Math.floor(it.qty / cantPromo);
                        const resto = it.qty % cantPromo;
                        subtotal = (grupos * valorPromo) + (resto * precioUnitario);
                    } else { // Caso 3x2 (lleva 3 paga 2)
                        const grupos = Math.floor(it.qty / cantPromo);
                        const resto = it.qty % cantPromo;
                        subtotal = (grupos * valorPromo * precioUnitario) + (resto * precioUnitario);
                    }
                }
            }
            total += subtotal;
            return `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05)">
                <b>${p.nombre}</b> x${it.qty} = $${subtotal}
            </div>`;
        }).join("");
        document.getElementById("cartTotalText").innerText = "Total: $" + total;
        document.getElementById("cartCount").innerText = carrito.reduce((a,b) => a + b.qty, 0);
    }

    async function finalizarPedido() {
        if(carrito.length === 0) return;
        const totalStr = document.getElementById("cartTotalText").innerText;
        await db.collection("pedidos").add({
            items: carrito.map(it => ({nom: productos.find(p=>p.id===it.id).nombre, qty: it.qty})),
            total: totalStr,
            fecha: new Date().getTime()
        });
        // Aquí iría el window.open de WhatsApp (mismo que antes)
        alert("Pedido guardado e iniciando WhatsApp...");
        toggleCart();
    }

    // GESTIÓN DE CUENTAS
    async function crearCuenta() {
        const u = document.getElementById("regUser").value;
        const p = document.getElementById("regPass").value;
        if(!u || !p) return alert("Faltan datos");
        await db.collection("usuarios").add({ user: u, pass: p, activo: false, tel: document.getElementById("regTel").value });
        alert("Solicitud enviada. Espera a que el admin te habilite.");
        closeAll();
    }

    async function checkLogin() {
        const u = document.getElementById("userInp").value;
        const p = document.getElementById("passInp").value;
        if(u === "admin" && p === "admin") return verificarAdmin();
        const user = usuarios.find(x => x.user === u && x.pass === p);
        if(user) {
            if(user.activo) {
                localStorage.setItem("ms47_may", "true");
                location.reload();
            } else alert("Tu cuenta aún no ha sido aprobada.");
        } else alert("Usuario no encontrado.");
    }

    // PANEL ADMIN TABS Y RENDER
    function switchTab(id) {
        document.querySelectorAll('.admin-tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.target.classList.add('active');
    }

    function renderAdminUsers() {
        const cont = document.getElementById("adminUsersList");
        cont.innerHTML = usuarios.map(u => `
            <div class="admin-item">
                <div class="admin-item-info"><b>${u.user}</b> <span>Tel: ${u.tel}</span></div>
                <div class="admin-actions">
                    ${u.activo ? '<span class="badge" style="background:var(--success)">ACTIVO</span>' : 
                    `<button class="tab-btn" style="background:var(--success)" onclick="aprobarUser('${u.id}', true)">Aprobar</button>`}
                    <button class="tab-btn" style="background:var(--danger)" onclick="borrarDoc('usuarios','${u.id}')">Eliminar</button>
                </div>
            </div>`).join("");
    }

    function renderAdminOrders() {
        const cont = document.getElementById("adminOrdersList");
        cont.innerHTML = pedidos.map(o => `
            <div class="admin-item" style="flex-direction:column; align-items:flex-start">
                <div style="display:flex; justify-content:space-between; width:100%">
                    <b>${o.total}</b> <small>${new Date(o.fecha).toLocaleDateString()}</small>
                </div>
                <div style="font-size:11px; opacity:0.7">${o.items.map(i => i.nom + " (x"+i.qty+")").join(", ")}</div>
            </div>`).join("");
    }

    // ACCIONES ADMIN
    async function aprobarUser(id, val) { await db.collection("usuarios").doc(id).update({activo: val}); }
    async function borrarDoc(col, id) { if(confirm("¿Seguro?")) await db.collection(col).doc(id).delete(); }
    function logout() { localStorage.removeItem("ms47_may"); location.reload(); }
    function addToCart(id) {
        const ex = carrito.find(c => c.id === id);
        if(ex) ex.qty++; else carrito.push({id, qty:1});
        updateCartUI();
    }
    function closeAll() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active")); document.getElementById("mainOverlay").classList.remove("active"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function verificarAdmin() { abrirModal("adminModal"); }
    function toggleTheme() { document.body.classList.toggle("light"); }

    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = { 
            nombre: document.getElementById("fNom").value, 
            precio: Number(document.getElementById("fPre").value), 
            precio_may: Number(document.getElementById("fPreM").value),
            promo: document.getElementById("fPromo").value,
            stock: Number(document.getElementById("fStock").value), 
            imagen: document.getElementById("fImg").value 
        };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        alert("Guardado");
    }

    function renderAdminProds() {
        document.getElementById("adminProdsList").innerHTML = productos.map(p => `
            <div class="admin-item">
                <b>${p.nombre}</b>
                <div class="admin-actions">
                    <button class="tab-btn" onclick="editP('${p.id}')">✏️</button>
                    <button class="tab-btn" style="color:var(--danger)" onclick="borrarDoc('productos','${p.id}')">🗑️</button>
                </div>
            </div>`).join("");
    }

    function editP(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("editId").value = p.id;
        document.getElementById("fNom").value = p.nombre;
        document.getElementById("fPre").value = p.precio;
        document.getElementById("fPreM").value = p.precio_may;
        document.getElementById("fPromo").value = p.promo || "";
        document.getElementById("fStock").value = p.stock;
        document.getElementById("fImg").value = p.imagen;
    }
</script>
</body>
</html>
