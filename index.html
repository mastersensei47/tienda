<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda PRO</title>

<style>
/* 🎨 TU DISEÑO ORIGINAL — NO MODIFICADO */
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111;
--accent:#2563eb;
--accent2:#9333ea;
--shadow:0 15px 40px rgba(0,0,0,.1);
}
body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#22d3ee;
--accent2:#f43f5e;
--shadow:0 20px 60px rgba(0,0,0,.6);
}
body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* ===== SIDEBAR AGREGADO (SIN ROMPER TU ESTÉTICA) ===== */

body{
display:flex;
}

.sidebar-new{
width:230px;
background:var(--card);
box-shadow:var(--shadow);
height:100vh;
position:fixed;
left:0;
top:0;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.3s;
z-index:1200;
}

.sidebar-new.collapsed{
width:75px;
}

.sidebar-header{
display:flex;
align-items:center;
gap:10px;
padding:20px;
}

.sidebar-header img{
width:40px;
height:40px;
object-fit:contain;
}

.sidebar-header span{
font-weight:700;
font-size:16px;
}

.sidebar-new.collapsed .sidebar-header span{
display:none;
}

.sidebar-menu div{
padding:12px 20px;
cursor:pointer;
transition:.2s;
}

.sidebar-menu div:hover{
background:rgba(0,0,0,.05);
}

.sidebar-new.collapsed .sidebar-menu span{
display:none;
}

.sidebar-footer{
padding:15px;
font-size:14px;
border-top:1px solid rgba(0,0,0,.05);
}

.sidebar-new.collapsed .sidebar-footer{
display:none;
}

.sidebar-toggle{
position:absolute;
top:15px;
right:-15px;
background:var(--accent);
color:#fff;
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:bold;
}

/* ===== EMPUJE CONTENIDO ===== */

.main-wrapper{
margin-left:230px;
width:100%;
transition:.3s;
}

.sidebar-new.collapsed ~ .main-wrapper{
margin-left:75px;
}

/* ===== TU HEADER ORIGINAL ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:var(--card);
box-shadow:var(--shadow);
position:sticky;
top:0;
z-index:1000;
}
.logo{
font-weight:700;
font-size:20px;
background:linear-gradient(45deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}
.icon{cursor:pointer;font-size:22px;margin-left:15px;position:relative;}
.cart-count{
position:absolute;top:-6px;right:-10px;
background:var(--accent2);color:#fff;font-size:11px;
padding:3px 6px;border-radius:50%;
}

/* ===== RESTO DE TU DISEÑO ORIGINAL ===== */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
padding:25px;
}
.card{
background:var(--card);
padding:15px;
border-radius:15px;
box-shadow:var(--shadow);
transition:.3s;
}
.card:hover{transform:translateY(-5px)}
.card img{
width:100%;height:180px;object-fit:cover;border-radius:12px;
}
.promo-badge{
background:linear-gradient(45deg,var(--accent),var(--accent2));
color:#fff;font-size:11px;padding:3px 6px;border-radius:6px;margin:3px 3px 0 0;
display:inline-block;
}
button{
background:linear-gradient(45deg,var(--accent),var(--accent2));
border:none;color:#fff;padding:6px 10px;border-radius:6px;
cursor:pointer;margin-top:5px;
}
.drawer{
position:fixed;right:-400px;top:0;width:350px;height:100%;
background:var(--card);box-shadow:var(--shadow);
padding:20px;transition:.4s;overflow:auto;z-index:2000;
}
.drawer.open{right:0}
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,.5);
display:none;z-index:1500;
}
.overlay.show{display:block}
.cart-item{
display:flex;justify-content:space-between;
align-items:center;margin-bottom:8px;
}
.admin-panel{
position:fixed;inset:0;background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center;z-index:3000;
}
.admin-box{
background:var(--card);padding:25px;border-radius:15px;
width:95%;max-width:900px;max-height:90%;overflow:auto;
}
.tab-buttons button{margin-right:5px;}
.tab{display:none;}
.tab.active{display:block;}
input,select{
width:100%;padding:6px;margin-bottom:6px;
border-radius:6px;border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- ===== SIDEBAR NUEVO ===== -->

<div class="sidebar-new" id="sidebarNew">

<div>
<div class="sidebar-header">
<img src="logo.png">
<span>Mi Tienda</span>
</div>

<div class="sidebar-menu">
<div onclick="window.scrollTo(0,0)">Inicio</div>
<div onclick="openCart()">Carrito</div>
<div onclick="openAdmin()">Admin</div>
</div>
</div>

<div class="sidebar-footer">
Contacto:<br>
+54 9 343 4508948
</div>

<div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>
</div>

<!-- ===== ENVUELVE TODO TU CONTENIDO ===== -->

<div class="main-wrapper">

<header>
<div class="logo">Mi Tienda</div>
<div>
<span class="icon" onclick="toggleDark()">🌗</span>
<span class="icon" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></span>
<span class="icon" onclick="openAdmin()">⚙</span>
</div>
</header>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
<h2>Carrito</h2>
<div id="cartItems"></div>
<hr>

<select id="tipoEntrega" onchange="mostrarFormulario()">
<option value="local">Retiro en local</option>
<option value="envio">Envío</option>
</select>

<div id="formEnvio" style="display:none;">
<input id="nombreEnvio" placeholder="Nombre">
<input id="direccionEnvio" placeholder="Dirección">
<input id="telefonoEnvio" placeholder="Teléfono">
</div>

<p>Total: $<span id="total">0</span></p>
<p id="ahorro" style="color:green"></p>

<button onclick="hacerPedido()">Hacer Pedido</button>
<button onclick="closeCart()">Cerrar</button>
</div>

<!-- TU PANEL ADMIN ORIGINAL SIGUE IGUAL (NO TOCADO) -->
<!-- ... TODO TU SCRIPT ORIGINAL SIGUE IGUAL ... -->

</div>

<script>
function toggleSidebar(){
document.getElementById("sidebarNew").classList.toggle("collapsed")
}
</script>

<!-- PEGA AQUÍ TODO TU SCRIPT ORIGINAL COMPLETO SIN CAMBIOS -->

</body>
</html>
