<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Repuestos - Full</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #2563eb; --sidebar-bg: #1e40af;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.light {
            --bg: #f4f6f9; --card: #ffffff; --text: #111; --sidebar-bg: #2563eb;
        }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); transition:.3s; overflow-x: hidden; }
        
        /* HEADER */
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:15px 25px; background:var(--card); box-shadow:var(--shadow); 
            position:sticky; top:0; z-index:1000; 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .icon { cursor:pointer; font-size:22px; position: relative; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar-bg); color: white; transition: 0.3s;
            z-index: 2000; padding-top: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* CARRITO LATERAL */
        .cart-drawer {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--card); transition: 0.3s; z-index: 2000; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .cart-drawer.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        /* GRID PRODUCTOS */
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:25px; }
        .card { background:var(--card); padding:15px; border-radius:15px; text-align:center; box-shadow: var(--shadow); }
        .card img { width:100%; height:140px; object-fit:contain; border-radius:10px; }
        .price-tag { font-weight: bold; color: var(--accent); font-size: 1.1em; margin: 8px 0; }
        .promo-tag { color: #059669; font-size: 0.85em; margin-bottom: 10px; display: block; }

        /* UI */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.show { display: block; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-wa { background: #25d366; margin-top: 10px; }
        
        #adminPanel { background: var(--card); display: none; padding: 20px; border: 2px solid var(--accent); margin: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.2); color: inherit; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span style="cursor:pointer; font-size: 25px;" onclick="toggleSidebar()">☰</span>
        <div style="font-weight:bold">REPUESTOS PRO</div>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span class="icon" onclick="toggleLightMode()">🌗</span>
        <span class="icon" onclick="toggleCart()">🛒 <span id="cartCount" class="badge">0</span></span>
        <span class="icon" onclick="document.getElementById('loginModal').style.display='flex'">👤</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav class="sidebar" id="sidebar">
    <div style="padding: 20px; font-weight: bold;">MENÚ</div>
    <a href="#" onclick="closeAll()">🏠 Inicio</a>
    <a href="#" onclick="openAdmin()">🔑 Administrador</a>
    <a href="https://instagram.com" target="_blank">📸 Instagram</a>
</nav>

<div class="cart-drawer" id="cartDrawer">
    <h3>Mi Pedido</h3>
    <div class="cart-items" id="cartList"></div>
    <div style="border-top: 2px solid var(--accent); padding-top: 15px;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size: 1.2em;">
            <span>Total:</span>
            <span id="cartTotal">$0</span>
        </div>
        <button class="btn-wa" onclick="enviarWhatsApp()">Confirmar por WhatsApp</button>
        <button onclick="toggleCart()" style="background:none; color:var(--text); margin-top:5px;">Continuar Comprando</button>
    </div>
</div>

<main>
    <div id="adminPanel">
        <h3>Panel Admin</h3>
        <input id="n" placeholder="Nombre">
        <input id="p_ind" type="number" placeholder="Precio Unidad">
        <input id="p_x2" type="number" placeholder="Precio x2">
        <input id="p_may" type="number" placeholder="Precio Mayorista">
        <input id="stock" type="number" placeholder="Stock">
        <input id="img" placeholder="URL Imagen">
        <button onclick="guardar()">Guardar Producto</button>
        <div id="listaAdmin" style="margin-top:15px; max-height: 150px; overflow-y:auto;"></div>
    </div>
    <div class="products" id="products"></div>
</main>

<div class="modal" id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center;">
    <div style="background:var(--card); padding:30px; border-radius:15px; width:300px; text-align:center;">
        <h3>Mayoristas</h3>
        <input id="user" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Pass">
        <button onclick="login()">Entrar</button>
        <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; margin-top:10px;">Cerrar</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let cart = [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

    function render() {
        const container = document.getElementById("products");
        container.innerHTML = products.map((p, i) => `
            <div class="card">
                <img src="${p.img || 'https://via.placeholder.com/150'}">
                <h4>${p.name}</h4>
                <div class="price-tag">$${p.p_ind}</div>
                ${p.p_x2 > 0 ? `<div class="promo-tag">Promo 2 unidades: $${p.p_x2}</div>` : ''}
                ${currentUser ? `<div style="background:#fef3c7; color:#92400e; font-size:11px; padding:2px; border-radius:4px">Mayorista: $${p.p_may}</div>` : ''}
                <button onclick="addToCart(${i})" style="margin-top:10px;">Añadir al carrito</button>
            </div>
        `).join("");
    }

    // --- LÓGICA DEL CARRITO ---
    function addToCart(index) {
        const prod = products[index];
        const item = cart.find(c => c.id === index);
        if (item) item.qty++;
        else cart.push({ id: index, qty: 1 });
        updateCartUI();
        if(window.innerWidth > 768) toggleCart(); // Abre carrito en PC
    }

    function updateCartUI() {
        const list = document.getElementById("cartList");
        const totalEl = document.getElementById("cartTotal");
        const countEl = document.getElementById("cartCount");
        let total = 0;
        let count = 0;

        list.innerHTML = cart.map((item, idx) => {
            const p = products[item.id];
            let subtotal = 0;
            
            // Lógica de Precios (Normal vs Promo x2)
            if (p.p_x2 > 0 && item.qty >= 2) {
                let pares = Math.floor(item.qty / 2);
                let sueltos = item.qty % 2;
                subtotal = (pares * p.p_x2) + (sueltos * p.p_ind);
            } else {
                subtotal = item.qty * p.p_ind;
            }

            total += subtotal;
            count += item.qty;

            return `
                <div class="cart-item">
                    <div><b>${p.name}</b><br><small>Cant: ${item.qty}</small></div>
                    <div style="text-align:right">
                        <b>$${subtotal}</b><br>
                        <span onclick="removeFromCart(${idx})" style="color:red; cursor:pointer; font-size:12px">Quitar</span>
                    </div>
                </div>`;
        }).join("");

        totalEl.innerText = "$" + total;
        countEl.innerText = count;
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCartUI();
    }

    function enviarWhatsApp() {
        if(cart.length === 0) return alert("Carrito vacío");
        let msg = "Hola! Quiero realizar el siguiente pedido:\n\n";
        cart.forEach(item => {
            const p = products[item.id];
            msg += `• ${p.name} (x${item.qty})\n`;
        });
        msg += `\n*Total a pagar: ${document.getElementById("cartTotal").innerText}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // --- UI & ADMIN ---
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("show"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("overlay").classList.toggle("show"); }
    function closeAll() { 
        document.getElementById("sidebar").classList.remove("active"); 
        document.getElementById("cartDrawer").classList.remove("active"); 
        document.getElementById("overlay").classList.remove("show"); 
    }
    function toggleLightMode() { document.body.classList.toggle("light"); }
    
    function openAdmin() {
        closeAll();
        if(prompt("Pass:") === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            cargarAdmin();
        }
    }

    function guardar() {
        products.push({
            name: document.getElementById("n").value,
            p_ind: parseInt(document.getElementById("p_ind").value) || 0,
            p_x2: parseInt(document.getElementById("p_x2").value) || 0,
            p_may: parseInt(document.getElementById("p_may").value) || 0,
            stock: parseInt(document.getElementById("stock").value) || 0,
            img: document.getElementById("img").value
        });
        localStorage.setItem("products", JSON.stringify(products));
        render(); cargarAdmin();
    }

    function cargarAdmin() {
        document.getElementById("listaAdmin").innerHTML = products.map((p, i) => `
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px">
                ${p.name} <span onclick="products.splice(${i},1); localStorage.setItem('products', JSON.stringify(products)); render(); cargarAdmin();" style="color:red; cursor:pointer">Eliminar</span>
            </div>
        `).join("");
    }

    function login() {
        // Lógica simplificada de login para que no falle
        currentUser = { user: document.getElementById("user").value };
        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        location.reload();
    }

    render();
</script>
</body>
</html>
