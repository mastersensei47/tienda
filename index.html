<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO - NEO REPUESTOS (Oficial)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #2563eb;
            --sidebar-bg: #1e40af; --success: #10b981; --promo: #f59e0b;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.light {
            --bg: #f4f6f9; --card: #ffffff; --text: #111; --sidebar-bg: #2563eb;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition:0.3s; overflow-x: hidden; }
        
        /* HEADER */
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 20px; background:var(--card); box-shadow:var(--shadow); 
            position:sticky; top:0; z-index:1000; height: 60px;
        }
        .search-bar { flex-grow: 1; max-width: 350px; margin: 0 15px; }
        .search-bar input {
            width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid #444;
            background: rgba(0,0,0,0.1); color: inherit; outline: none;
        }

        /* SIDEBAR */
        .sidebar { 
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%; 
            background: var(--sidebar-bg); color: white; transition: 0.3s; z-index: 2000;
            padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 0; color: white; text-decoration: none; border-bottom: 1px solid #ffffff22; }

        /* PRODUCTOS */
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:15px; text-align:center; position:relative; box-shadow: var(--shadow); transition: 0.3s; }
        .card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .promo-tag { position:absolute; top:10px; right:10px; background:var(--promo); color:#000; font-size:10px; font-weight:bold; padding:3px 8px; border-radius:5px; }

        /* CARRITO */
        .cart-drawer {
            position: fixed; right: -380px; top: 0; width: 340px; height: 100%;
            background: var(--card); transition: 0.3s; z-index: 3000; padding: 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; box-sizing: border-box;
        }
        .cart-drawer.active { right: 0; }
        .cart-list { flex-grow: 1; overflow-y: auto; margin: 15px 0; }
        .qty-ctrl { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 8px; }
        .qty-btn { background: var(--accent); color: white; border: none; width: 25px; height: 25px; cursor: pointer; border-radius: 4px; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.1); color: inherit; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-accent { background: var(--accent); color: white; margin-top: 10px; }
        .btn-wa { background: #25d366; color: white; margin-top: 10px; font-size: 16px; }

        /* LOGISTICA */
        .shipping-info { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.active { display: block; }
        .user-badge { background: var(--success); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px">
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">☰</span>
        <b onclick="location.reload()" style="cursor:pointer">NEO REPUESTOS</b>
    </div>
    <div class="search-bar"><input type="text" id="busq" placeholder="Buscar..." onkeyup="render()"></div>
    <div style="display:flex; gap:15px; align-items:center">
        <span onclick="toggleMode()" style="cursor:pointer">🌗</span>
        <span onclick="abrirModal('loginModal')" id="userIcon">👤</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">🔑</span>
        <div onclick="toggleCart()" style="cursor:pointer; position:relative">
            🛒 <b id="cartCount" style="position:absolute; top:-10px; right:-10px; background:red; color:white; font-size:10px; padding:2px 6px; border-radius:50%">0</b>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav class="sidebar" id="sidebar">
    <h3>MENU</h3>
    <a href="#" onclick="closeAll()">🏠 Inicio</a>
    <a href="#" onclick="abrirModal('loginModal')">👤 Mi Perfil Mayorista</a>
    <a href="https://wa.me/5493434508948">💬 WhatsApp Directo</a>
</nav>

<div class="products" id="productsCont"></div>

<div class="cart-drawer" id="cartDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h3>Tu Pedido</h3> <span onclick="toggleCart()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div class="cart-list" id="cartList"></div>
    
    <div style="border-top:1px solid #444; padding-top:10px">
        <div id="cartTotal" style="font-size:18px; font-weight:bold">Total: $0</div>
        <div id="ahorroMsg" style="color:var(--success); font-size:12px; margin-bottom:10px"></div>
        
        <label>Forma de entrega:</label>
        <select id="tipoEntrega" onchange="toggleEnvio()">
            <option value="retiro">Retiro por el Local</option>
            <option value="envio">Envío a Domicilio</option>
        </select>

        <div id="envioForm" class="shipping-info">
            <input id="formNom" placeholder="Nombre completo">
            <input id="formDir" placeholder="Dirección y Ciudad">
            <input id="formTel" placeholder="Teléfono de contacto">
            <textarea id="formObs" placeholder="Aclaraciones extras..."></textarea>
        </div>

        <button class="btn-wa" onclick="confirmarPedido()">Enviar Pedido (WhatsApp)</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h3 id="loginTitle">Acceso Mayorista</h3>
        <div id="loginInputs">
            <input id="user" placeholder="Usuario">
            <input id="pass" type="password" placeholder="Contraseña">
            <button class="btn-accent" onclick="intentarLogin()">Ingresar</button>
        </div>
        <div id="loginSuccess" style="display:none">
            <p>✅ Sesión Mayorista Iniciada</p>
            <button onclick="logout()" style="background:#ef4444; color:white">Cerrar Sesión</button>
        </div>
        <button onclick="cerrarModales()" style="background:none; color:inherit; margin-top:10px">Cerrar</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <span onclick="cerrarModales()" style="float:right; cursor:pointer">✕</span>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button onclick="showTab('add')">📦 Agregar</button>
            <button onclick="showTab('list')">📋 Lista</button>
        </div>
        <div id="tabAdd">
            <input type="hidden" id="editId">
            <input id="n" placeholder="Nombre">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px">
                <input id="p" type="number" placeholder="Precio Min.">
                <input id="pm" type="number" placeholder="Precio May.">
                <input id="st" type="number" placeholder="Stock">
            </div>
            <select id="promo" onchange="checkPack()">
                <option value="">Sin Promo</option>
                <option value="2x1">2x1</option>
                <option value="3x2">3x2</option>
                <option value="pack">Pack x2 (Especial)</option>
            </select>
            <input id="ppack" type="number" placeholder="Precio por 2 unidades" style="display:none">
            <input id="img" placeholder="URL Imagen">
            <button class="btn-accent" onclick="guardarFirebase()">Guardar en Firebase</button>
        </div>
        <div id="tabList" style="display:none"><div id="adminList"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];
    let isMay = sessionStorage.getItem("isMay") === "true";

    // SYNC REALTIME
    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        actualizarAdmin();
    });

    // LOGICA DE PRECIOS & PROMOS
    function getPrecioBase(p) { return (isMay && p.precio_may > 0) ? p.precio_may : p.precio; }

    function calcularSub(p, qty) {
        let pb = getPrecioBase(p);
        if(p.promo === "2x1") return Math.ceil(qty / 2) * pb;
        if(p.promo === "3x2") return (Math.floor(qty / 3) * 2 + (qty % 3)) * pb;
        if(p.promo === "pack" && qty >= 2) return Math.floor(qty / 2) * p.ppack + (qty % 2 * pb);
        return qty * pb;
    }

    // RENDER
    function render() {
        const f = document.getElementById("busq").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(x => x.nombre.toLowerCase().includes(f)).map(p => {
            let pb = getPrecioBase(p);
            return `
            <div class="card">
                ${p.promo ? `<div class="promo-tag">${p.promo.toUpperCase()}</div>` : ''}
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                ${isMay ? '<div class="user-badge">PRECIO MAYORISTA</div>' : ''}
                <h4>${p.nombre}</h4>
                <p style="font-weight:bold; color:var(--accent); margin:0">$${pb}</p>
                <small style="opacity:0.6">Stock: ${p.stock}</small>
                <button class="btn-accent" onclick="addCart('${p.id}')" ${p.stock <= 0 ? 'disabled style="background:gray"' : ''}>
                    ${p.stock > 0 ? 'Agregar' : 'Sin Stock'}
                </button>
            </div>`;
        }).join("");
        updateUserUI();
    }

    // CARRITO
    function addCart(id) {
        const p = productos.find(x => x.id === id);
        const item = carrito.find(c => c.id === id);
        if(item) { if(item.qty < p.stock) item.qty++; } else { carrito.push({id, qty: 1}); }
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById("cartList");
        let total = 0; let ahorro = 0;
        list.innerHTML = carrito.map((c, i) => {
            const p = productos.find(x => x.id === c.id);
            const sub = calcularSub(p, c.qty);
            total += sub;
            ahorro += (getPrecioBase(p) * c.qty - sub);
            return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0; border-bottom:1px solid #444; padding-bottom:5px">
                <div><b>${p.nombre}</b><br>$${sub}</div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="modifyQty(${i},-1)">-</button>
                    <span>${c.qty}</span>
                    <button class="qty-btn" onclick="modifyQty(${i},1)">+</button>
                </div>
            </div>`;
        }).join("");
        document.getElementById("cartTotal").innerText = "Total: $" + total;
        document.getElementById("ahorroMsg").innerText = ahorro > 0 ? `¡Ahorraste $${ahorro} con promos!` : "";
        document.getElementById("cartCount").innerText = carrito.reduce((a,b) => a + b.qty, 0);
    }

    function modifyQty(i, d) {
        const p = productos.find(x => x.id === carrito[i].id);
        if(d > 0 && carrito[i].qty >= p.stock) return;
        carrito[i].qty += d;
        if(carrito[i].qty <= 0) carrito.splice(i, 1);
        updateCart();
    }

    // LOGICA PEDIDO
    async function confirmarPedido() {
        if(carrito.length === 0) return;
        let tipo = document.getElementById("tipoEntrega").value;
        let msg = `*NUEVO PEDIDO NEO REPUESTOS*\n${isMay ? '_Mayorista_\n' : ''}\n`;
        
        for(let c of carrito) {
            const p = productos.find(x => x.id === c.id);
            msg += `• ${p.nombre} x${c.qty} = $${calcularSub(p, c.qty)}\n`;
            await db.collection("productos").doc(p.id).update({ stock: p.stock - c.qty });
        }
        msg += `\n*TOTAL: ${document.getElementById("cartTotal").innerText}*`;
        
        if(tipo === "envio") {
            msg += `\n\n*ENVÍO:* \nNom: ${document.getElementById("formNom").value}\nDir: ${document.getElementById("formDir").value}\nTel: ${document.getElementById("formTel").value}\nObs: ${document.getElementById("formObs").value}`;
        } else { msg += `\n\n*RETIRO POR LOCAL*`; }

        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        carrito = []; updateCart(); closeAll();
    }

    // ADMIN & LOGIN
    function intentarLogin() {
        if(document.getElementById("user").value === "mayorista" && document.getElementById("pass").value === "vip") {
            isMay = true; sessionStorage.setItem("isMay", "true");
            cerrarModales(); render();
        } else { alert("Error"); }
    }
    function logout() { isMay = false; sessionStorage.setItem("isMay", "false"); cerrarModales(); render(); }
    function updateUserUI() {
        document.getElementById("userIcon").style.color = isMay ? "var(--success)" : "inherit";
        document.getElementById("loginInputs").style.display = isMay ? "none" : "block";
        document.getElementById("loginSuccess").style.display = isMay ? "block" : "none";
    }

    async function guardarFirebase() {
        const id = document.getElementById("editId").value;
        const data = {
            nombre: document.getElementById("n").value,
            precio: Number(document.getElementById("p").value),
            precio_may: Number(document.getElementById("pm").value),
            stock: Number(document.getElementById("st").value),
            promo: document.getElementById("promo").value,
            ppack: Number(document.getElementById("ppack").value) || 0,
            imagen: document.getElementById("img").value
        };
        if(id) await db.collection("productos").doc(id).update(data);
        else await db.collection("productos").add(data);
        limpiarForm();
    }

    function actualizarAdmin() {
        document.getElementById("adminList").innerHTML = productos.map(p => `
            <div style="display:flex; justify-content:space-between; font-size:12px; padding:8px 0; border-bottom:1px solid #444">
                <span>${p.nombre} (${p.stock})</span>
                <button onclick="editProd('${p.id}')" style="width:auto; padding:2px 8px; background:orange">✏️</button>
            </div>`).join("");
    }

    function editProd(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("editId").value = p.id;
        document.getElementById("n").value = p.nombre;
        document.getElementById("p").value = p.precio;
        document.getElementById("pm").value = p.precio_may;
        document.getElementById("st").value = p.stock;
        document.getElementById("promo").value = p.promo || "";
        document.getElementById("ppack").value = p.ppack;
        checkPack(); showTab('add');
    }

    // UI HELPERS
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleMode() { document.body.classList.toggle("light"); }
    function toggleEnvio() { document.getElementById("envioForm").style.display = document.getElementById("tipoEntrega").value === "envio" ? "block" : "none"; }
    function checkPack() { document.getElementById("ppack").style.display = document.getElementById("promo").value === "pack" ? "block" : "none"; }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function cerrarModales() { document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function closeAll() { document.querySelectorAll(".active").forEach(el => el.classList.remove("active")); cerrarModales(); }
    function showTab(t) { document.getElementById("tabAdd").style.display = t === 'add' ? 'block' : 'none'; document.getElementById("tabList").style.display = t === 'list' ? 'block' : 'none'; }
    function abrirAdmin() { if(prompt("Clave:") === "admin") { abrirModal('adminModal'); showTab('add'); } }
    function limpiarForm() { document.getElementById("editId").value=""; document.getElementById("n").value=""; document.getElementById("p").value=""; document.getElementById("pm").value=""; document.getElementById("st").value=""; document.getElementById("img").value=""; }
</script>
</body>
</html>
