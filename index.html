<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda</title>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--accent:#2563eb;
--text:#111;
--shadow:0 10px 25px rgba(0,0,0,.08);
}
body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--shadow:0 10px 25px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.3s;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:var(--card);
box-shadow:var(--shadow);
position:sticky;
top:0;
z-index:1000;
}
.logo{
font-weight:700;
font-size:20px;
}
.cart-btn{
position:relative;
cursor:pointer;
font-size:22px;
}
.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:var(--accent);
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:25px;
}
.card{
background:var(--card);
border-radius:15px;
box-shadow:var(--shadow);
padding:15px;
transition:.3s;
animation:fade .4s ease;
}
.card:hover{transform:translateY(-5px)}
.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}
.card h3{margin:10px 0 5px}
.price{
font-weight:700;
}
.old{
text-decoration:line-through;
opacity:.6;
margin-left:5px;
}
button{
background:var(--accent);
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}
.drawer{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:var(--card);
box-shadow:var(--shadow);
transition:.4s;
padding:20px;
overflow:auto;
z-index:2000;
}
.drawer.open{right:0}
.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.qty{
display:flex;
align-items:center;
gap:5px;
}
.admin-panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--card);
padding:20px;
border-radius:15px;
box-shadow:var(--shadow);
display:none;
z-index:3000;
width:90%;
max-width:500px;
max-height:90%;
overflow:auto;
}
.admin-tabs{
display:flex;
gap:10px;
margin-bottom:10px;
}
.admin-tabs button{
flex:1;
background:#ccc;
color:#000;
}
.admin-tabs button.active{
background:var(--accent);
color:#fff;
}
input{
padding:7px;
width:100%;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<div class="logo">Mi Tienda</div>
<div style="display:flex;gap:15px;align-items:center;">
<div onclick="toggleDark()">🌙</div>
<div class="cart-btn" onclick="toggleCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>
<div onclick="openAdminLogin()" style="cursor:pointer;">⚙</div>
</div>
</header>

<div class="products" id="products"></div>

<div class="drawer" id="cartDrawer">
<h2>Carrito</h2>
<div id="cartItems"></div>
<hr>
<label><input type="checkbox" id="envioCheck"> Agregar envío</label>
<p>Total: $<span id="cartTotal">0</span></p>
<p id="ahorro" style="color:green;font-weight:600"></p>
<button onclick="sendWhatsApp()">Enviar por WhatsApp</button>
<button onclick="confirmPurchase()">Confirmar Compra</button>
</div>

<div class="admin-panel" id="adminPanel">
<h2>Panel Admin</h2>
<div class="admin-tabs">
<button onclick="showTab(0)" class="active">Productos</button>
<button onclick="showTab(1)">Envíos</button>
<button onclick="showTab(2)">Historial</button>
</div>

<div class="tab">
<h3>Agregar / Editar</h3>
<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio normal">
<input id="promo" placeholder="Precio promo (opcional)">
<input id="stock" placeholder="Stock">
<input id="image" placeholder="URL Imagen">
<input id="manualDiscount" placeholder="Descuento manual x unidad">
<button onclick="saveProduct()">Guardar</button>
<div id="adminList"></div>
</div>

<div class="tab" style="display:none">
<h3>Configurar Envío</h3>
<input id="shippingPrice" placeholder="Precio envío">
<button onclick="saveShipping()">Guardar</button>
</div>

<div class="tab" style="display:none">
<h3>Historial Pedidos</h3>
<div id="history"></div>
</div>

<button onclick="closeAdmin()">Cerrar</button>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=[]
let shipping=localStorage.getItem("shipping")||0
let editing=null

function renderProducts(){
let container=document.getElementById("products")
container.innerHTML=""
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image||'https://via.placeholder.com/300'}">
<h3>${p.name}</h3>
<div class="price">
$${p.promo||p.price}
${p.promo?`<span class="old">$${p.price}</span>`:""}
</div>
<p>Stock: ${p.stock}</p>
<button onclick="addToCart(${i})">Agregar</button>
</div>`
})
}

function addToCart(i){
let item=cart.find(x=>x.i==i)
if(item){item.qty++}
else{cart.push({i,qty:1})}
updateCart()
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0)
let items=document.getElementById("cartItems")
items.innerHTML=""
let total=0
let ahorro=0
cart.forEach(c=>{
let p=products[c.i]
let price=p.promo||p.price
let subtotal=price*c.qty
let normal=p.price*c.qty
if(p.manualDiscount) subtotal-=p.manualDiscount*c.qty
if(c.qty>=3) subtotal=price*2
total+=subtotal
ahorro+=normal-subtotal
items.innerHTML+=`
<div class="cart-item">
<span>${p.name}</span>
<div class="qty">
<button onclick="changeQty(${c.i},-1)">-</button>
${c.qty}
<button onclick="changeQty(${c.i},1)">+</button>
</div>
</div>`
})
if(document.getElementById("envioCheck").checked)
total+=parseInt(shipping)
document.getElementById("cartTotal").innerText=total
document.getElementById("ahorro").innerText=ahorro>0?`Ahorras $${ahorro}`:""
}

function changeQty(i,val){
let item=cart.find(x=>x.i==i)
if(!item)return
item.qty+=val
if(item.qty<=0) cart=cart.filter(x=>x.i!=i)
updateCart()
}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("open")
}

function sendWhatsApp(){
let msg="Pedido:%0A"
cart.forEach(c=>{
let p=products[c.i]
msg+=`${p.name} x${c.qty}%0A`
})
msg+=`Total: $${document.getElementById("cartTotal").innerText}`
window.open(`https://wa.me/549XXXXXXXXXX?text=${msg}`)
}

function confirmPurchase(){
cart.forEach(c=>{
products[c.i].stock-=c.qty
})
localStorage.setItem("products",JSON.stringify(products))
let history=JSON.parse(localStorage.getItem("history"))||[]
history.push({date:new Date().toLocaleString(),total:document.getElementById("cartTotal").innerText})
localStorage.setItem("history",JSON.stringify(history))
cart=[]
updateCart()
renderProducts()
alert("Compra confirmada")
}

function openAdminLogin(){
let pass=prompt("Contraseña:")
if(pass==="admin123"){
document.getElementById("adminPanel").style.display="block"
loadAdminList()
}
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none"
}

function saveProduct(){
let p={
name:name.value,
price:parseInt(price.value),
promo:promo.value?parseInt(promo.value):null,
stock:parseInt(stock.value),
image:image.value,
manualDiscount:manualDiscount.value?parseInt(manualDiscount.value):0
}
if(editing!=null){products[editing]=p;editing=null}
else{products.push(p)}
localStorage.setItem("products",JSON.stringify(products))
renderProducts()
loadAdminList()
}

function loadAdminList(){
let list=document.getElementById("adminList")
list.innerHTML=""
products.forEach((p,i)=>{
list.innerHTML+=`
<div>
${p.name}
<button onclick="editProduct(${i})">Editar</button>
<button onclick="deleteProduct(${i})">Eliminar</button>
</div>`
})
}

function editProduct(i){
editing=i
let p=products[i]
name.value=p.name
price.value=p.price
promo.value=p.promo||""
stock.value=p.stock
image.value=p.image
manualDiscount.value=p.manualDiscount||""
}

function deleteProduct(i){
products.splice(i,1)
localStorage.setItem("products",JSON.stringify(products))
renderProducts()
loadAdminList()
}

function saveShipping(){
shipping=shippingPrice.value
localStorage.setItem("shipping",shipping)
}

function showTab(n){
document.querySelectorAll(".tab").forEach((t,i)=>{
t.style.display=i==n?"block":"none"
})
document.querySelectorAll(".admin-tabs button").forEach((b,i)=>{
b.classList.toggle("active",i==n)
})
if(n==2){
let h=JSON.parse(localStorage.getItem("history"))||[]
history.innerHTML=h.map(x=>`<p>${x.date} - $${x.total}</p>`).join("")
}
}

function toggleDark(){
document.body.classList.toggle("dark")
}

renderProducts()
updateCart()
</script>

</body>
</html>
