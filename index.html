<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda PRO - Admin</title>

<style>
:root{
--bg:#f4f6f9; --card:#ffffff; --text:#111;
--accent:#2563eb; --accent2:#9333ea;
--shadow:0 15px 40px rgba(0,0,0,.1);
}
body.dark{
--bg:#0f172a; --card:#1e293b; --text:#f1f5f9;
--accent:#22d3ee; --accent2:#f43f5e;
--shadow:0 20px 60px rgba(0,0,0,.6);
}
body{ margin:0; font-family:system-ui; background:var(--bg); color:var(--text); transition:.3s; }

header{
display:flex; justify-content:space-between; align-items:center;
padding:15px 25px; background:var(--card); box-shadow:var(--shadow);
position:sticky; top:0; z-index:1000;
}
.logo{ font-weight:700; font-size:20px; background:linear-gradient(45deg,var(--accent),var(--accent2)); -webkit-background-clip:text; color:transparent; }
.icon{ cursor:pointer; font-size:22px; margin-left:15px; position:relative; }

.products{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px; padding:25px; }
.card{ background:var(--card); padding:15px; border-radius:15px; box-shadow:var(--shadow); transition:.3s; }
.card img{ width:100%; height:180px; object-fit:cover; border-radius:12px; }

/* ESTILOS PANEL ADMIN */
#adminPanel {
    position: fixed; inset: 0; background: var(--bg); z-index: 5000;
    display: none; flex-direction: column; padding: 20px; overflow-y: auto;
}
.admin-form { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: var(--shadow); }
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
input, select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
.btn-cerrar { background: #ff4444; margin-top: 10px; }

.drawer{ position:fixed; right:-400px; top:0; width:350px; height:100%; background:var(--card); box-shadow:var(--shadow); padding:20px; transition:.4s; overflow:auto; z-index:2000; }
.drawer.open{right:0}
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:1500; }
.overlay.show{display:block}
</style>
</head>
<body>

<header>
<div class="logo">Mi Tienda</div>
<div>
<span class="icon" onclick="openAdmin()">🔑</span> <span class="icon" onclick="toggleDark()">🌗</span>
<span class="icon" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></span>
</div>
</header>

<div class="products" id="products"></div>

<div id="adminPanel">
    <h2>🛠 Panel de Control</h2>
    <div class="admin-form">
        <h3>Agregar / Editar Producto</h3>
        <input type="hidden" id="editIndex">
        <div class="admin-grid">
            <input id="n" placeholder="Nombre del producto">
            <input id="p" type="number" placeholder="Precio">
            <input id="promo" type="number" placeholder="Precio Mayorista">
            <input id="stock" type="number" placeholder="Stock">
            <input id="img" placeholder="URL de imagen">
            <input id="descManual" type="number" placeholder="Descuento Manual %">
        </div>
        <label><input type="checkbox" id="promo2"> Promo 2</label>
        <label><input type="checkbox" id="tresx2"> 3x2</label>
        <label><input type="checkbox" id="tresx1"> 3x1</label>
        <br><br>
        <button onclick="guardar()">Guardar Producto</button>
        <button class="btn-cerrar" onclick="cerrarAdmin()">Salir del Admin</button>
    </div>

    <div class="admin-form">
        <h3>Lista de Productos</h3>
        <div id="listaAdmin"></div>
    </div>

    <div class="admin-form">
        <h3>Historial de Ventas</h3>
        <div id="historialContenido"></div>
        <button onclick="borrarHistorial()" style="background:#666">Borrar Historial</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
    <h2>Carrito</h2>
    <div id="cartItems"></div>
    <hr>
    <p>Total: $<span id="total">0</span></p>
    <button onclick="closeCart()">Cerrar</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let cart = [];

function render() {
    let c = document.getElementById("products");
    c.innerHTML = "";
    products.forEach((p, i) => {
        c.innerHTML += `
        <div class="card">
            <img src="${p.img || 'https://via.placeholder.com/300'}">
            <h3>${p.name}</h3>
            <p>Precio: $${p.price}</p>
            <p>Stock: ${p.stock}</p>
            <button onclick="add(${i})">Agregar</button>
        </div>`;
    });
}

// --- TUS FUNCIONES DE ADMIN ---
function openAdmin() {
    let pass = prompt("Contraseña:");
    if (pass === "admin") {
        document.getElementById("adminPanel").style.display = "flex";
        cargarAdmin();
    } else alert("Incorrecta");
}

function cerrarAdmin() { document.getElementById("adminPanel").style.display = "none"; }

function guardar() {
    let index = document.getElementById("editIndex").value;
    let producto = {
        name: document.getElementById("n").value,
        price: parseInt(document.getElementById("p").value),
        promo: parseInt(document.getElementById("promo").value) || 0,
        promo2: document.getElementById("promo2").checked,
        tresx2: document.getElementById("tresx2").checked,
        tresx1: document.getElementById("tresx1").checked,
        descManual: parseInt(document.getElementById("descManual").value) || 0,
        stock: parseInt(document.getElementById("stock").value),
        img: document.getElementById("img").value
    };
    if (index === "") products.push(producto);
    else products[index] = producto;
    
    localStorage.setItem("products", JSON.stringify(products));
    render();
    cargarAdmin();
    resetForm();
}

function resetForm() {
    document.getElementById("editIndex").value = "";
    document.getElementById("n").value = "";
    document.getElementById("p").value = "";
    document.getElementById("promo").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("img").value = "";
}

function cargarAdmin() {
    let l = document.getElementById("listaAdmin");
    l.innerHTML = "";
    products.forEach((p, i) => {
        l.innerHTML += `<div style="margin-bottom:10px; border-bottom:1px solid #eee">
            ${p.name} - Stock: ${p.stock} 
            <button onclick="editar(${i})">Editar</button>
            <button onclick="eliminar(${i})" style="background:red">X</button>
        </div>`;
    });
    
    let h = document.getElementById("historialContenido");
    h.innerHTML = history.length > 0 ? history.map(x =>
        `<p><b>${x.fecha}</b><br>${x.detalle}<br>Total: $${x.total}</p><hr>`
    ).join("") : "No hay ventas registradas";
}

function editar(i) {
    let prod = products[i];
    document.getElementById("editIndex").value = i;
    document.getElementById("n").value = prod.name;
    document.getElementById("p").value = prod.price;
    document.getElementById("promo").value = prod.promo;
    document.getElementById("stock").value = prod.stock;
    document.getElementById("img").value = prod.img;
    document.getElementById("promo2").checked = prod.promo2;
    document.getElementById("tresx2").checked = prod.tresx2;
    document.getElementById("tresx1").checked = prod.tresx1;
    document.getElementById("descManual").value = prod.descManual;
}

function eliminar(i) {
    if(confirm("¿Seguro quieres eliminarlo?")){
        products.splice(i, 1);
        localStorage.setItem("products", JSON.stringify(products));
        render();
        cargarAdmin();
    }
}

function borrarHistorial() {
    history = [];
    localStorage.setItem("history", JSON.stringify(history));
    cargarAdmin();
}

// Funciones básicas de interfaz
function toggleDark() { document.body.classList.toggle("dark"); }
function openCart() { document.getElementById("drawer").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
function closeCart() { document.getElementById("drawer").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }

render();
</script>
</body>
</html>
