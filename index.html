<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); height: 90px; box-sizing: border-box; 
        }
        .main-logo { height: 70px; width: auto; filter: drop-shadow(0 0 8px var(--accent)); }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; padding: 8px; border-radius: 50%; transition: 0.2s; }

        .search-container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .search-bar { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; outline: none; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }
        
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); display: flex; flex-direction: column; position: relative; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: var(--promo); color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; }
        .img-box { background: #fff; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; height: 35px; overflow: hidden; }
        .price-val { font-size: 20px; font-weight: 800; color: var(--accent); }

        .drawer { position: fixed; top: 0; width: 85%; max-width: 380px; height: 100%; background: var(--card); transition: 0.5s; z-index: 5000; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #infoDrawer { left: -100%; } #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; } #cartDrawer.active { right: 0; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; z-index: 4000; }
        .overlay.active { display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 550px; border: 1px solid rgba(255,255,255,0.1); }

        .qty-controls { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; width: fit-content; }
        .qty-btn { background: none; border: none; color: white; font-weight: bold; cursor: pointer; padding: 0 5px; }

        .summary-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 14px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-row { font-size: 18px; font-weight: 800; color: var(--accent); border-top: 1px dashed gray; margin-top: 10px; padding-top: 10px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; }
        .back-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--text); padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:10px; padding:2px 6px; border-radius:10px; position:absolute; top:-5px; right:-5px">0</b></div>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar producto..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:380px">
        <div id="loginView">
            <h2 style="margin-top:0">Acceso Mayorista</h2>
            <input id="userInp" placeholder="Usuario">
            <input id="passInp" type="password" placeholder="Contraseña">
            <button class="btn-main" onclick="checkLogin()">INGRESAR</button>
            <p style="text-align:center; font-size:13px">¿No tenés cuenta? <b style="color:var(--accent); cursor:pointer" onclick="switchAuth(true)">Solicitar alta</b></p>
            <button class="back-btn" onclick="closeAll()">VOLVER</button>
        </div>
        <div id="regView" style="display:none">
            <h2>Solicitud de Alta</h2>
            <input id="regNom" placeholder="Nombre / Comercio">
            <input id="regTel" placeholder="WhatsApp">
            <input id="regUser" placeholder="Usuario deseado">
            <input id="regPass" type="password" placeholder="Contraseña deseada">
            <button class="btn-main" style="background:var(--success)" onclick="enviarSolicitud()">ENVIAR SOLICITUD</button>
            <button class="back-btn" onclick="switchAuth(false)">VOLVER AL LOGIN</button>
        </div>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 style="margin:0">Panel Maestro</h3>
            <button onclick="closeAll()" style="background:none; border:none; color:white; font-size:20px">✕</button>
        </div>
        <div id="adminContent" style="max-height:70vh; overflow-y:auto">
            <p>Panel cargado correctamente.</p>
        </div>
    </div>
</div>

<div id="infoDrawer" class="drawer">
    <h2 style="color:var(--accent)">Mi Perfil</h2>
    <div id="userBadge" style="display:none; background:rgba(16,185,129,0.1); padding:15px; border-radius:12px; color:var(--success); border:1px solid var(--success); margin-bottom:20px">✓ MAYORISTA ACTIVO</div>
    <p>📍 Belgrano 7102, Santa Fe</p>
    <p>📞 3434508948</p>
    <button class="btn-main" style="background:var(--danger); margin-top:auto" onclick="logout()">Cerrar Sesión</button>
</div>

<div id="cartDrawer" class="drawer">
    <h2 style="margin-top:0">Mi Pedido</h2>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto"></div>
    
    <div class="summary-box">
        <select id="deliveryMethod" onchange="toggleDeliveryForm(); updateCartUI();">
            <option value="retiro">Retiro en local</option>
            <option value="envio">Envío a domicilio</option>
        </select>
        <div id="deliveryForm" style="display:none">
            <input id="envioNombre" placeholder="Nombre">
            <input id="envioDir" placeholder="Dirección">
        </div>
        <div id="summaryContent"></div>
    </div>

    <button class="btn-main" style="background:#25d366" onclick="finalizarPedido()">ENVIAR WHATSAPP</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [], usuarios = [];
    let esMayorista = localStorage.getItem("ms47_may") === "true";

    db.collection("productos").onSnapshot(s => { productos = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    db.collection("usuarios_mayoristas").onSnapshot(s => { usuarios = s.docs.map(d => ({id:d.id, ...d.data()})); });

    function render() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(q)).map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <span class="product-title">${p.nombre}</span>
                    <span class="price-val">$${esMayorista ? p.precio_may : p.precio}</span>
                    <button class="btn-main" style="margin-top:10px; padding:10px; font-size:12px" onclick="addToCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
        if(esMayorista) document.getElementById("userBadge").style.display = "block";
    }

    function updateCartUI() {
        let subtotalItems = 0, ahorroTotal = 0;
        const list = document.getElementById("cartItemsList");
        
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            const pBase = esMayorista ? p.precio_may : p.precio;
            let pFinal = pBase, ahorroIt = 0;

            // Lógica de promos automática (ej: llevando 3 5000)
            if(!esMayorista && p.promo) {
                const match = p.promo.match(/llevando\s*(\d+)\s*\$?(\d+)/i);
                if(match && it.qty >= parseInt(match[1])) {
                    pFinal = parseInt(match[2]) / parseInt(match[1]);
                    ahorroIt = (pBase - pFinal) * it.qty;
                }
            }

            subtotalItems += pBase * it.qty;
            ahorroTotal += ahorroIt;

            return `
                <div style="border-bottom:1px solid rgba(255,255,255,0.05); padding:10px 0">
                    <div style="display:flex; justify-content:space-between">
                        <small>${p.nombre}</small>
                        <b>$${(pFinal * it.qty).toFixed(0)}</b>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${it.id}', -1)">-</button>
                            <span>${it.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${it.id}', 1)">+</button>
                        </div>
                        <small style="color:var(--danger); cursor:pointer" onclick="removeItem('${it.id}')">Quitar</small>
                    </div>
                </div>`;
        }).join("");

        const total = subtotalItems - ahorroTotal;
        document.getElementById("summaryContent").innerHTML = `
            <div class="summary-item"><span>Subtotal:</span> <span>$${subtotalItems}</span></div>
            ${ahorroTotal > 0 ? `<div class="summary-item" style="color:var(--success)"><span>Ahorro:</span> <span>-$${ahorroTotal.toFixed(0)}</span></div>` : ''}
            <div class="summary-item total-row"><span>TOTAL:</span> <span>$${total.toFixed(0)}</span></div>
        `;
        document.getElementById("cartCount").innerText = carrito.reduce((a,b)=>a+b.qty, 0);
    }

    async function finalizarPedido() {
        if(!carrito.length) return;
        const met = document.getElementById("deliveryMethod").value;
        let msg = `*NUEVO PEDIDO MS47*\n------------------\n`;
        let totalFinal = 0;

        carrito.forEach(it => {
            const p = productos.find(x => x.id === it.id);
            let pBase = esMayorista ? p.precio_may : p.precio;
            let pFinal = pBase;
            if(!esMayorista && p.promo) {
                const match = p.promo.match(/llevando\s*(\d+)\s*\$?(\d+)/i);
                if(match && it.qty >= parseInt(match[1])) pFinal = parseInt(match[2]) / parseInt(match[1]);
            }
            msg += `• ${p.nombre} (x${it.qty}) - $${(pFinal*it.qty).toFixed(0)}\n`;
            totalFinal += (pFinal*it.qty);
        });

        msg += `------------------\n*TOTAL: $${totalFinal.toFixed(0)}*\n`;
        msg += `📍 MODO: ${met === 'envio' ? 'Envío a domicilio' : 'Retiro en Local'}`;
        
        await db.collection("ventas").add({ total: totalFinal, detalle: msg, fecha: Date.now() });
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    function addToCart(id) { const ex = carrito.find(c => c.id === id); if(ex) ex.qty++; else carrito.push({id, qty:1}); updateCartUI(); }
    function changeQty(id, delta) { const it = carrito.find(c => c.id === id); if(it) { it.qty += delta; if(it.qty <= 0) removeItem(id); else updateCartUI(); } }
    function removeItem(id) { carrito = carrito.filter(c => c.id !== id); updateCartUI(); }
    function toggleDeliveryForm() { document.getElementById("deliveryForm").style.display = document.getElementById("deliveryMethod").value === "envio" ? "block" : "none"; }
    function switchAuth(r) { document.getElementById("loginView").style.display = r ? 'none' : 'block'; document.getElementById("regView").style.display = r ? 'block' : 'none'; }
    function closeAll() { document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active")); document.getElementById("mainOverlay").classList.remove("active"); document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    
    async function checkLogin() {
        const u = document.getElementById("userInp").value, p = document.getElementById("passInp").value;
        const user = usuarios.find(x => x.user === u && x.pass === p);
        if(user) { localStorage.setItem("ms47_may", "true"); location.reload(); } else alert("Credenciales incorrectas");
    }
    function logout() { localStorage.removeItem("ms47_may"); location.reload(); }
    function verificarAdmin() { if(prompt("Clave:") === "admin") abrirModal("adminModal"); }
    async function enviarSolicitud() {
        const d = { nombre: document.getElementById("regNom").value, tel: document.getElementById("regTel").value, user: document.getElementById("regUser").value, pass: document.getElementById("regPass").value };
        await db.collection("solicitudes_mayoristas").add(d);
        alert("Solicitud enviada con éxito."); switchAuth(false);
    }
</script>
</body>
</html>
