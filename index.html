<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DISTRIBUIDORA ELNEN</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b1426; --card: #16213e; --text: #ffffff; --accent: #3b82f6;
            --input-bg: #1f2937; --radius: 12px;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: #0b1426; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 22px; color: #94a3b8; }

        /* HERO */
        .hero {
            height: 50vh; background: linear-gradient(rgba(11,20,38,0.7), rgba(11,20,38,0.9)), url('https://images.unsplash.com/photo-1534723452862-4c874018d66d?q=80&w=1500');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; }

        /* CATEGORIAS */
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 25px; }
        .cat-card { background: var(--card); padding: 20px; border-radius: var(--radius); text-align: center; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .cat-card.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        /* BUSCADOR */
        .search-container { padding: 20px; max-width: 600px; margin: auto; }
        .search-bar { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid #334155; background: var(--input-bg); color: white; outline: none; }

        /* PRODUCTOS */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 25px; }
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; }
        .img-box { background: white; height: 150px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .info-box { padding: 15px; }

        /* DRAWERS CORREGIDOS */
        .drawer { 
            position: fixed; top: 0; width: 300px; height: 100%; background: var(--card); 
            transition: 0.4s ease-in-out; z-index: 5000; padding: 25px; box-sizing: border-box; 
        }
        #infoDrawer { left: -300px; } 
        #infoDrawer.open { left: 0; }
        #cartDrawer { right: -300px; } 
        #cartDrawer.open { right: 0; }

        /* OVERLAY CORREGIDO */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; z-index: 4000; 
        }
        .overlay.active { display: block; }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; justify-content: center; align-items: center; z-index: 6000; 
        }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; }

        .qty-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="openDrawer('infoDrawer')">☰</span>
        <b style="font-size: 1.2rem;">ELNEN</b>
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="abrirAdmin()">⚙️</span>
        <div style="position:relative">
            <span class="icon-btn" onclick="openDrawer('cartDrawer')">🛒</span>
            <b id="cartCount" class="qty-badge">0</b>
        </div>
    </div>
</header>

<section class="hero">
    <h1>DISTRIBUIDORA ELNEN</h1>
    <p>Calidad mayorista y minorista en Santa Fe.</p>
    <button class="btn-primary" onclick="window.scrollTo({top: 600, behavior: 'smooth'})">VER PRODUCTOS</button>
</section>

<div class="cat-grid">
    <div class="cat-card active" id="cat-all" onclick="setSearch('')"><b>🌐 Todos</b></div>
    <div class="cat-card" id="cat-bebidas" onclick="setSearch('bebidas')"><b>🥤 Bebidas</b></div>
    <div class="cat-card" id="cat-snacks" onclick="setSearch('snacks')"><b>🍿 Snacks</b></div>
    <div class="cat-card" id="cat-almacen" onclick="setSearch('almacen')"><b>🥫 Almacén</b></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <h3>Información</h3>
    <p>📍 Belgrano 7102</p>
    <button class="btn-primary" style="width:100%" onclick="closeAll()">CERRAR</button>
</div>

<div id="cartDrawer" class="drawer">
    <h3>Tu Pedido</h3>
    <div id="cartList" style="margin-bottom:20px"></div>
    <h4 id="cartTotal">Total: $0</h4>
    <button class="btn-primary" style="width:100%; background:#22c55e" onclick="enviarWhatsApp()">WHATSAPP</button>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <h3>Panel Admin</h3>
        <input type="hidden" id="editId">
        <input id="fNom" style="width:100%; margin-bottom:10px; padding:10px" placeholder="Nombre">
        <input id="fPre" type="number" style="width:100%; margin-bottom:10px; padding:10px" placeholder="Precio">
        <input id="fCat" style="width:100%; margin-bottom:10px; padding:10px" placeholder="Categoría (bebidas, snacks, almacen)">
        <input id="fImg" style="width:100%; margin-bottom:10px; padding:10px" placeholder="Link Imagen">
        <button class="btn-primary" style="width:100%" onclick="guardarProducto()">GUARDAR</button>
        <button onclick="closeAll()" style="width:100%; background:none; border:none; color:white; margin-top:10px">Cerrar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];

    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        const filtrados = productos.filter(p => {
            return p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase() === query);
        });
        cont.innerHTML = filtrados.map(p => `
            <div class="product-card">
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <b>${p.nombre}</b>
                    <div style="color:var(--accent); font-weight:800; margin:10px 0">$${p.precio}</div>
                    <button class="btn-primary" style="width:100%" onclick="addToCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
    }

    function setSearch(val) {
        document.getElementById("searchInput").value = val;
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
        const target = val === '' ? 'all' : val;
        document.getElementById('cat-' + target).classList.add('active');
        render();
    }

    // CONTROL DE DRAWERS
    function openDrawer(id) {
        closeAll(); // Cerramos todo antes de abrir uno nuevo
        document.getElementById(id).classList.add("open");
        document.getElementById("mainOverlay").classList.add("active");
    }

    function closeAll() {
        document.getElementById("infoDrawer").classList.remove("open");
        document.getElementById("cartDrawer").classList.remove("open");
        document.getElementById("mainOverlay").classList.remove("active");
        document.getElementById("adminModal").style.display = "none";
    }

    function addToCart(id) {
        const p = carrito.find(c => c.id === id);
        if(p) p.qty++; else carrito.push({id, qty:1});
        updateCart();
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        const list = document.getElementById("cartList");
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            total += p.precio * it.qty;
            count += it.qty;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>${p.nombre} x${it.qty}</span><span>$${p.precio * it.qty}</span></div>`;
        }).join("");
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotal").innerText = "Total: $" + total;
    }

    function abrirAdmin() {
        if(prompt("Clave:") === "admin") {
            document.getElementById("adminModal").style.display = "flex";
            document.getElementById("mainOverlay").classList.add("active");
        }
    }

    async function guardarProducto() {
        const d = {
            nombre: document.getElementById("fNom").value,
            precio: Number(document.getElementById("fPre").value),
            categoria: document.getElementById("fCat").value.toLowerCase(),
            imagen: document.getElementById("fImg").value
        };
        await db.collection("productos").add(d);
        alert("Guardado");
        closeAll();
    }

    function enviarWhatsApp() {
        let msg = "Pedido Elnen:\n";
        carrito.forEach(it => {
            const p = productos.find(x => x.id === it.id);
            msg += `- ${p.nombre} x${it.qty}\n`;
        });
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
