<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS47 - SISTEMA</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0f172a;
color:#fff;
}

/* mejoras animación */
.btn-add{
position:relative;
overflow:hidden;
}
.btn-add::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
transition:.4s;
}
.btn-add:active::after{
left:100%;
}
</style>
</head>

<body>
   <!-- TU HTML ORIGINAL VA ACÁ SIN CAMBIOS -->

<!-- SOLO CAMBIAR ESTO EN CATEGORÍAS -->
<!-- ANTES -->
<!-- onclick="setCat('bebida')" -->

<!-- AHORA -->
<!-- onclick="setCat('bebida', this)" -->
   <script>

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
apiKey:"AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
authDomain:"tienda-online-baaf6.firebaseapp.com",
projectId:"tienda-online-baaf6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* VARIABLES */
let prods=[],cart=[],users=[],orders=[];
let isMay=false,usuarioLogueado=null,filterCat="";

/* ================= MEJORAS ================= */

// carrito persistente
function saveCart(){
localStorage.setItem("ms47_cart",JSON.stringify(cart));
}
function loadCart(){
let c=localStorage.getItem("ms47_cart");
if(c)cart=JSON.parse(c);
}

// usuario persistente
function saveUserSession(u){
localStorage.setItem("ms47_user",JSON.stringify(u));
}
function loadUserSession(){
let u=localStorage.getItem("ms47_user");
if(u){
usuarioLogueado=JSON.parse(u);
isMay=true;
llenarPerfil(usuarioLogueado);
}
}

/* ---------------- INIT ---------------- */
function init(){

db.collection("productos").onSnapshot(s=>{
prods=s.docs.map(d=>({id:d.id,...d.data()}));
render();
});

db.collection("usuarios").onSnapshot(s=>{
users=s.docs.map(d=>({id:d.id,...d.data()}));
});

db.collection("pedidos").onSnapshot(s=>{
orders=s.docs.map(d=>({id:d.id,...d.data()}));
});

// mejoras
loadCart();
loadUserSession();
updateCartUI();
}

/* ---------------- RENDER ---------------- */
function render(){
let q=document.getElementById("searchInput").value.toLowerCase();

let f=prods.filter(p=>
p.nombre.toLowerCase().includes(q) &&
(filterCat==""||p.categoria==filterCat)
);

document.getElementById("productsCont").innerHTML=f.map(p=>{
let precio=isMay?(p.precio_may||p.precio):p.precio;

return `
<div class="product-card">
${p.promo?`<div class="promo-badge">${p.promo}</div>`:""}
<div class="img-box">
<img src="${p.imagen||''}">
</div>
<div class="info-box">
<div class="prod-title">${p.nombre}</div>
<div class="price-val">$${precio}</div>
<button class="btn-add" onclick="addToCart('${p.id}')">🛒</button>
</div>
</div>
`;
}).join("");
}

/* ---------------- CARRITO ---------------- */
function addToCart(id){
let e=cart.find(i=>i.id==id);
if(e)e.qty++;else cart.push({id,qty:1});

saveCart();
updateCartUI();

// animación
let el=document.getElementById("cartCount");
if(el){
el.style.transform="scale(1.4)";
setTimeout(()=>el.style.transform="scale(1)",200);
}
}

function changeQty(id,d){
let i=cart.find(x=>x.id==id);
if(i){
i.qty+=d;
if(i.qty<=0)cart=cart.filter(x=>x.id!=id);
}
saveCart();
updateCartUI();
}

function updateCartUI(){
let total=0,count=0;

let list=document.getElementById("cartItems");

if(!list)return;

list.innerHTML=cart.map(i=>{
let p=prods.find(x=>x.id==i.id);
if(!p)return "";

let pr=isMay?(p.precio_may||p.precio):p.precio;

total+=pr*i.qty;
count+=i.qty;

return `
<div>
${p.nombre} x${i.qty}
<button onclick="changeQty('${i.id}',-1)">-</button>
<button onclick="changeQty('${i.id}',1)">+</button>
</div>`;
}).join("");

document.getElementById("cartTotal").innerText="$"+total;
document.getElementById("cartCount").innerText=count;
}

/* ---------------- LOGIN ---------------- */
function doLogin(){
let u=uInp.value.trim();
let p=pInp.value.trim();

if(u==="admin"&&p==="admin"){
openModal("adminModal");
return;
}

let user=users.find(x=>x.user==u&&x.pass==p);

if(user){
if(user.activo){
usuarioLogueado=user;
isMay=true;
saveUserSession(user);
llenarPerfil(user);
render();
closeAll();
}else alert("En revisión");
}else alert("Error login");
}

/* ---------------- PERFIL ---------------- */
function llenarPerfil(u){
document.getElementById("p-user").innerText=u.user;
document.getElementById("p-tel").innerText=u.tel;
document.getElementById("p-dir").innerText=u.dir;
}

/* ---------------- LOGOUT ---------------- */
function logout(){
if(confirm("Cerrar sesión")){
localStorage.removeItem("ms47_user");
location.reload();
}
}

/* ---------------- CATEGORÍAS FIX ---------------- */
function setCat(c,el){
filterCat=c;
document.querySelectorAll(".cat-card").forEach(x=>x.classList.remove("active"));
if(el)el.classList.add("active");
render();
}

/* ---------------- PEDIDO ---------------- */
async function finalizarYEnviar(){

if(cart.length==0)return alert("Carrito vacío");

let txt="📦 PEDIDO MS47\n";
txt+=new Date().toLocaleString()+"\n";

cart.forEach(i=>{
let p=prods.find(x=>x.id==i.id);
if(p)txt+=p.nombre+" x"+i.qty+"\n";
});

await db.collection("pedidos").add({
detalle:txt,
fecha:Date.now()
});

window.open("https://wa.me/5493434508948?text="+encodeURIComponent(txt));

cart=[];
saveCart();
updateCartUI();
}

/* START */
init();

</script>

</body>
</html>
