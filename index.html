<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Online con Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    header { background:#333; color:#fff; padding:1rem; text-align:center; }
    nav { background:#444; padding:0.5rem; text-align:center; }
    nav a { color:#fff; margin:0 1rem; text-decoration:none; }
    .productos { display:flex; flex-wrap:wrap; justify-content:center; margin:2rem; }
    .producto { background:#fff; border:1px solid #ddd; border-radius:5px; margin:1rem; padding:1rem; width:250px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .producto img { max-width:100%; border-radius:5px; }
    .producto h3 { margin:0.5rem 0; }
    .producto button { background:#28a745; color:#fff; border:none; padding:0.5rem 1rem; cursor:pointer; border-radius:3px; }
    .producto button:hover { background:#218838; }
    #carrito, #envio, #admin { background:#fff; margin:2rem; padding:1rem; border-radius:5px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    #lista-carrito li { margin:0.5rem 0; }
    .eliminar { background:#dc3545; color:#fff; border:none; padding:0.3rem 0.6rem; margin-left:1rem; cursor:pointer; border-radius:3px; }
    .eliminar:hover { background:#c82333; }
    input { width:100%; padding:0.5rem; margin:0.3rem 0; }
    button[type="submit"] { background:#007bff; color:#fff; border:none; padding:0.7rem 1.2rem; cursor:pointer; border-radius:5px; }
    button[type="submit"]:hover { background:#0056b3; }
    footer { background:#333; color:#fff; text-align:center; padding:1rem; margin-top:2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Mi Tienda Online</h1>
  </header>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
  </nav>

  <!-- Productos cargados desde Firebase -->
  <section class="productos" id="productos"></section>

  <!-- Carrito -->
  <section id="carrito">
    <h2>Carrito de Compras</h2>
    <ul id="lista-carrito"></ul>
    <p><strong>Total:</strong> $<span id="total">0</span></p>
  </section>

  <!-- Formulario de envío -->
  <section id="envio">
    <h2>Datos de Envío</h2>
    <form id="form-envio">
      <label>Nombre:</label>
      <input type="text" id="nombre" required>
      <label>Dirección:</label>
      <input type="text" id="direccion" required>
      <label>Teléfono:</label>
      <input type="text" id="telefono" required>
      <button type="submit">Enviar pedido por WhatsApp</button>
    </form>
  </section>

  <!-- Panel Admin -->
  <section id="admin">
    <h2>Panel Admin</h2>
    <form id="form-admin">
      <label>Nombre:</label>
      <input type="text" id="nombreProd" required>
      <label>Precio:</label>
      <input type="number" id="precioProd" required>
      <label>Imagen (URL):</label>
      <input type="text" id="imagenProd" required>
      <button type="submit">Agregar Producto</button>
    </form>
    <div id="lista-admin"></div>
  </section>

  <footer>
    <p>&copy; 2026 Mi Tienda Online</p>
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, deleteDoc } 
      from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // Configuración de tu proyecto Firebase (copiar desde Firebase Console)
    const firebaseConfig = {
      apiKey: "AIzaSyD_uELDR3InLRLsxXCyFuIM4OzYw6xYkE",
      authDomain: "tienda-c497e.firebaseapp.com",
      projectId: "tienda-c497e",
      storageBucket: "tienda-c497e.appspot.com",
      messagingSenderId: "709484748527",
      appId: "1:709484748527:web:64dbea8f89b2b830a851a",
      measurementId: "G-CCNPEMM8WG"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Carrito
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    function agregarAlCarrito(nombre, precio) {
      carrito.push({ nombre, precio });
      guardarCarrito();
      mostrarCarrito();
    }

    function eliminarDelCarrito(index) {
      carrito.splice(index, 1);
      guardarCarrito();
      mostrarCarrito();
    }

    function mostrarCarrito() {
      const lista = document.getElementById("lista-carrito");
      lista.innerHTML = "";
      let total = 0;
      carrito.forEach((item, index) => {
        const li = document.createElement("li");
        li.textContent = `${item.nombre} - $${item.precio}`;
        const btnEliminar = document.createElement("button");
        btnEliminar.textContent = "Eliminar";
        btnEliminar.className = "eliminar";
        btnEliminar.onclick = () => eliminarDelCarrito(index);
        li.appendChild(btnEliminar);
        lista.appendChild(li);
        total += item.precio;
      });
      document.getElementById("total").textContent = total;
    }

    function guardarCarrito() {
      localStorage.setItem("carrito", JSON.stringify(carrito));
    }

    // Formulario de envío -> WhatsApp
    document.getElementById("form-envio").addEventListener("submit", function(e) {
      e.preventDefault();
      if (carrito.length === 0) {
        alert("El carrito está vacío.");
        return;
      }
      const nombre = document.getElementById("nombre").value;
      const direccion = document.getElementById("direccion").value;
      const telefono = document.getElementById("telefono").value;

      let mensaje = "Hola, quiero hacer este pedido:%0A";
      carrito.forEach(item => {
        mensaje += `- ${item.nombre} ($${item.precio})%0A`;
      });
      let total = carrito.reduce((sum, item) => sum + item.precio, 0);
      mensaje += `Total: $${total}%0A`;
      mensaje += `Nombre: ${nombre}%0A`;
      mensaje += `Dirección: ${direccion}%0A`;
      mensaje += `Teléfono: ${telefono}`;

      let telefonoNegocio = "5493425056940"; 
      let url = `https://wa.me/${telefonoNegocio}?text=${mensaje}`;
      window.open(url, "_blank");
    });

    // Cargar productos desde Firebase
    async function cargarProductos() {
      const querySnapshot = await getDocs(collection(db, "productos"));
      const contenedor = document.getElementById("productos");
      contenedor.innerHTML = "";
      querySnapshot.forEach((docSnap) => {
        const producto = docSnap.data();
        contenedor.innerHTML += `
          <div class="producto">
            <img src="${producto.imagen}" alt="${producto.nombre}">
            <h3>${producto.nombre}</h3>
            <p>$${producto.precio}</p>
            <button onclick="agregarAlCarrito('${producto.nombre}', ${producto.precio})">Agregar al carrito</button>
          </div>
        `;
      });
    }

    // Panel Admin
    document.getElementById("form-admin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nombre = document.getElementById("nombreProd").value;
      const precio = parseFloat(document.getElementById("precioProd").value);
