<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda PRO</title>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111;
--accent:#2563eb;
--accent2:#9333ea;
--shadow:0 15px 40px rgba(0,0,0,.1);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#22d3ee;
--accent2:#f43f5e;
--shadow:0 20px 60px rgba(0,0,0,.6);
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.4s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:var(--card);
box-shadow:var(--shadow);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:700;
font-size:22px;
background:linear-gradient(45deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}

.icon{
cursor:pointer;
font-size:22px;
position:relative;
margin-left:15px;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:var(--accent2);
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:var(--card);
border-radius:16px;
box-shadow:var(--shadow);
padding:15px;
transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

button{
background:linear-gradient(45deg,var(--accent),var(--accent2));
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
z-index:1500;
}

.drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:var(--card);
box-shadow:var(--shadow);
padding:20px;
transition:.4s;
z-index:2000;
overflow:auto;
}

.drawer.open{ right:0; }
.overlay.show{ display:block; }

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.admin-login,
.admin-panel{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.6);
z-index:3000;
}

.admin-box{
background:var(--card);
padding:30px;
border-radius:20px;
width:90%;
max-width:600px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<header>
<div class="logo">Mi Tienda</div>
<div>
<span class="icon" onclick="toggleDark()">🌗</span>
<span class="icon" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></span>
<span class="icon" onclick="showLogin()">●</span>
</div>
</header>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="drawer" id="drawer">
<h2>Carrito</h2>
<div id="cartItems"></div>
<hr>
<p>Total: $<span id="total">0</span></p>
<button onclick="closeCart()">Cerrar</button>
</div>

<!-- LOGIN -->
<div class="admin-login" id="loginBox">
<div class="admin-box">
<h3>Acceso Admin</h3>
<input type="password" id="adminPassword" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="closeLogin()">Volver</button>
</div>
</div>

<!-- PANEL -->
<div class="admin-panel" id="adminPanel">
<div class="admin-box">
<h3>Panel Admin</h3>
<input id="name" placeholder="Nombre producto">
<input id="price" placeholder="Precio">
<input id="image" placeholder="URL imagen">
<button onclick="addProduct()">Agregar</button>
<hr>
<div id="adminList"></div>
<button onclick="logout()">Cerrar sesión</button>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=[]

/* PRODUCTOS */
function render(){
let container=document.getElementById("products")
container.innerHTML=""
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image||'https://via.placeholder.com/300'}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Agregar</button>
</div>`
})
}

function add(i){
let item=cart.find(x=>x.i==i)
if(item)item.qty++
else cart.push({i,qty:1})
updateCart()
}

function updateCart(){
let items=document.getElementById("cartItems")
items.innerHTML=""
let total=0
cart.forEach(c=>{
let p=products[c.i]
total+=p.price*c.qty
items.innerHTML+=`
<div class="cart-item">
${p.name} x${c.qty}
<button onclick="change(${c.i},-1)">-</button>
<button onclick="change(${c.i},1)">+</button>
</div>`
})
document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0)
}

function change(i,v){
let item=cart.find(x=>x.i==i)
item.qty+=v
if(item.qty<=0) cart=cart.filter(x=>x.i!=i)
updateCart()
}

/* CARRITO */
function openCart(){
document.getElementById("drawer").classList.add("open")
document.getElementById("overlay").classList.add("show")
}
function closeCart(){
document.getElementById("drawer").classList.remove("open")
document.getElementById("overlay").classList.remove("show")
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark")
localStorage.setItem("dark",document.body.classList.contains("dark"))
}
if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark")
}

/* ADMIN */
function showLogin(){
document.getElementById("loginBox").style.display="flex"
}
function closeLogin(){
document.getElementById("loginBox").style.display="none"
}
function login(){
let pass=document.getElementById("adminPassword").value
if(pass==="admin123"){
localStorage.setItem("admin","true")
document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="flex"
loadAdmin()
}else{
alert("Contraseña incorrecta")
}
}
function logout(){
localStorage.removeItem("admin")
document.getElementById("adminPanel").style.display="none"
}

function addProduct(){
let name=document.getElementById("name").value
let price=parseInt(document.getElementById("price").value)
let image=document.getElementById("image").value
products.push({name,price,image})
localStorage.setItem("products",JSON.stringify(products))
render()
loadAdmin()
}

function loadAdmin(){
let list=document.getElementById("adminList")
list.innerHTML=""
products.forEach((p,i)=>{
list.innerHTML+=`
<div>
${p.name} - $${p.price}
<button onclick="deleteProduct(${i})">Eliminar</button>
</div>`
})
}

function deleteProduct(i){
products.splice(i,1)
localStorage.setItem("products",JSON.stringify(products))
render()
loadAdmin()
}

/* AUTO LOGIN SI YA ESTABA */
if(localStorage.getItem("admin")==="true"){
document.getElementById("adminPanel").style.display="flex"
loadAdmin()
}

render()
updateCart()
</script>

</body>
</html>
