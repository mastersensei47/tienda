<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Store</title>

<style>

/* ---------------- VARIABLES ---------------- */

:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#111;
  --accent:#111;
  --green:#25D366;
}

body.dark{
  --bg:#0f0f12;
  --card:#1c1c22;
  --text:#fff;
  --accent:#fff;
}

/* ---------------- BASE ---------------- */

*{
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ---------------- HEADER ---------------- */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:var(--card);
  box-shadow:0 5px 20px rgba(0,0,0,.05);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-weight:700;
  letter-spacing:1px;
}

.actions{
  display:flex;
  gap:20px;
  align-items:center;
}

.cart-btn{
  cursor:pointer;
  position:relative;
  font-size:22px;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
}

.toggle-dark{
  cursor:pointer;
}

/* ---------------- PRODUCTS ---------------- */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
  padding:40px;
}

.product{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
  transition:.3s;
}

.product:hover{
  transform:translateY(-5px);
}

.product img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.product button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:var(--bg);
  cursor:pointer;
}

/* ---------------- CART DRAWER ---------------- */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);
  opacity:0;
  visibility:hidden;
  transition:.3s;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:var(--card);
  padding:25px;
  display:flex;
  flex-direction:column;
  transition:.4s;
}

.cart.active{
  right:0;
}

.cart-items{
  flex:1;
  overflow:auto;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:14px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

.checkout{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--green);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.admin-btn{
  opacity:0;
  position:absolute;
  top:5px;
  left:5px;
}

</style>
</head>
<body>

<header>
  <div class="logo">MASTER STORE</div>

  <div class="actions">
    <div class="toggle-dark">🌙</div>
    <div class="cart-btn">🛍
      <span class="cart-count">0</span>
    </div>
  </div>
</header>

<div class="products" id="products"></div>

<div class="overlay"></div>

<div class="cart">
  <h3>Tu carrito</h3>
  <div class="cart-items"></div>

  <label>
    <input type="checkbox" id="shippingCheck">
    Agregar envío
  </label>

  <div class="total">Total: $0</div>

  <button class="checkout">📱 Pedir por WhatsApp</button>
</div>

<script>

/* ---------------- DATA ---------------- */

let products=[
  {id:1,name:"Producto 1",price:100,price2:180,stock:10,img:"https://picsum.photos/300/200?1"},
  {id:2,name:"Producto 2",price:200,price2:350,stock:8,img:"https://picsum.photos/300/200?2"}
];

let cart=[];

/* ---------------- RENDER PRODUCTS ---------------- */

function renderProducts(){
  const container=document.getElementById("products");
  container.innerHTML="";
  products.forEach(p=>{
    container.innerHTML+=`
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>$${p.price} c/u</p>
        <small>2x $${p.price2}</small>
        <p>Stock: ${p.stock}</p>
        <button onclick="addToCart(${p.id})">Agregar</button>
      </div>
    `;
  });
}

renderProducts();

/* ---------------- CART ---------------- */

function addToCart(id){

  const product=products.find(p=>p.id===id);
  if(product.stock<=0){
    alert("Sin stock");
    return;
  }

  const existing=cart.find(p=>p.id===id);

  if(existing){
    existing.qty++;
  }else{
    cart.push({id:id,name:product.name,price:product.price,price2:product.price2,qty:1});
  }

  updateCart();
}

function updateCart(){

  const cartItems=document.querySelector(".cart-items");
  const totalDiv=document.querySelector(".total");
  const countDiv=document.querySelector(".cart-count");

  cartItems.innerHTML="";
  let total=0;
  let count=0;

  cart.forEach(item=>{
    let subtotal=0;

    if(item.qty==1){
      subtotal=item.price;
    }else if(item.qty==2){
      subtotal=item.price2;
    }else if(item.qty>=3){
      const groups=Math.floor(item.qty/3);
      const remainder=item.qty%3;
      subtotal=groups*item.price2 + remainder*item.price;
    }

    total+=subtotal;
    count+=item.qty;

    cartItems.innerHTML+=`
      <div class="cart-item">
        <span>${item.name} x${item.qty}</span>
        <span>$${subtotal}</span>
      </div>
    `;
  });

  if(document.getElementById("shippingCheck").checked){
    total+=500;
  }

  totalDiv.innerText="Total: $"+total;
  countDiv.innerText=count;
}

/* ---------------- DRAWER ---------------- */

const cartBtn=document.querySelector(".cart-btn");
const cartDrawer=document.querySelector(".cart");
const overlay=document.querySelector(".overlay");

cartBtn.onclick=()=>{
  cartDrawer.classList.add("active");
  overlay.classList.add("active");
};

overlay.onclick=()=>{
  cartDrawer.classList.remove("active");
  overlay.classList.remove("active");
};

document.getElementById("shippingCheck").onchange=updateCart;

/* ---------------- WHATSAPP ---------------- */

document.querySelector(".checkout").onclick=()=>{

  if(cart.length===0){
    alert("Carrito vacío");
    return;
  }

  let msg="🛒 Pedido:%0A";

  cart.forEach(item=>{
    msg+=`${item.name} x${item.qty}%0A`;
  });

  if(document.getElementById("shippingCheck").checked){
    msg+="Con envío%0A";
  }else{
    msg+="Retiro en local%0A";
  }

  window.open("https://wa.me/549XXXXXXXXXX?text="+msg,"_blank");

  cart.forEach(item=>{
    const p=products.find(prod=>prod.id===item.id);
    p.stock-=item.qty;
  });

  cart=[];
  updateCart();
  renderProducts();
};

/* ---------------- DARK MODE ---------------- */

if(window.matchMedia('(prefers-color-scheme: dark)').matches){
  document.body.classList.add("dark");
}

document.querySelector(".toggle-dark").onclick=()=>{
  document.body.classList.toggle("dark");
};

</script>
</body>
</html>
