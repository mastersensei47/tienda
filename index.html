<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
            --img-bg: rgba(255,255,255,0.05);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9; --img-bg: #ffffff;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        /* HEADER ESTILO MS47 */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(128,128,128,0.1);
            height: 90px; box-sizing: border-box; 
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .main-logo { height: 70px; width: auto; object-fit: contain; filter: drop-shadow(0 0 8px var(--accent)); }
        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; display: flex; align-items: center; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        /* GRID Y CARDS */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; } }
        
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); transition: 0.4s; display: flex; flex-direction: column; position: relative; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: var(--promo); color: #000; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; }
        .img-box { background: var(--img-bg); width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { margin: 0 0 8px; font-size: 14px; font-weight: 600; height: 40px; overflow: hidden; }
        .price-val { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        /* DRAWERS (Paneles Laterales) */
        .drawer { position: fixed; top: 0; width: 85%; max-width: 350px; height: 100%; background: var(--card); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5000; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        #infoDrawer { left: -100%; border-right: 1px solid rgba(255,255,255,0.1); }
        #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; border-left: 1px solid rgba(255,255,255,0.1); }
        #cartDrawer.active { right: 0; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; z-index: 4000; }
        .overlay.active { display: block; }

        /* MODALES ADMIN */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 15px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }

        .admin-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .qty-btn { background: var(--accent); border: none; color: white; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; box-sizing: border-box; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:10px; padding:2px 6px; border-radius:10px; position:absolute; top:0; right:0;">0</b></div>
    </div>
</header>

<div class="search-container" style="padding: 20px; max-width: 600px; margin: auto;">
    <input type="text" id="searchInput" placeholder="Buscar productos..." onkeyup="render()" style="border-radius: 15px; padding: 15px;">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <h2 style="color:var(--accent)">Distribuidora Elnen</h2>
    <div id="statusBadge" style="display:none; background:rgba(16,185,129,0.1); color:var(--success); padding:10px; border-radius:10px; font-weight:bold; margin-bottom:20px; text-align:center;">✓ MAYORISTA ACTIVADO</div>
    <div style="flex-grow:1">
        <p>📍 Belgrano 7102, Santa Fe</p>
        <p>📱 Pedidos: 3434508948</p>
    </div>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; cursor:pointer;">Cerrar Sesión</button>
</div>

<div id="cartDrawer" class="drawer">
    <h2>Tu Pedido</h2>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto"></div>
    <div id="cartTotal" style="font-size:22px; font-weight:800; color:var(--accent); margin:20px 0">Total: $0</div>
    <button class="btn-add" style="background:#25d366" onclick="enviarPedido()">FINALIZAR POR WHATSAPP</button>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <h2 style="margin:0">Panel Maestro</h2>
            <button onclick="closeAll()" style="background:none; border:none; color:white; font-size:20px">✕</button>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <button onclick="showTab('tab-p')" class="btn-add" style="flex:1">Productos</button>
            <button onclick="showTab('tab-u')" class="btn-add" style="flex:1">Usuarios</button>
            <button onclick="showTab('tab-o')" class="btn-add" style="flex:1">Ventas</button>
        </div>

        <div id="tab-p">
            <input type="hidden" id="editId">
            <input id="fNom" placeholder="Nombre">
            <input id="fPre" type="number" placeholder="Precio Público">
            <input id="fPreM" type="number" placeholder="Precio Mayorista">
            <input id="fPromo" placeholder="Promo (Ej: 3x10000)">
            <input id="fImg" placeholder="Link Imagen">
            <button class="btn-add" style="width:100%; background:var(--success)" onclick="guardarProducto()">GUARDAR PRODUCTO</button>
            <div id="adminProds" style="margin-top:20px"></div>
        </div>

        <div id="tab-u" style="display:none">
            <div id="adminUsers"></div>
        </div>

        <div id="tab-o" style="display:none">
            <div id="adminOrders"></div>
        </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h2 style="text-align:center">Acceso</h2>
        <input id="lUser" placeholder="Usuario">
        <input id="lPass" type="password" placeholder="Contraseña">
        <button class="btn-add" style="width:100%" onclick="login()">ENTRAR</button>
        <p style="text-align:center; font-size:12px; margin-top:15px">¿Sos mayorista? <b onclick="abrirModal('regModal')" style="color:var(--accent); cursor:pointer">Registrate acá</b></p>
    </div>
</div>

<div class="modal" id="regModal">
    <div class="modal-content" style="max-width:350px">
        <h2>Registro</h2>
        <input id="rUser" placeholder="Usuario">
        <input id="rPass" type="password" placeholder="Contraseña">
        <input id="rTel" placeholder="WhatsApp">
        <button class="btn-add" style="width:100%; background:var(--success)" onclick="registrar()">ENVIAR SOLICITUD</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [], usuarios = [], pedidos = [];
    let esMay = localStorage.getItem("ms47_session") === "true";

    // DATA SYNC
    db.collection("productos").onSnapshot(s => { productos = s.docs.map(d=>({id:d.id, ...d.data()})); render(); renderAdminP(); });
    db.collection("usuarios").onSnapshot(s => { usuarios = s.docs.map(d=>({id:d.id, ...d.data()})); renderAdminU(); });
    db.collection("pedidos").orderBy("fecha","desc").onSnapshot(s => { pedidos = s.docs.map(d=>({id:d.id, ...d.data()})); renderAdminO(); });

    function render() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(q)).map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <div class="product-title">${p.nombre}</div>
                    <div class="price-val">$${esMay ? p.precio_may : p.precio}</div>
                    <button class="btn-add" onclick="add('${p.id}')">AGREGAR</button>
                </div>
            </div>
        `).join("");
        document.getElementById("statusBadge").style.display = esMay ? "block" : "none";
    }

    function add(id) {
        const item = carrito.find(c => c.id === id);
        if(item) item.qty++; else carrito.push({id, qty:1});
        updateCart();
    }

    function updateCart() {
        let total = 0, count = 0;
        const list = document.getElementById("cartItemsList");
        list.innerHTML = carrito.map(c => {
            const p = productos.find(x => x.id === c.id);
            const precioBase = esMay ? p.precio_may : p.precio;
            let sub = precioBase * c.qty;

            if(!esMay && p.promo && p.promo.toLowerCase().includes('x')) {
                const parts = p.promo.toLowerCase().split('x');
                const qP = parseInt(parts[0]), vP = parseInt(parts[1]);
                if(c.qty >= qP) sub = (Math.floor(c.qty / qP) * vP) + ((c.qty % qP) * precioBase);
            }
            total += sub; count += c.qty;
            return `
                <div class="admin-item">
                    <div><b>${p.nombre}</b><br>$${sub}</div>
                    <div style="display:flex; gap:8px; align-items:center">
                        <button class="qty-btn" onclick="changeQty('${c.id}',-1)">-</button>
                        <span>${c.qty}</span>
                        <button class="qty-btn" onclick="changeQty('${c.id}',1)">+</button>
                    </div>
                </div>`;
        }).join("");
        document.getElementById("cartTotal").innerText = "Total: $" + total;
        document.getElementById("cartCount").innerText = count;
    }

    function changeQty(id, d) {
        const item = carrito.find(c => c.id === id);
        if(item) {
            item.qty += d;
            if(item.qty <= 0) carrito = carrito.filter(c => c.id !== id);
            updateCart();
        }
    }

    async function enviarPedido() {
        if(!carrito.length) return;
        const total = document.getElementById("cartTotal").innerText;
        const items = carrito.map(c => ({n: productos.find(x=>x.id===c.id).nombre, q: c.qty}));
        await db.collection("pedidos").add({ items, total, fecha: Date.now() });
        let msg = `*PEDIDO MS47*\n` + items.map(i => `• ${i.n} (x${i.q})`).join("\n") + `\n\n*${total}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        carrito = []; updateCart(); closeAll();
    }

    // ADMIN LOGIC
    function showTab(id) {
        ["tab-p","tab-u","tab-o"].forEach(t => document.getElementById(t).style.display = t === id ? "block" : "none");
    }

    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = { 
            nombre: document.getElementById("fNom").value, 
            precio: Number(document.getElementById("fPre").value), 
            precio_may: Number(document.getElementById("fPreM").value), 
            promo: document.getElementById("fPromo").value, 
            imagen: document.getElementById("fImg").value 
        };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        document.getElementById("editId").value = "";
        alert("¡Listo!");
    }

    function renderAdminP() {
        document.getElementById("adminProds").innerHTML = productos.map(p => `
            <div class="admin-item">
                <span>${p.nombre}</span>
                <div>
                    <button onclick="editP('${p.id}')">✏️</button>
                    <button onclick="borrarDoc('productos','${p.id}')">🗑️</button>
                </div>
            </div>
        `).join("");
    }

    function editP(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("editId").value = p.id;
        document.getElementById("fNom").value = p.nombre;
        document.getElementById("fPre").value = p.precio;
        document.getElementById("fPreM").value = p.precio_may;
        document.getElementById("fPromo").value = p.promo || "";
        document.getElementById("fImg").value = p.imagen;
    }

    function renderAdminU() {
        document.getElementById("adminUsers").innerHTML = usuarios.map(u => `
            <div class="admin-item">
                <span>${u.user} (${u.tel})</span>
                ${u.activo ? '✅' : `<button onclick="activarU('${u.id}')">Activar</button>`}
            </div>
        `).join("");
    }

    function renderAdminO() {
        document.getElementById("adminOrders").innerHTML = pedidos.map(o => `
            <div class="admin-item" style="font-size:12px">
                <span>${new Date(o.fecha).toLocaleDateString()} - ${o.total}</span>
            </div>
        `).join("");
    }

    async function activarU(id) { await db.collection("usuarios").doc(id).update({activo: true}); }
    async function borrarDoc(c, id) { if(confirm("¿Borrar?")) await db.collection(c).doc(id).delete(); }

    // AUTH
    async function login() {
        const u = document.getElementById("lUser").value, p = document.getElementById("lPass").value;
        if(u === "admin" && p === "admin") return abrirModal("adminModal");
        const user = usuarios.find(x => x.user === u && x.pass === p);
        if(user && user.activo) { localStorage.setItem("ms47_session", "true"); location.reload(); }
        else alert("Error o falta aprobación");
    }

    async function registrar() {
        await db.collection("usuarios").add({ user: document.getElementById("rUser").value, pass: document.getElementById("rPass").value, tel: document.getElementById("rTel").value, activo: false });
        alert("Solicitud enviada"); closeAll();
    }

    function logout() { localStorage.removeItem("ms47_session"); location.reload(); }
    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function closeAll() { document.querySelectorAll(".drawer, .modal, .overlay").forEach(e => e.classList.remove("active")); document.querySelectorAll(".modal").forEach(e => e.style.display="none"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    function verificarAdmin() { if(prompt("Clave:") === "admin") abrirModal("adminModal"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
</script>
</body>
</html>
