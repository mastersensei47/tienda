<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO REPUESTOS - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444; --sidebar: #1e293b;
        }
        body.light {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --sidebar: #2563eb;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; }
        
        /* HEADER & SIDEBAR */
        header { display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:var(--card); position:sticky; top:0; z-index:1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: var(--sidebar); color: white; transition: 0.3s; z-index: 2000; padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid #ffffff22; cursor: pointer; }

        /* BUSCADOR INTELIGENTE */
        .search-box { background: rgba(0,0,0,0.1); border: 1px solid #444; padding: 8px 15px; border-radius: 20px; color: inherit; outline: none; width: 200px; }

        /* PRODUCTOS */
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:20px; }
        .card { background:var(--card); padding:15px; border-radius:15px; text-align:center; position:relative; border: 1px solid #334155; }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .promo-tag { position:absolute; top:10px; left:10px; background:var(--promo); color:black; font-size:10px; font-weight:bold; padding:3px 7px; border-radius:5px; }

        /* CARRITO */
        #cartDrawer { position:fixed; right:-400px; top:0; width:340px; height:100%; background:var(--card); transition:0.3s; z-index:3500; padding:25px; box-shadow:-10px 0 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
        .cart-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:rgba(0,0,0,0.05); padding:10px; border-radius:8px; }
        .qty-btn { background:var(--accent); border:none; color:white; width:25px; height:25px; border-radius:5px; cursor:pointer; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.1); color: inherit; border: 1px solid #444; border-radius: 8px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th, td { border-bottom: 1px solid #444; padding: 10px; text-align: left; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px">
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size:25px">☰</span>
        <b style="cursor:pointer" onclick="location.reload()">NEO REPUESTOS</b>
    </div>
    <input type="text" id="busq" class="search-box" placeholder="Buscar repuesto..." onkeyup="render()">
    <div style="display:flex; gap:15px; align-items:center">
        <span onclick="toggleTheme()" style="cursor:pointer">🌗</span>
        <span onclick="abrirAdmin()" style="cursor:pointer">⚙️</span>
        <div onclick="toggleCart()" style="cursor:pointer; position:relative">
            🛒 <b id="cartBadge" style="position:absolute; top:-8px; right:-8px; background:red; color:white; font-size:10px; padding:2px 6px; border-radius:50%">0</b>
        </div>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <h2>Menú</h2>
    <a onclick="closeAll()">🏠 Inicio</a>
    <a onclick="abrirModal('loginModal')">👤 Área Mayorista</a>
    <a href="https://wa.me/5493434508948">📞 Contacto Directo</a>
    <a onclick="toggleTheme()">🌗 Cambiar Tema</a>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div class="products" id="productsCont"></div>

<div id="cartDrawer">
    <h3>Tu Pedido</h3>
    <div id="cartList" style="flex-grow:1; overflow-y:auto"></div>
    <div style="border-top:1px solid #444; padding-top:15px">
        <div id="totalDisplay" style="font-size:18px; font-weight:bold; margin-bottom:15px">Total: $0</div>
        <button class="btn-main" style="background:#25d366" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <div id="secLogin">
            <h3>Login Mayorista</h3>
            <input id="u" placeholder="Usuario">
            <input id="p_log" type="password" placeholder="Contraseña">
            <button class="btn-main" onclick="validarLogin()">INGRESAR</button>
            <p style="font-size:12px; text-align:center">¿Nuevo aquí? <a onclick="toggleAuth('R')" style="color:var(--accent); cursor:pointer">Registrate</a></p>
        </div>
        <div id="secReg" style="display:none">
            <h3>Solicitud de Alta</h3>
            <input id="rn" placeholder="Nombre/Empresa">
            <input id="rc" placeholder="CUIT">
            <input id="re" placeholder="Email">
            <button class="btn-main" style="background:var(--success)" onclick="registrarMay()">ENVIAR SOLICITUD</button>
            <button class="btn-main" style="background:none; border:1px solid #444; margin-top:5px" onclick="toggleAuth('L')">VOLVER</button>
        </div>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <span onclick="cerrarModales()" style="float:right; cursor:pointer">✕</span>
        <h2>Panel Admin</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="btn-main" onclick="tabAdmin('prods')">Stock</button>
            <button class="btn-main" style="background:#6366f1" onclick="tabAdmin('solis')">Solicitudes</button>
            <button class="btn-main" style="background:var(--success)" onclick="tabAdmin('ventas')">Ventas</button>
        </div>

        <div id="tabProds">
            <div style="background:rgba(0,0,0,0.1); padding:15px; border-radius:10px">
                <input type="hidden" id="eid">
                <input id="an" placeholder="Nombre">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px">
                    <input id="ap" type="number" placeholder="Precio">
                    <input id="apm" type="number" placeholder="Precio May.">
                    <input id="as" type="number" placeholder="Stock">
                </div>
                <input id="apromo" placeholder="Ej: 2x1 o 2 unidades por $5000">
                <input id="ai" placeholder="URL Imagen">
                <button class="btn-main" onclick="guardarFirebase()">GUARDAR</button>
            </div>
            <table>
                <thead><tr><th>Nombre</th><th>Acciones</th></tr></thead>
                <tbody id="bodyProds"></tbody>
            </table>
        </div>

        <div id="tabSolis" style="display:none">
            <table>
                <thead><tr><th>Nombre</th><th>Acciones</th></tr></thead>
                <tbody id="bodySolis"></tbody>
            </table>
        </div>

        <div id="tabVentas" style="display:none">
            <button onclick="vaciarVentas()" style="background:red; color:white; padding:8px; border:none; border-radius:5px; margin-bottom:10px">VACIAR TODO</button>
            <table>
                <thead><tr><th>Hora</th><th>Total</th><th>Acción</th></tr></thead>
                <tbody id="bodyVentas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let repuestos = [];
    let carrito = [];
    let esMayorista = sessionStorage.getItem("esMayorista") === "true";

    // SINCRONIZACIÓN
    db.collection("productos").onSnapshot(snap => {
        repuestos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        cargarTablaProds();
    });

    db.collection("solicitudes_mayoristas").onSnapshot(snap => {
        cargarTablaSolis(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
    });

    db.collection("ventas").orderBy("creado", "desc").onSnapshot(snap => {
        cargarTablaVentas(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
    });

    // RENDER CON BUSCADOR
    function render() {
        const busq = document.getElementById("busq").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        cont.innerHTML = repuestos.filter(r => r.nombre.toLowerCase().includes(busq)).map(r => `
            <div class="card">
                ${r.promo ? `<div class="promo-tag">${r.promo}</div>` : ''}
                <img src="${r.imagen || 'https://via.placeholder.com/150'}">
                <h4>${r.nombre}</h4>
                <div style="font-weight:bold; color:var(--accent)">$${esMayorista ? r.precio_may : r.precio}</div>
                <button class="btn-main" onclick="addCar('${r.id}')">AGREGAR</button>
            </div>`).join("");
    }

    // CARRITO CON CONTROLES (+ / -)
    function addCar(id) {
        const item = carrito.find(c => c.id === id);
        if(item) item.qty++; else carrito.push({id, qty:1});
        upCart();
    }

    function modQty(id, val) {
        const item = carrito.find(c => c.id === id);
        if(item) {
            item.qty += val;
            if(item.qty <= 0) carrito = carrito.filter(c => c.id !== id);
        }
        upCart();
    }

    function upCart() {
        const list = document.getElementById("cartList");
        let total = 0;
        list.innerHTML = carrito.map(c => {
            const r = repuestos.find(x => x.id === c.id);
            const sub = (esMayorista ? r.precio_may : r.precio) * c.qty;
            total += sub;
            return `
            <div class="cart-item">
                <div style="font-size:12px"><b>${r.nombre}</b><br>$${sub}</div>
                <div>
                    <button class="qty-btn" onclick="modQty('${r.id}', -1)">-</button>
                    <span style="margin:0 8px">${c.qty}</span>
                    <button class="qty-btn" onclick="modQty('${r.id}', 1)">+</button>
                </div>
            </div>`;
        }).join("");
        document.getElementById("totalDisplay").innerText = "Total: $" + total;
        document.getElementById("cartBadge").innerText = carrito.length;
    }

    async function enviarWhatsApp() {
        const ahora = new Date();
        const fHora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let total = 0;
        let detalle = carrito.map(c => {
            const r = repuestos.find(x => x.id === c.id);
            total += (esMayorista ? r.precio_may : r.precio) * c.qty;
            return `${r.nombre} (x${c.qty})`;
        }).join(", ");

        await db.collection("ventas").add({ creado: ahora.getTime(), hora: fHora, total, detalle });
        window.open(`https://wa.me/5493434508948?text=Nuevo Pedido: ${detalle} | Total: $${total}`);
        carrito = []; upCart(); closeAll();
    }

    // ADMIN ACTIONS
    function cargarTablaProds() {
        document.getElementById("bodyProds").innerHTML = repuestos.map(r => `
            <tr><td>${r.nombre}</td>
            <td><button onclick="editarProd('${r.id}')">✏️</button>
            <button onclick="eliminarProd('${r.id}')">🗑️</button></td></tr>`).join("");
    }

    async function eliminarProd(id) { if(confirm("¿Eliminar?")) await db.collection("productos").doc(id).delete(); }

    function cargarTablaSolis(solis) {
        document.getElementById("bodySolis").innerHTML = solis.map(s => `
            <tr><td>${s.nombre}</td>
            <td><button style="color:green" onclick="aceptarSoli('${s.id}')">✅</button>
            <button style="color:red" onclick="borrarSoli('${s.id}')">🗑️</button></td></tr>`).join("");
    }

    async function aceptarSoli(id) {
        const s = (await db.collection("solicitudes_mayoristas").doc(id).get()).data();
        await db.collection("clientes_aprobados").add(s);
        await db.collection("solicitudes_mayoristas").doc(id).delete();
        alert("Aprobado");
    }

    async function borrarSoli(id) { await db.collection("solicitudes_mayoristas").doc(id).delete(); }

    function cargarTablaVentas(ventas) {
        document.getElementById("bodyVentas").innerHTML = ventas.map(v => `
            <tr><td>${v.hora}</td><td>$${v.total}</td>
            <td><button onclick="borrarVenta('${v.id}')">🗑️</button></td></tr>`).join("");
    }

    async function borrarVenta(id) { await db.collection("ventas").doc(id).delete(); }
    async function vaciarVentas() { if(confirm("¿Vaciar todo?")) { const s = await db.collection("ventas").get(); s.forEach(d => d.ref.delete()); } }

    async function guardarFirebase() {
        const id = document.getElementById("eid").value;
        const d = { 
            nombre: document.getElementById("an").value, precio: Number(document.getElementById("ap").value),
            precio_may: Number(document.getElementById("apm").value), stock: Number(document.getElementById("as").value),
            promo: document.getElementById("apromo").value, imagen: document.getElementById("ai").value
        };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        document.getElementById("eid").value="";
    }

    function editarProd(id) {
        const r = repuestos.find(x => x.id === id);
        document.getElementById("eid").value=r.id; document.getElementById("an").value=r.nombre;
        document.getElementById("ap").value=r.precio; document.getElementById("apm").value=r.precio_may;
        document.getElementById("as").value=r.stock; document.getElementById("apromo").value=r.promo || "";
    }

    // UI TOOLS
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleCart() { const c = document.getElementById("cartDrawer"); c.style.right = c.style.right === "0px" ? "-400px" : "0px"; document.getElementById("overlay").classList.toggle("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
    function cerrarModales() { document.querySelectorAll(".modal").forEach(m => m.style.display="none"); }
    function closeAll() { cerrarModales(); document.getElementById("sidebar").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); document.getElementById("cartDrawer").style.right = "-400px"; }
    function toggleAuth(v) { document.getElementById("secLogin").style.display = v==='L'?'block':'none'; document.getElementById("secReg").style.display = v==='R'?'block':'none'; }
    function abrirAdmin() { if(prompt("Clave:") === "admin") abrirModal("adminModal"); }
    function tabAdmin(t) { document.getElementById("tabProds").style.display = t==='prods'?'block':'none'; document.getElementById("tabSolis").style.display = t==='solis'?'block':'none'; document.getElementById("tabVentas").style.display = t==='ventas'?'block':'none'; }
    function validarLogin() { if(document.getElementById("u").value === "mayorista") { esMayorista=true; sessionStorage.setItem("esMayorista", "true"); closeAll(); render(); } }
    async function registrarMay() { await db.collection("solicitudes_mayoristas").add({ nombre: document.getElementById("rn").value, cuit: document.getElementById("rc").value }); alert("Enviado"); toggleAuth('L'); }
</script>
</body>
</html>
