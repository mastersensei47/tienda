<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>master sensei47</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
display:flex;
background:#0f172a;
color:#fff;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111827;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.3s;
position:fixed;
}

.sidebar.collapsed{
width:80px;
}

.sidebar-header{
display:flex;
align-items:center;
gap:12px;
padding:20px 15px;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo-img{
width:45px;
height:45px;
object-fit:contain;
}

.logo-text{
font-size:18px;
font-weight:700;
white-space:nowrap;
transition:.3s;
}

.sidebar.collapsed .logo-text{
opacity:0;
width:0;
overflow:hidden;
}

/* MENU */
.menu{
list-style:none;
padding:15px 0;
}

.menu li{
padding:12px 20px;
display:flex;
align-items:center;
gap:15px;
cursor:pointer;
transition:.2s;
}

.menu li:hover{
background:rgba(255,255,255,.1);
}

.menu i{
width:20px;
text-align:center;
font-size:18px;
}

.sidebar.collapsed .menu span{
display:none;
}

/* FOOTER */
.sidebar-footer{
padding:15px;
border-top:1px solid rgba(255,255,255,.1);
}

.contact{
font-size:14px;
margin-bottom:10px;
}

.socials{
display:flex;
gap:10px;
margin-top:8px;
}

.socials i{
font-size:18px;
cursor:pointer;
transition:.2s;
}

.socials i:hover{
color:#38bdf8;
}

.sidebar.collapsed .contact,
.sidebar.collapsed .socials{
display:none;
}

/* BOTON TOGGLE */
.toggle-btn{
position:absolute;
top:15px;
right:-15px;
background:#38bdf8;
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#000;
font-size:14px;
}

/* CONTENIDO */
.content{
margin-left:260px;
padding:30px;
flex:1;
transition:.3s;
}

.sidebar.collapsed ~ .content{
margin-left:80px;
}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{
position:fixed;
left:-260px;
}
.sidebar.active{
left:0;
}
.content{
margin-left:0;
}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">

<div>
<div class="sidebar-header">
<img src="logo.png" alt="Neo Repuestos" class="logo-img">
<span class="logo-text">ms47</span>
</div>

<ul class="menu">
<li><i class="fas fa-home"></i><span>Inicio</span></li>
<li><i class="fas fa-circle-info"></i><span>Información</span></li>
<li><i class="fas fa-location-dot"></i><span>Ubicación</span></li>
<li><i class="fab fa-instagram"></i><span>Instagram</span></li>
<li><i class="fab fa-whatsapp"></i><span>WhatsApp</span></li>
</ul>
</div>

<div class="sidebar-footer">
<div class="contact">
<strong>Contacto</strong><br>
+54 9 343 4508948
</div>

<div class="socials">
<i class="fab fa-facebook"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-whatsapp"></i>
</div>
</div>

<div class="toggle-btn" onclick="toggleSidebar()">
<i class="fas fa-chevron-left"></i>
</div>

</div>

<div class="content">
<h1>Bienvenido a MS47</h1>
<p>Contenido principal de tu tienda...</p>
</div>

<script>
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("collapsed")
}
</script>

</body>
</html>
