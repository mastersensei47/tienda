<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO</title>
    <style>
        /* Variables y Colores */
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #2563eb; --sidebar: #1e40af;
        }
        body { 
            margin: 0; font-family: sans-serif; 
            background-color: var(--bg); color: var(--text); 
        }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--card); position: sticky; top: 0; z-index: 100;
        }
        .search-bar { flex-grow: 1; margin: 0 15px; }
        .search-bar input { width: 100%; padding: 8px; border-radius: 5px; border: none; }

        /* Sidebar (Menú Lateral) */
        #sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar); transition: 0.3s; z-index: 1000;
        }
        #sidebar.active { left: 0; }
        #sidebar a, #sidebar button {
            display: block; padding: 15px 20px; color: white; text-decoration: none;
            background: none; border: none; width: 100%; text-align: left; font-size: 16px; cursor: pointer;
        }
        #sidebar a:hover { background: rgba(255,255,255,0.1); }

        /* Contenedor de Productos */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .price { color: #60a5fa; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .promo { color: #4ade80; font-size: 13px; margin-bottom: 10px; }

        /* Carrito Lateral */
        #cartDrawer {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--card); transition: 0.3s; z-index: 1000; padding: 15px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #cartDrawer.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }

        /* Panel Admin */
        #adminPanel { 
            display: none; background: #000; color: white; padding: 20px; 
            position: fixed; top: 10%; left: 5%; width: 90%; max-height: 80%; overflow-y: auto; z-index: 2000; border: 2px solid var(--accent);
        }
        .admin-grid input { width: 90%; padding: 8px; margin: 5px; }

        /* Botones Generales */
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
    <div class="search-bar"><input type="text" placeholder="Buscar producto..." onkeyup="buscar(this.value)"></div>
    <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">🛒</button>
</header>

<div id="sidebar">
    <div style="padding:20px; font-weight:bold; background:rgba(0,0,0,0.2)">MENU</div>
    <a href="#" onclick="toggleMenu()">🏠 Inicio</a>
    <button onclick="accesoAdmin()">🔑 Administrador</button>
    <a href="https://instagram.com" target="_blank">📸 Instagram</a>
</div>

<div id="cartDrawer">
    <h3>Tu Pedido</h3>
    <div id="cartList"></div>
    <hr>
    <p>Total: <span id="cartTotal">$0</span></p>
    <button class="btn-add" onclick="enviarWhatsApp()" style="background:#25d366">Pedir por WhatsApp</button>
    <button onclick="toggleCart()" style="width:100%; margin-top:10px">Cerrar</button>
</div>

<div id="adminPanel">
    <h3>Panel de Control</h3>
    <div class="admin-grid">
        <input id="in-name" placeholder="Nombre">
        <input id="in-price" type="number" placeholder="Precio Individual">
        <input id="in-x2" type="number" placeholder="Precio Promo x2">
        <input id="in-stock" type="number" placeholder="Stock">
        <input id="in-img" placeholder="Link de Imagen">
    </div>
    <button class="btn-add" onclick="guardarProducto()">Guardar</button>
    <button onclick="cerrarAdmin()" style="width:100%; margin-top:10px">Cerrar</button>
    <hr>
    <div id="adminList"></div>
</div>

<div class="overlay" id="overlay" onclick="cerrarTodo()"></div>

<div class="container" id="productGrid"></div>

<script>
    let productos = JSON.parse(localStorage.getItem("prods")) || [];
    let carrito = [];

    function render(lista = productos) {
        const grid = document.getElementById("productGrid");
        grid.innerHTML = "";
        lista.forEach((p, i) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <h4>${p.name}</h4>
                    <div class="price">$${p.p1}</div>
                    ${p.p2 > 0 ? `<div class="promo">2 unidades por $${p.p2}</div>` : ''}
                    <button class="btn-add" onclick="agregar(${i})">Agregar</button>
                </div>`;
        });
    }

    // --- FUNCIONES CARRITO ---
    function agregar(idx) {
        const p = productos[idx];
        const existente = carrito.find(item => item.id === idx);
        if (existente) existente.qty++;
        else carrito.push({ id: idx, qty: 1 });
        actualizarCarrito();
    }

    function actualizarCarrito() {
        const list = document.getElementById("cartList");
        let total = 0;
        list.innerHTML = "";
        
        carrito.forEach((item, i) => {
            const p = productos[item.id];
            let subtotal = 0;
            // Cálculo de promo x2
            if(p.p2 > 0 && item.qty >= 2) {
                let pares = Math.floor(item.qty / 2);
                let sueltos = item.qty % 2;
                subtotal = (pares * p.p2) + (sueltos * p.p1);
            } else {
                subtotal = item.qty * p.p1;
            }
            total += subtotal;
            list.innerHTML += `<div class="cart-item">${p.name} x${item.qty} <span>$${subtotal}</span></div>`;
        });
        document.getElementById("cartTotal").innerText = "$" + total;
    }

    // --- FUNCIONES ADMIN ---
    function accesoAdmin() {
        if(prompt("Contraseña:") === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            actualizarListaAdmin();
        }
    }

    function guardarProducto() {
        const p = {
            name: document.getElementById("in-name").value,
            p1: parseInt(document.getElementById("in-price").value),
            p2: parseInt(document.getElementById("in-x2").value) || 0,
            stock: parseInt(document.getElementById("in-stock").value),
            img: document.getElementById("in-img").value
        };
        productos.push(p);
        localStorage.setItem("prods", JSON.stringify(productos));
        render();
        actualizarListaAdmin();
    }

    function actualizarListaAdmin() {
        const list = document.getElementById("adminList");
        list.innerHTML = productos.map((p, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                ${p.name} <button onclick="eliminar(${i})" style="color:red">Eliminar</button>
            </div>`).join("");
    }

    function eliminar(i) {
        productos.splice(i, 1);
        localStorage.setItem("prods", JSON.stringify(productos));
        render(); actualizarListaAdmin();
    }

    // --- UI ---
    function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
    function cerrarTodo() { 
        document.getElementById("sidebar").classList.remove("active"); 
        document.getElementById("cartDrawer").classList.remove("active"); 
        document.getElementById("overlay").classList.remove("active"); 
    }
    function cerrarAdmin() { document.getElementById("adminPanel").style.display = "none"; }
    function buscar(t) { render(productos.filter(p => p.name.toLowerCase().includes(t.toLowerCase()))); }

    function enviarWhatsApp() {
        let texto = "Hola, mi pedido es:\n";
        carrito.forEach(item => {
            texto += `- ${productos[item.id].name} x${item.qty}\n`;
        });
        texto += "Total: " + document.getElementById("cartTotal").innerText;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(texto)}`);
    }

    render();
</script>
</body>
</html>
