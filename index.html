<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Pro</title>
<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111;
--accent:#0d6efd;
--darkbg:#121212;
--darkcard:#1e1e1e;
--darktext:#f1f1f1;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
transition:.3s;
}

.dark{
background:var(--darkbg);
color:var(--darktext);
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:var(--accent);
color:white;
font-weight:bold;
}

button{
cursor:pointer;
border:none;
padding:6px 10px;
border-radius:6px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.dark .card{
background:var(--darkcard);
}

.price{
font-size:18px;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:red;
font-size:14px;
}

.promo-label{
background:red;
color:white;
padding:2px 6px;
font-size:12px;
border-radius:4px;
margin-left:5px;
}

.drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:var(--card);
box-shadow:-5px 0 20px rgba(0,0,0,.2);
padding:20px;
transition:.3s;
overflow:auto;
z-index:999;
}

.dark .drawer{
background:var(--darkcard);
}

.drawer.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.admin-panel{
position:fixed;
inset:0;
background:white;
z-index:1000;
display:none;
overflow:auto;
padding:20px;
}

.dark .admin-panel{
background:#1e1e1e;
color:white;
}

.section{
margin-bottom:30px;
}

input,select{
padding:5px;
margin:5px 0;
width:100%;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<header>
<div>Tienda Pro</div>
<div>
<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleCart()">🛍</button>
<button onclick="openAdmin()">⚙</button>
</div>
</header>

<div class="product-grid" id="products"></div>

<div class="drawer" id="cartDrawer">
<h3>Carrito</h3>
<div id="cartItems"></div>
<hr>
<div id="cartSummary"></div>

<h4>Entrega</h4>
<select id="deliveryType" onchange="renderForm()">
<option value="local">Retiro en local</option>
<option value="envio">Envío a domicilio</option>
</select>

<div id="deliveryForm"></div>

<button onclick="sendOrder()">Hacer Pedido</button>
</div>

<div class="admin-panel" id="adminPanel">
<h2>Panel Admin</h2>
<button onclick="closeAdmin()">Volver</button>

<div class="section">
<h3>Productos</h3>
<input id="pName" placeholder="Nombre">
<input id="pPrice" placeholder="Precio normal">
<input id="pPromo" placeholder="Precio promo (opcional)">
<label><input type="checkbox" id="p3x2"> Activar 3x2</label>
<button onclick="addProduct()">Agregar</button>
<div id="adminProducts"></div>
</div>

<div class="section">
<h3>Envío</h3>
<input id="shippingPrice" placeholder="Precio envío">
<button onclick="saveShipping()">Guardar</button>
</div>

<div class="section">
<h3>Historial</h3>
<div id="history"></div>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];
let cart=[];
let shipping=localStorage.getItem("shipping")||0;
let history=JSON.parse(localStorage.getItem("history"))||[];

function saveData(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("shipping",shipping);
localStorage.setItem("history",JSON.stringify(history));
}

function renderProducts(){
let container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
let priceHTML="";
if(p.promo){
priceHTML=`
<div class="price">$${p.price}</div>
<div class="old">$${p.promo}</div>
<span class="promo-label">PROMO</span>
`;
}else{
priceHTML=`<div class="price">$${p.price}</div>`;
}
container.innerHTML+=`
<div class="card">
<h4>${p.name}</h4>
${priceHTML}
<button onclick="addToCart(${i})">Agregar</button>
</div>`;
});
}

function addProduct(){
let name=document.getElementById("pName").value;
let price=parseFloat(document.getElementById("pPrice").value);
let promo=parseFloat(document.getElementById("pPromo").value);
let is3x2=document.getElementById("p3x2").checked;
products.push({name,price,promo:promo||null,is3x2});
saveData();
renderProducts();
renderAdminProducts();
}

function renderAdminProducts(){
let container=document.getElementById("adminProducts");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div>
${p.name} - $${p.price}
<button onclick="deleteProduct(${i})">Eliminar</button>
</div>`;
});
}

function deleteProduct(i){
products.splice(i,1);
saveData();
renderProducts();
renderAdminProducts();
}

function addToCart(i){
let existing=cart.find(c=>c.index===i);
if(existing){
existing.qty++;
}else{
cart.push({index:i,qty:1});
}
renderCart();
}

function renderCart(){
let items=document.getElementById("cartItems");
items.innerHTML="";
let total=0;
let ahorro=0;

cart.forEach(c=>{
let p=products[c.index];
let unit=p.price;
if(p.promo) ahorro+=(p.promo-p.price)*c.qty;

if(p.is3x2){
let free=Math.floor(c.qty/3);
ahorro+=free*unit;
total+=unit*(c.qty-free);
}else{
total+=unit*c.qty;
}

items.innerHTML+=`
<div class="cart-item">
<div>${p.name} x${c.qty}</div>
<div>
<button onclick="changeQty(${c.index},-1)">-</button>
${c.qty}
<button onclick="changeQty(${c.index},1)">+</button>
<button onclick="removeItem(${c.index})">🗑</button>
</div>
</div>`;
});

if(document.getElementById("deliveryType").value==="envio"){
total+=parseFloat(shipping);
}

document.getElementById("cartSummary").innerHTML=`
Subtotal: $${total}<br>
Ahorro: $${ahorro}<br>
Envío: ${document.getElementById("deliveryType").value==="envio"?"$"+shipping:"Gratis"}
`;
}

function changeQty(i,val){
let item=cart.find(c=>c.index===i);
item.qty+=val;
if(item.qty<=0) cart=cart.filter(c=>c.index!==i);
renderCart();
}

function removeItem(i){
cart=cart.filter(c=>c.index!==i);
renderCart();
}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("open");
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

function openAdmin(){
let pass=prompt("Contraseña:");
if(pass==="admin"){
document.getElementById("adminPanel").style.display="block";
renderAdminProducts();
renderHistory();
}else{
alert("Incorrecta");
}
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function saveShipping(){
shipping=document.getElementById("shippingPrice").value||0;
saveData();
alert("Guardado");
}

function renderForm(){
let type=document.getElementById("deliveryType").value;
let form=document.getElementById("deliveryForm");
if(type==="envio"){
form.innerHTML=`
<input id="name" placeholder="Nombre">
<input id="address" placeholder="Dirección">
<input id="phone" placeholder="Teléfono">
`;
}else{
form.innerHTML=`
<input id="name" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">
`;
}
renderCart();
}

function sendOrder(){
let type=document.getElementById("deliveryType").value;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=type==="envio"?document.getElementById("address").value:"Retira en local";

let message="Pedido:\n";
cart.forEach(c=>{
let p=products[c.index];
message+=`${p.name} x${c.qty} - $${p.price*c.qty}\n`;
});
message+=`Entrega: ${address}`;
window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(message)}`);

history.push({date:new Date().toLocaleString(),cart,type,address});
saveData();
cart=[];
renderCart();
toggleCart();
}

function renderHistory(){
let container=document.getElementById("history");
container.innerHTML="";
history.forEach(h=>{
container.innerHTML+=`
<div>
${h.date}<br>
Entrega: ${h.address}
<hr>
</div>`;
});
}

renderProducts();
renderForm();
</script>

</body>
</html>
