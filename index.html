<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO REPUESTOS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6; --promo: #f59e0b; --success: #10b981; }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--card); position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .cart-icon { cursor: pointer; position: relative; font-size: 22px; }
        .badge { position: absolute; top: -8px; right: -10px; background: #ef4444; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* GRID PRODUCTOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; position: relative; }
        .promo-tag { background: var(--promo); color: #000; font-size: 11px; font-weight: 800; padding: 6px; text-align: center; }
        .img-container { background: #fff; height: 130px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info { padding: 12px; flex-grow: 1; }
        .price { font-size: 19px; font-weight: 900; color: var(--accent); margin-top: 5px; }
        
        /* CARRITO LATERAL */
        #cartSide { position: fixed; right: -100%; top: 0; width: 100%; max-width: 360px; height: 100%; background: #111827; z-index: 4000; transition: 0.4s; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #cartSide.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000; display: none; backdrop-filter: blur(4px); }
        
        /* FORMULARIOS */
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-wa { background: #25d366; color: white; margin-top: 20px; font-size: 16px; }
        
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; }
        #envioFields { display: none; margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <b style="letter-spacing: 1px;">NEO <span style="color:var(--accent)">REPUESTOS</span></b>
    <div class="cart-icon" onclick="toggleCart(true)">
        🛒 <span class="badge" id="cartBadge">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>
<div class="grid" id="mainGrid"></div>

<div id="cartSide">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0">Mi Pedido</h2>
        <span onclick="toggleCart(false)" style="cursor:pointer; font-size:28px">&times;</span>
    </div>

    <div id="cartList" style="flex-grow:1; overflow-y:auto; font-size: 14px;"></div>

    <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <label style="font-size:12px; color:var(--accent); font-weight:bold">MÉTODO DE ENTREGA</label>
        <select id="shipMethod" onchange="updateCartUI()">
            <option value="retiro">Retiro en Local</option>
            <option value="envio">Envío a Domicilio</option>
        </select>

        <div id="envioFields">
            <input type="text" id="shipName" placeholder="Nombre completo">
            <input type="text" id="shipDir" placeholder="Dirección">
            <input type="text" id="shipLoc" placeholder="Localidad">
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 15px;">
            <span style="font-size:18px">Total:</span>
            <b id="cartTotal" style="font-size:24px; color:var(--success)">$0</b>
        </div>
        
        <button class="btn btn-wa" onclick="sendWA()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let prods = [];
    let cart = [];

    // 1. CARGAR DATOS
    db.collection("productos").onSnapshot(snap => {
        prods = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderProds();
    });

    // 2. RENDER PRODUCTOS
    function renderProds() {
        const grid = document.getElementById("mainGrid");
        grid.innerHTML = prods.map(p => `
            <div class="card">
                ${p.promo ? `<div class="promo-tag">${p.promo}</div>` : ''}
                <div class="img-container"><img src="${p.imagen}"></div>
                <div class="info">
                    <small style="opacity:0.6; font-size:10px">📦 STOCK: ${p.stock || 0}</small>
                    <div style="font-weight:700; font-size:14px; margin-top:4px">${p.nombre}</div>
                    <div class="price">$${p.precio}</div>
                    <button class="btn btn-add" onclick="addCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
    }

    // 3. LOGICA CARRITO
    function addCart(id) {
        const item = cart.find(c => c.id === id);
        if(item) item.q++; else cart.push({id, q:1});
        updateCartUI();
        toggleCart(true);
    }

    function toggleCart(show) {
        document.getElementById("cartSide").classList.toggle("open", show);
        document.getElementById("overlay").style.display = show ? "block" : "none";
    }

    // 4. ACTUALIZACIÓN REAL DEL CARRITO (CON PROMOS Y ENVIO)
    function updateCartUI() {
        const list = document.getElementById("cartList");
        const badge = document.getElementById("cartBadge");
        const totalTxt = document.getElementById("cartTotal");
        const shipArea = document.getElementById("envioFields");
        const method = document.getElementById("shipMethod").value;

        // Mostrar u ocultar campos de envío
        shipArea.style.display = method === "envio" ? "block" : "none";

        let total = 0;
        let count = 0;
        let html = "";

        cart.forEach(c => {
            const p = prods.find(x => x.id === c.id);
            if(!p) return;

            let pUnit = parseFloat(p.precio);
            
            // Lógica de Promo: Extrae números del texto (Ej: "Llevando 2 4000")
            if(p.promo) {
                const n = p.promo.match(/\d+/g);
                if(n && n.length >= 2) {
                    const cantOferta = parseInt(n[0]);
                    const precioOferta = parseInt(n[1]);
                    if(c.q >= cantOferta) pUnit = precioOferta;
                }
            }

            const sub = pUnit * c.q;
            total += sub;
            count += c.q;

            html += `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px">
                <div>
                    <b>${p.nombre}</b><br>
                    <small>${c.q} x $${pUnit}</small>
                </div>
                <b style="color:var(--accent)">$${sub}</b>
            </div>`;
        });

        list.innerHTML = html || "<p style='text-align:center; opacity:0.5'>El carrito está vacío</p>";
        badge.innerText = count;
        totalTxt.innerText = "$" + total;
    }

    // 5. ENVÍO POR WHATSAPP
    function sendWA() {
        if(cart.length === 0) return alert("El carrito está vacío");

        const method = document.getElementById("shipMethod").value;
        const name = document.getElementById("shipName").value;
        const dir = document.getElementById("shipDir").value;
        const loc = document.getElementById("shipLoc").value;

        if(method === "envio" && (!name || !dir || !loc)) {
            return alert("Por favor completa los datos de envío");
        }

        let msg = "*NEO REPUESTOS - NUEVO PEDIDO*\n";
        msg += "---------------------------------\n";
        
        let grandTotal = 0;
        cart.forEach(c => {
            const p = prods.find(x => x.id === c.id);
            let pFinal = parseFloat(p.precio);
            if(p.promo) {
                const n = p.promo.match(/\d+/g);
                if(n && n.length >= 2 && c.q >= parseInt(n[0])) pFinal = parseInt(n[1]);
            }
            const sub = pFinal * c.q;
            grandTotal += sub;
            msg += `• ${p.nombre} (x${c.q}) - $${sub}\n`;
        });

        msg += "---------------------------------\n";
        msg += `*TOTAL A PAGAR: $${grandTotal}*\n\n`;
        msg += `📍 *ENTREGA:* ${method === 'envio' ? 'Envío a domicilio' : 'Retiro en local'}\n`;
        
        if(method === "envio") {
            msg += `👤 *Cliente:* ${name}\n🏠 *Dir:* ${dir}\n🏙️ *Loc:* ${loc}`;
        }

        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
