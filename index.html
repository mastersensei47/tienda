<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda PRO</title>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111;
--accent:#2563eb;
--accent2:#9333ea;
--shadow:0 15px 40px rgba(0,0,0,.1);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#22d3ee;
--accent2:#f43f5e;
--shadow:0 20px 60px rgba(0,0,0,.6);
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:var(--card);
box-shadow:var(--shadow);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:700;
font-size:20px;
background:linear-gradient(45deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}

.icon{
cursor:pointer;
font-size:22px;
margin-left:15px;
position:relative;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:var(--accent2);
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
padding:25px;
}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
box-shadow:var(--shadow);
transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.old{
text-decoration:line-through;
opacity:.6;
margin-left:5px;
font-size:14px;
}

.promo-badge{
background:linear-gradient(45deg,var(--accent),var(--accent2));
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:6px;
margin-left:6px;
}

button{
background:linear-gradient(45deg,var(--accent),var(--accent2));
border:none;
color:#fff;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:var(--card);
box-shadow:var(--shadow);
padding:20px;
transition:.4s;
overflow:auto;
z-index:2000;
}

.drawer.open{right:0}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
z-index:1500;
}

.overlay.show{display:block}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.admin-panel{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.admin-box{
background:var(--card);
padding:25px;
border-radius:15px;
width:95%;
max-width:900px;
max-height:90%;
overflow:auto;
}

input{
width:100%;
padding:6px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<header>
<div class="logo">Mi Tienda</div>
<div>
<span class="icon" onclick="toggleDark()">🌗</span>
<span class="icon" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></span>
<span class="icon" onclick="openAdmin()">⚙</span>
</div>
</header>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="drawer" id="drawer">
<h2>Carrito</h2>
<div id="cartItems"></div>
<hr>
<label><input type="checkbox" id="envioCheck"> Agregar envío</label>
<p>Total: $<span id="total">0</span></p>
<p id="ahorro" style="color:green"></p>
<button onclick="hacerPedido()">Hacer Pedido</button>
<button onclick="closeCart()">Cerrar</button>
</div>

<div class="admin-panel" id="adminPanel">
<div class="admin-box">
<h2>Panel Admin</h2>

<h3>Agregar Producto</h3>
<input id="n" placeholder="Nombre">
<input id="p" placeholder="Precio individual">
<input id="promo" placeholder="Precio promo (ej: precio por 2)">
<input id="stock" placeholder="Stock">
<input id="img" placeholder="URL imagen">
<label><input type="checkbox" id="promo2"> Activar promo precio reducido</label><br>
<label><input type="checkbox" id="tresx2"> Activar 3x2</label><br>
<input id="descManual" placeholder="Descuento manual ($)">
<button onclick="guardar()">Guardar</button>

<hr>
<h3>Productos</h3>
<div id="listaAdmin"></div>

<hr>
<h3>Envío</h3>
<input id="precioEnvio" placeholder="Precio envío">
<button onclick="guardarEnvio()">Guardar Envío</button>

<hr>
<h3>Historial</h3>
<div id="historial"></div>

<button onclick="cerrarAdmin()">Cerrar</button>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=[]
let shipping=localStorage.getItem("shipping")||0
let history=JSON.parse(localStorage.getItem("history"))||[]

function render(){
let c=document.getElementById("products")
c.innerHTML=""
products.forEach((p,i)=>{
let promoText=""
if(p.promo2){
promoText=`<div>
<span>$${p.price} c/u</span>
<span class="old">$${p.promo}</span>
<span class="promo-badge">PROMO</span>
</div>`
}else{
promoText=`<div>$${p.price}</div>`
}

c.innerHTML+=`
<div class="card">
<img src="${p.img||'https://via.placeholder.com/300'}">
<h3>${p.name}</h3>
${promoText}
<p>Stock: ${p.stock}</p>
<button onclick="add(${i})">Agregar</button>
</div>`
})
}

function hacerPedido(){
if(cart.length===0) return alert("Carrito vacío")

let total=document.getElementById("total").innerText
let envio=document.getElementById("envioCheck").checked?`Envío: $${shipping}`:"Sin envío"

let detalle=""
cart.forEach(c=>{
let p=products[c.i]
detalle+=`${p.name} x${c.qty} - $${p.price*c.qty}\n`
p.stock-=c.qty
})

let mensaje=`Pedido:\n${detalle}\n${envio}\nTotal: $${total}`
window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(mensaje)}`)

history.push({
fecha:new Date().toLocaleString(),
detalle:detalle,
envio:envio,
total:total
})

localStorage.setItem("history",JSON.stringify(history))
localStorage.setItem("products",JSON.stringify(products))

cart=[]
updateCart()
render()
}

function openAdmin(){
let pass=prompt("Contraseña:")
if(pass==="admin"){
adminPanel.style.display="flex"
cargarAdmin()
}else{
alert("Incorrecta")
}
}

function cargarAdmin(){
let l=document.getElementById("listaAdmin")
l.innerHTML=""
products.forEach((p,i)=>{
l.innerHTML+=`${p.name} - $${p.price} <button onclick="eliminar(${i})">Eliminar</button><br>`
})

let h=document.getElementById("historial")
h.innerHTML=history.map(x=>
`<p><b>${x.fecha}</b><br>${x.detalle.replace(/\n/g,"<br>")}<br>${x.envio}<br><b>Total:</b> $${x.total}</p><hr>`
).join("")
}

function toggleDark(){document.body.classList.toggle("dark")}
function openCart(){drawer.classList.add("open");overlay.classList.add("show")}
function closeCart(){drawer.classList.remove("open");overlay.classList.remove("show")}
function cerrarAdmin(){adminPanel.style.display="none"}
function guardarEnvio(){shipping=precioEnvio.value;localStorage.setItem("shipping",shipping)}
function eliminar(i){products.splice(i,1);localStorage.setItem("products",JSON.stringify(products));render();cargarAdmin()}
function guardar(){
products.push({
name:n.value,
price:parseInt(p.value),
promo:parseInt(promo.value)||0,
promo2:promo2.checked,
tresx2:tresx2.checked,
descManual:parseInt(descManual.value)||0,
stock:parseInt(stock.value),
img:img.value
})
localStorage.setItem("products",JSON.stringify(products))
render()
cargarAdmin()
}

function add(i){
let item=cart.find(x=>x.i==i)
if(item)item.qty++
else cart.push({i,qty:1})
updateCart()
}

function updateCart(){
let items=document.getElementById("cartItems")
items.innerHTML=""
let total=0
let ahorro=0

cart.forEach(c=>{
let p=products[c.i]
let subtotal=p.price*c.qty

total+=subtotal

items.innerHTML+=`
<div class="cart-item">
${p.name} x${c.qty}
<div>
<button onclick="cambiar(${c.i},-1)">-</button>
<button onclick="cambiar(${c.i},1)">+</button>
</div>
</div>`
})

if(document.getElementById("envioCheck").checked)
total+=parseInt(shipping)

document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0)
}

function cambiar(i,v){
let item=cart.find(x=>x.i==i)
item.qty+=v
if(item.qty<=0) cart=cart.filter(x=>x.i!=i)
updateCart()
}

render()
updateCart()
</script>

</body>
</html>
