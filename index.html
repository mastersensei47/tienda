<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO REPUESTOS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --text: #f1f5f9; --accent: #3b82f6; --promo: #f59e0b; --success: #10b981; }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }
        
        /* HEADER FIEL A LA IMAGEN */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .search-bar { flex: 1; max-width: 400px; margin: 0 20px; padding: 10px; border-radius: 8px; border: 1px solid #2d3748; background: #1a202c; color: white; }
        .cart-icon { cursor: pointer; position: relative; font-size: 22px; }
        .badge { position: absolute; top: -8px; right: -10px; background: #ef4444; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* GRID PRODUCTOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d3748; display: flex; flex-direction: column; position: relative; }
        .promo-tag { background: var(--promo); color: #000; font-size: 11px; font-weight: 800; padding: 8px; text-align: center; }
        .img-container { background: #fff; height: 150px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info { padding: 15px; flex-grow: 1; }
        .price { font-size: 24px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        
        /* PANELES LATERALES */
        .side-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 380px; height: 100%; background: #161b2a; z-index: 4000; transition: 0.3s ease; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .side-panel.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: none; backdrop-filter: blur(4px); }
        
        /* BOTONES Y FORMULARIOS */
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-add { background: #234785; color: white; }
        .btn-wa { background: #2ecc71; color: white; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d3748; background: #0b0f1a; color: white; box-sizing: border-box; }
        
        #envioFields { display: none; margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid var(--accent); }
        .admin-controls { display: flex; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <b onclick="checkAdmin()" style="cursor:pointer; font-size:20px;">NEO <span style="color:var(--accent)">REPUESTOS</span></b>
    <input type="text" class="search-bar" placeholder="Buscar producto..." onkeyup="renderProds(this.value)">
    <div class="cart-icon" onclick="togglePanel('cartSide', true)">
        🛒 <span class="badge" id="cartBadge">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closePanels()"></div>
<div class="grid" id="mainGrid"></div>

<div id="cartSide" class="side-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0">Mi Pedido</h2>
        <span onclick="closePanels()" style="cursor:pointer; font-size:28px">&times;</span>
    </div>
    <div id="cartList" style="flex-grow:1; overflow-y:auto; font-size: 14px;"></div>
    <div style="border-top: 1px solid #2d3748; padding-top: 15px;">
        <label style="font-size:12px; color:var(--accent); font-weight:bold">MÉTODO DE ENTREGA</label>
        <select id="shipMethod" onchange="updateCartUI()">
            <option value="retiro">Retiro en Local</option>
            <option value="envio">Envío a Domicilio</option>
        </select>
        <div id="envioFields">
            <input type="text" id="shipName" placeholder="Tu nombre">
            <input type="text" id="shipDir" placeholder="Dirección">
            <input type="text" id="shipLoc" placeholder="Localidad">
        </div>
        <div style="display:flex; justify-content:space-between; margin-top: 15px;">
            <span>Total:</span>
            <b id="cartTotal" style="font-size:24px; color:var(--success)">$0</b>
        </div>
        <button class="btn btn-wa" onclick="sendWA()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<div id="adminSide" class="side-panel">
    <h3>Gestión de Productos</h3>
    <input type="text" id="admNombre" placeholder="Nombre Producto">
    <input type="number" id="admPrecio" placeholder="Precio Unidad">
    <input type="text" id="admPromo" placeholder="Promo (ej: 2 x 2500)">
    <input type="number" id="admStock" placeholder="Stock">
    <input type="text" id="admImg" placeholder="Link de Imagen">
    <button class="btn btn-add" onclick="saveProduct()">GUARDAR PRODUCTO</button>
    <button class="btn" style="background:#475569" onclick="logout()">CERRAR SESIÓN</button>
</div>

<script>
    // Configuración Firebase (Usando tus credenciales actuales)
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let prods = [];
    let cart = [];
    let isAdmin = false;

    // Sincronización con Firebase
    db.collection("productos").onSnapshot(snap => {
        prods = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderProds();
    });

    function renderProds(filter = "") {
        const grid = document.getElementById("mainGrid");
        const filtered = prods.filter(p => p.nombre.toLowerCase().includes(filter.toLowerCase()));
        grid.innerHTML = filtered.map(p => `
            <div class="card">
                ${p.promo ? `<div class="promo-tag">🔥 ${p.promo}</div>` : ''}
                <div class="img-container"><img src="${p.imagen}"></div>
                <div class="info">
                    <small style="color:#10b981; font-weight:bold">STOCK: ${p.stock || 0}</small>
                    <div style="font-weight:700; font-size:16px; margin-top:4px">${p.nombre}</div>
                    <div class="price">$${p.precio}</div>
                    <button class="btn btn-add" onclick="addCart('${p.id}')">AGREGAR</button>
                    ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="btn" style="background:#64748b; font-size:10px" onclick="editStock('${p.id}', ${p.stock})">STOCK</button>
                            <button class="btn" style="background:#ef4444; font-size:10px" onclick="deleteProd('${p.id}')">BORRAR</button>
                        </div>
                    ` : ''}
                </div>
            </div>`).join("");
    }

    function addCart(id) {
        const item = cart.find(c => c.id === id);
        if(item) item.q++; else cart.push({id, q:1});
        updateCartUI();
        togglePanel('cartSide', true);
    }

    function updateCartUI() {
        const list = document.getElementById("cartList");
        const totalTxt = document.getElementById("cartTotal");
        const badge = document.getElementById("cartBadge");
        const method = document.getElementById("shipMethod").value;
        
        document.getElementById("envioFields").style.display = method === "envio" ? "block" : "none";

        let total = 0;
        let html = "";
        let count = 0;

        cart.forEach(item => {
            const p = prods.find(x => x.id === item.id);
            if(!p) return;

            let pFinal = parseFloat(p.precio);
            if(p.promo) {
                const n = p.promo.match(/\d+/g);
                if(n && n.length >= 2) {
                    const cantMin = parseInt(n[0]);
                    const precioCombo = parseInt(n[1]);
                    if(item.q >= cantMin) pFinal = precioCombo / cantMin;
                }
            }

            const sub = pFinal * item.q;
            total += sub;
            count += item.q;

            html += `
                <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #2d3748; padding-bottom:8px">
                    <div>
                        <div style="font-weight:bold">${p.nombre}</div>
                        <div style="font-size:12px; opacity:0.7">${item.q} x $${pFinal.toFixed(0)}</div>
                    </div>
                    <div style="font-weight:bold; color:var(--accent)">$${sub.toFixed(0)}</div>
                </div>`;
        });

        list.innerHTML = html || "<p style='text-align:center; opacity:0.5'>Carrito vacío</p>";
        badge.innerText = count;
        totalTxt.innerText = "$" + total.toFixed(0);
    }

    function checkAdmin() {
        const pass = prompt("Contraseña Administrativa:");
        if(pass === "neo2024") {
            isAdmin = true;
            togglePanel('adminSide', true);
            renderProds();
        }
    }

    function saveProduct() {
        const p = {
            nombre: document.getElementById("admNombre").value,
            precio: document.getElementById("admPrecio").value,
            promo: document.getElementById("admPromo").value,
            stock: parseInt(document.getElementById("admStock").value),
            imagen: document.getElementById("admImg").value
        };
        db.collection("productos").add(p).then(() => {
            alert("Producto guardado correctamente");
            closePanels();
        });
    }

    function editStock(id, current) {
        const nuevo = prompt("Actualizar stock:", current);
        if(nuevo !== null) db.collection("productos").doc(id).update({stock: parseInt(nuevo)});
    }

    function deleteProd(id) {
        if(confirm("¿Eliminar definitivamente este producto?")) db.collection("productos").doc(id).delete();
    }

    function togglePanel(id, show) {
        document.getElementById(id).classList.toggle("open", show);
        document.getElementById("overlay").style.display = show ? "block" : "none";
    }

    function closePanels() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        document.getElementById("overlay").style.display = "none";
    }

    function sendWA() {
        if(cart.length === 0) return alert("El carrito está vacío");
        let msg = "*NUEVO PEDIDO - NEO REPUESTOS*\n";
        let total = 0;
        cart.forEach(c => {
            const p = prods.find(x => x.id === c.id);
            let pPrice = p.precio;
            const n = p.promo ? p.promo.match(/\d+/g) : null;
            if(n && n.length >= 2 && c.q >= n[0]) pPrice = n[1]/n[0];
            const sub = pPrice * c.q;
            total += sub;
            msg += `- ${p.nombre} (x${c.q}): $${sub.toFixed(0)}\n`;
        });
        msg += `\n*TOTAL: $${total.toFixed(0)}*`;
        const method = document.getElementById("shipMethod").value;
        msg += `\n📍 ENTREGA: ${method === 'envio' ? 'Envío a domicilio' : 'Retiro en local'}`;
        if(method === "envio") {
            msg += `\n👤 Nombre: ${document.getElementById("shipName").value}\n🏠 Dir: ${document.getElementById("shipDir").value}\n🏙️ Loc: ${document.getElementById("shipLoc").value}`;
        }
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    function logout() {
        isAdmin = false;
        renderProds();
        closePanels();
    }
</script>
</body>
</html>
