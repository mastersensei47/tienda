<script>
/* -----------------------------------------------------------
   CONFIGURACIÓN FIREBASE
----------------------------------------------------------- */
const firebaseConfig = {
    apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
    authDomain: "tienda-online-baaf6.firebaseapp.com",
    projectId: "tienda-online-baaf6",
    storageBucket: "tienda-online-baaf6.firebasestorage.app",
    messagingSenderId: "121093097347",
    appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* VARIABLES */
let prods = [];
let cart = [];
let users = [];
let orders = [];
let isMay = false;
let usuarioLogueado = null;
let filterCat = "";

/* ---------------- STORAGE ---------------- */
function saveCart() {
    localStorage.setItem("ms47_cart", JSON.stringify(cart));
}
function loadCart() {
    const saved = localStorage.getItem("ms47_cart");
    if(saved) cart = JSON.parse(saved);
}

function saveUserSession(user) {
    localStorage.setItem("ms47_user", JSON.stringify(user));
}
function loadUserSession() {
    const u = localStorage.getItem("ms47_user");
    if(u) {
        usuarioLogueado = JSON.parse(u);
        isMay = true;
        llenarPerfil(usuarioLogueado);
    }
}

/* ---------------- INIT ---------------- */
function init() {

    db.collection("productos").onSnapshot(snap => {
        prods = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        renderAdmP();
    });

    db.collection("usuarios").onSnapshot(snap => {
        users = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAdmU();
    });

    db.collection("pedidos").orderBy("fecha", "desc").onSnapshot(snap => {
        orders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAdmO();
    });

    loadCart();
    loadUserSession();
    updateCartUI();
}

/* ---------------- RENDER ---------------- */
function render() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const cont = document.getElementById("productsCont");

    const filtered = prods.filter(p => 
        p.nombre.toLowerCase().includes(query) && 
        (filterCat === "" || p.categoria === filterCat)
    );

    if(filtered.length === 0) {
        cont.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;opacity:0.5;">No se encontraron productos...</div>`;
        return;
    }

    cont.innerHTML = filtered.map(p => {
        const precioActual = isMay ? (p.precio_may || p.precio) : p.precio;
        return `
        <div class="product-card">
            ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
            <div class="img-box">
                <img src="${p.imagen || 'https://via.placeholder.com/200'}">
            </div>
            <div class="info-box">
                <div class="prod-title">${p.nombre}</div>
                <div class="price-val">$${precioActual}</div>
                <button class="btn-add" onclick="addToCart('${p.id}')">🛒 Agregar</button>
            </div>
        </div>`;
    }).join("");
}

/* ---------------- CARRITO ---------------- */
function addToCart(id) {
    const exist = cart.find(i => i.id === id);
    if(exist) exist.qty++;
    else cart.push({id, qty:1});

    saveCart();
    updateCartUI();

    const el = document.getElementById("cartCount");
    el.style.transform = "scale(1.4)";
    setTimeout(() => el.style.transform = "scale(1)", 200);
}

function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if(item) {
        item.qty += delta;
        if(item.qty <= 0) {
            cart = cart.filter(i => i.id !== id);
        }
    }
    saveCart();
    updateCartUI();
}

function updateCartUI() {
    let total = 0;
    let count = 0;
    const list = document.getElementById("cartItems");

    list.innerHTML = cart.map(item => {
        const p = prods.find(x => x.id === item.id);
        if(!p) return "";
        const precio = isMay ? (p.precio_may || p.precio) : p.precio;
        const sub = precio * item.qty;
        total += sub;
        count += item.qty;

        return `
        <div style="padding:10px 0;display:flex;justify-content:space-between;">
            <div>${p.nombre}</div>
            <div>
                <button onclick="changeQty('${item.id}',-1)">-</button>
                ${item.qty}
                <button onclick="changeQty('${item.id}',1)">+</button>
            </div>
        </div>`;
    }).join("");

    document.getElementById("cartTotal").innerText = "$" + total;
    document.getElementById("cartCount").innerText = count;
}

/* ---------------- LOGIN ---------------- */
function doLogin() {
    const u = uInp.value.trim();
    const p = pInp.value.trim();

    if(u === "admin" && p === "admin") {
        openModal("adminModal");
        return;
    }

    const userFound = users.find(x => x.user === u && x.pass === p);

    if(userFound) {
        if(userFound.activo) {
            isMay = true;
            usuarioLogueado = userFound;
            saveUserSession(userFound);
            llenarPerfil(userFound);
            render();
            alert("Bienvenido " + userFound.user);
            closeAll();
        } else {
            alert("Cuenta en revisión");
        }
    } else {
        alert("Datos incorrectos");
    }
}

/* ---------------- PERFIL ---------------- */
function llenarPerfil(data) {
    document.getElementById("perfilContenido").style.display = "block";
    document.getElementById("perfilVacio").style.display = "none";
    document.getElementById("logoutBtn").style.display = "block";

    document.getElementById("p-user").innerText = data.user;
    document.getElementById("p-tel").innerText = data.tel;
    document.getElementById("p-dir").innerText = data.dir;
}

/* ---------------- LOGOUT ---------------- */
function logout() {
    if(confirm("¿Cerrar sesión?")) {
        localStorage.removeItem("ms47_user");
        location.reload();
    }
}

/* ---------------- CATEGORÍAS FIX ---------------- */
function setCat(c, el) {
    filterCat = c;
    document.querySelectorAll(".cat-card").forEach(card => card.classList.remove("active"));
    if(el) el.classList.add("active");
    render();
}

/* ---------------- PEDIDO ---------------- */
async function finalizarYEnviar() {
    if(cart.length === 0) return alert("Carrito vacío");

    let textoPedido = "*📦 PEDIDO MS47*\n";
    textoPedido += `📅 ${new Date().toLocaleString()}\n`;

    if(usuarioLogueado) {
        textoPedido += `Cliente: ${usuarioLogueado.user}\n`;
        textoPedido += `Tel: ${usuarioLogueado.tel}\n`;
        textoPedido += `Dir: ${usuarioLogueado.dir}\n`;
    }

    textoPedido += "------------------\n";

    cart.forEach(item => {
        const p = prods.find(x => x.id === item.id);
        if(p) textoPedido += `• ${p.nombre} x${item.qty}\n`;
    });

    textoPedido += "------------------\n";
    textoPedido += document.getElementById("cartTotal").innerText;

    await db.collection("pedidos").add({
        detalle: textoPedido,
        total: document.getElementById("cartTotal").innerText,
        fecha: Date.now()
    });

    window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(textoPedido)}`);

    cart = [];
    saveCart();
    updateCartUI();
}

/* ---------------- START ---------------- */
init();
</script>
