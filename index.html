<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let editIndex = null;

const productosDiv = document.getElementById("productos");
const cartItems = document.getElementById("cartItems");
const totalDiv = document.getElementById("total");
const cartCount = document.getElementById("cartCount");
const adminLista = document.getElementById("adminLista");

function guardarDatos(){
  localStorage.setItem("productos", JSON.stringify(productos));
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function renderProductos(){
  productosDiv.innerHTML="";
  productos.forEach((p,i)=>{
    productosDiv.innerHTML+=`
    <div class="card">
      <img src="${p.imagen}">
      <h4>${p.nombre}</h4>

      <p><b>$${p.precio}</b> c/u</p>

      ${p.tipoPromo==="2precio" ? 
        `<p class="promo">🔥 $${p.precioPromo} c/u llevando 2+</p>` : ""}

      ${p.tipoPromo==="3x2" ? 
        `<p class="promo">🎁 Promo 3x2</p>` : ""}

      <p>Stock: ${p.stock}</p>
      <button onclick="agregarCarrito(${i})">Agregar</button>
    </div>`;
  });
}

function renderAdmin(){
  adminLista.innerHTML="";
  productos.forEach((p,i)=>{
    adminLista.innerHTML+=`
      <div class="admin-item">
        ${p.nombre} ($${p.precio})
        <div>
          <button onclick="editarProducto(${i})">✏</button>
          <button onclick="eliminarProducto(${i})">🗑</button>
        </div>
      </div>`;
  });
}

function guardarProducto(){
  let nuevo = {
    nombre:nombreInput.value,
    precio:Number(precioInput.value),
    precioPromo:Number(precioEspecialInput.value),
    tipoPromo:tipoPromo.value,
    imagen:imagenInput.value,
    stock:Number(stockInput.value)
  };

  if(editIndex!==null){
    productos[editIndex]=nuevo;
    editIndex=null;
  } else {
    productos.push(nuevo);
  }

  guardarDatos();
  renderProductos();
  renderAdmin();
  limpiarInputs();
}

function editarProducto(i){
  let p=productos[i];
  nombreInput.value=p.nombre;
  precioInput.value=p.precio;
  precioEspecialInput.value=p.precioPromo || "";
  tipoPromo.value=p.tipoPromo || "";
  imagenInput.value=p.imagen;
  stockInput.value=p.stock;
  editIndex=i;
}

function eliminarProducto(i){
  productos.splice(i,1);
  guardarDatos();
  renderProductos();
  renderAdmin();
}

function agregarCarrito(i){
  let p=productos[i];
  if(p.stock<=0){ alert("Sin stock"); return; }

  let item=carrito.find(x=>x.index===i);
  if(item && item.cantidad<p.stock){
    item.cantidad++;
  } else if(!item){
    carrito.push({index:i,cantidad:1});
  }

  guardarDatos();
  actualizarCarrito();
}

function calcularTotal(p,cantidad){
  let total=0;
  let textoPromo="";
  let ahorro=0;

  if(p.tipoPromo==="2precio" && cantidad>=2){
    total = cantidad * p.precioPromo;
    ahorro = (p.precio - p.precioPromo) * cantidad;
    textoPromo="🔥 Precio reducido aplicado";
  }
  else if(p.tipoPromo==="3x2"){
    let grupos=Math.floor(cantidad/3);
    let resto=cantidad%3;
    total = (grupos*2*p.precio) + (resto*p.precio);
    ahorro = grupos * p.precio;
    if(grupos>0) textoPromo="🎁 Promo 3x2 aplicada";
  }
  else{
    total = cantidad * p.precio;
  }

  return {total,textoPromo,ahorro};
}

function actualizarCarrito(){
  cartItems.innerHTML="";
  let totalGeneral=0;
  let cantidadTotal=0;

  carrito.forEach((item,i)=>{
    let p=productos[item.index];
    let res=calcularTotal(p,item.cantidad);

    totalGeneral+=res.total;
    cantidadTotal+=item.cantidad;

    cartItems.innerHTML+=`
      <div>
        <p><b>${p.nombre}</b></p>
        <p>${item.cantidad} x $${p.precio}</p>
        <p><b>Total: $${res.total}</b></p>
        ${res.textoPromo?`<p class="promo">${res.textoPromo}</p>`:""}
        ${res.ahorro>0?`<p class="promo">Ahorrás $${res.ahorro}</p>`:""}
        <button onclick="quitar(${i})">❌</button>
        <hr>
      </div>`;
  });

  totalDiv.innerText="Total: $"+totalGeneral;
  cartCount.innerText=cantidadTotal;
}

function quitar(i){
  carrito.splice(i,1);
  guardarDatos();
  actualizarCarrito();
}

function confirmarCompra(){
  carrito.forEach(item=>{
    productos[item.index].stock -= item.cantidad;
  });
  carrito=[];
  guardarDatos();
  renderProductos();
  renderAdmin();
  actualizarCarrito();
  alert("Compra confirmada ✅");
}

function toggleCart(){
  document.getElementById("cartModal").classList.toggle("active");
}

function abrirAdmin(){ document.getElementById("adminPanel").style.display="block"; }
function cerrarAdmin(){ document.getElementById("adminPanel").style.display="none"; }

function verificarAdmin(){
  if(adminPass.value==="1234"){
    document.getElementById("adminContent").style.display="block";
    renderAdmin();
  } else alert("Contraseña incorrecta");
}

function limpiarInputs(){
  nombreInput.value="";
  precioInput.value="";
  precioEspecialInput.value="";
  tipoPromo.value="";
  imagenInput.value="";
  stockInput.value="";
}

renderProductos();
actualizarCarrito();
</script>
