<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
            --img-bg: rgba(255,255,255,0.05);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9; --img-bg: #ffffff;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(128,128,128,0.1);
            height: 90px; box-sizing: border-box; 
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .main-logo { height: 70px; width: auto; object-fit: contain; filter: drop-shadow(0 0 8px var(--accent)); }
        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; display: flex; align-items: center; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        .hero {
            height: 35vh; min-height: 250px;
            background: linear-gradient(rgba(15,23,42,0.6), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1500&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; border-bottom: 2px solid var(--accent);
        }

        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px; max-width: 900px; margin: -40px auto 30px; position: relative; z-index: 10; }
        .cat-card { background: var(--card); padding: 18px 5px; border-radius: var(--radius); text-align: center; cursor: pointer; border: 1px solid rgba(128,128,128,0.2); transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .cat-card:hover, .cat-card.active { transform: translateY(-8px); border-color: var(--accent); background: var(--accent); color: white; }
        .cat-card span { font-size: 22px; display: block; margin-bottom: 8px; }
        .cat-card b { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

        .search-container { max-width: 600px; margin: 0 auto 30px; padding: 0 15px; }
        .search-bar { width: 100%; padding: 16px 24px; border-radius: 16px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; font-size: 16px; outline: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; } }
        
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); transition: 0.4s; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.3); border-color: rgba(59, 130, 246, 0.3); }
        
        .promo-badge { position: absolute; top: 12px; left: 12px; background: var(--promo); color: #000; font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 8px; z-index: 5; }
        .stock-tag { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 6px; z-index: 5; backdrop-filter: blur(4px); }
        
        .img-box { background: var(--img-bg); width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { margin: 0 0 10px; font-size: 15px; font-weight: 600; line-height: 1.4; height: 42px; overflow: hidden; }
        .price-val { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; border-bottom: 3px solid rgba(0,0,0,0.2); }

        .drawer { position: fixed; top: 0; width: 85%; max-width: 380px; height: 100%; background: var(--card); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5000; padding: 30px; box-shadow: 0 0 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; box-sizing: border-box; }
        #infoDrawer { left: -100%; } #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; } #cartDrawer.active { right: 0; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: none; z-index: 4000; }
        .overlay.active { display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 28px; width: 100%; max-width: 750px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }

        .admin-tabs { display: flex; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; overflow-x: auto; }
        .tab-btn { padding: 12px 24px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }

        .admin-item { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-item img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; background: white; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; box-sizing: border-box; outline: none; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" alt="Logo" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:11px; padding:2px 7px; border-radius:12px; position:absolute; top:2px; right:2px; border: 2px solid var(--card);">0</b></div>
    </div>
</header>

<section class="hero">
    <h1 style="color:white; font-weight:800; font-size:2.5rem; margin:0; letter-spacing:-1px">DISTRIBUIDORA ELNEN</h1>
    <p style="color:rgba(255,255,255,0.8); margin-top:10px">El sistema integral más rápido de Santa Fe.</p>
</section>

<div class="cat-grid">
    <div class="cat-card active" id="cat-all" onclick="setSearch('')"><span>🌐</span><b>Todos</b></div>
    <div class="cat-card" id="cat-bebida" onclick="setSearch('bebida')"><span>🥤</span><b>Bebidas</b></div>
    <div class="cat-card" id="cat-snack" onclick="setSearch('snack')"><span>🍿</span><b>Snacks</b></div>
    <div class="cat-card" id="cat-almacen" onclick="setSearch('almacen')"><span>🥫</span><b>Almacén</b></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Busca tu producto favorito..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
            <h2 style="margin:0">Panel Maestro MS47</h2>
            <button onclick="closeAll()" style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer">✕</button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-prods')">📦 Productos</button>
            <button class="tab-btn" onclick="switchTab('tab-users')">👥 Cuentas</button>
            <button class="tab-btn" onclick="switchTab('tab-orders')">📜 Historial</button>
        </div>
        <div id="tab-prods" class="admin-tab-content">
            <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05)">
                <input type="hidden" id="editId">
                <input id="fNom" placeholder="Nombre">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <input id="fPre" type="number" placeholder="Precio Público">
                    <input id="fPreM" type="number" placeholder="Precio Mayorista">
                </div>
                <input id="fPromo" placeholder="Promo (3x2 o 2x$8000)">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <input id="fCat" placeholder="Categoría">
                    <input id="fStock" type="number" placeholder="Stock">
                </div>
                <input id="fImg" placeholder="Link Imagen">
                <button class="btn-add" style="width:100%; background:var(--success)" onclick="guardarProducto()">GUARDAR</button>
            </div>
            <div id="adminProdsList"></div>
        </div>
        <div id="tab-users" class="admin-tab-content" style="display:none"><div id="adminUsersList"></div></div>
        <div id="tab-orders" class="admin-tab-content" style="display:none"><div id="adminOrdersList"></div></div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:380px">
        <h2 style="text-align:center">Ingresar</h2>
        <input id="userInp" placeholder="Usuario">
        <input id="passInp" type="password" placeholder="Contraseña">
        <button class="btn-add" style="width:100%" onclick="checkLogin()">ENTRAR</button>
        <p style="text-align:center; font-size:14px; margin-top:20px">¿No tenés cuenta? <b style="color:var(--accent); cursor:pointer" onclick="abrirModal('regModal')">Registrate</b></p>
    </div>
</div>

<div class="modal" id="regModal">
    <div class="modal-content" style="max-width:400px">
        <h2>Solicitud Mayorista</h2>
        <input id="regUser" placeholder="Usuario">
        <input id="regPass" type="password" placeholder="Contraseña">
        <input id="regTel" placeholder="WhatsApp">
        <button class="btn-add" style="width:100%; background:var(--success)" onclick="crearCuenta()">ENVIAR</button>
    </div>
</div>

<div id="infoDrawer" class="drawer">
    <h2 style="color:var(--accent); margin-top:0">Mi Perfil</h2>
    <div id="userBadge" style="display:none; background:rgba(16,185,129,0.1); padding:15px; border-radius:14px; color:var(--success); font-weight:800; border:1px solid var(--success)">✓ MAYORISTA</div>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:14px; width:100%; cursor:pointer; margin-top:auto; font-weight:700">Cerrar Sesión</button>
</div>

<div id="cartDrawer" class="drawer">
    <h2 style="margin-top:0">Mi Pedido</h2>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto"></div>
    <div style="border-top:2px solid rgba(128,128,128,0.1); padding-top:20px">
        <div id="cartTotalText" style="font-weight:800; font-size:24px; color:var(--accent); margin-bottom:15px">Total: $0</div>
        <button class="btn-add" style="width:100%; background:#25d366" onclick="finalizarPedido()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [], carrito = [], usuarios = [], pedidos = [];
    let esMayorista = localStorage.getItem("ms47_may_v2") === "true";

    db.collection("productos").onSnapshot(s => { productos = s.docs.map(d => ({id:d.id, ...d.data()})); render(); renderAdminProds(); });
    db.collection("usuarios").onSnapshot(s => { usuarios = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdminUsers(); });
    db.collection("pedidos").orderBy("fecha", "desc").limit(20).onSnapshot(s => { pedidos = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdminOrders(); });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase() === query));

        cont.innerHTML = filtrados.map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="stock-tag">Stock: ${p.stock || 0}</div>
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <h4 class="product-title">${p.nombre}</h4>
                    <div class="price-val">$${esMayorista ? p.precio_may : p.precio}</div>
                    <button class="btn-add" onclick="addToCart('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
        if(esMayorista) document.getElementById("userBadge").style.display = "block";
    }

    // --- EL MOTOR QUE ESTABA FALLANDO (CORREGIDO) ---
function updateCartUI() {
    let totalGeneral = 0, itemsTotal = 0;
    const list = document.getElementById("cartItemsList");
    
    list.innerHTML = carrito.map(it => {
        const p = productos.find(x => x.id === it.id);
        const precioBase = esMayorista ? p.precio_may : p.precio;
        let subtotalItem = precioBase * it.qty;

        // LÓGICA DE PROMOS: Ejemplo "3x10000" o "2x2500"
        if(p.promo && p.promo.toLowerCase().includes('x')) {
            // Limpiamos el string: quitamos "$" y espacios, luego dividimos por 'x'
            const promoLimpia = p.promo.toLowerCase().replace(/\s/g, '').replace(/\$/g, '');
            const parts = promoLimpia.split('x');
            
            const cantReq = parseInt(parts[0]);
            const valPromo = parseInt(parts[1]);

            if(!isNaN(cantReq) && !isNaN(valPromo) && it.qty >= cantReq) {
                const packs = Math.floor(it.qty / cantReq);
                const resto = it.qty % cantReq;
                
                // Calculamos: (Cantidad de combos * precio especial) + (unidades sueltas * precio normal)
                subtotalItem = (packs * valPromo) + (resto * precioBase);
            }
        }
        
        totalGeneral += subtotalItem;
        itemsTotal += it.qty;

        return `
            <div style="padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center">
                <div>
                    <b style="display:block">${p.nombre}</b>
                    <small style="opacity:0.6">Cant: ${it.qty} x $${precioBase}</small>
                </div>
                <div style="text-align:right">
                    <b style="color:var(--accent)">$${subtotalItem}</b>
                    ${it.qty >= (parseInt(p.promo) || 999) ? `<br><small style="color:var(--promo); font-size:10px">¡Promo Aplicada!</small>` : ''}
                </div>
            </div>`;
    }).join("");
    
    document.getElementById("cartTotalText").innerText = "Total: $" + totalGeneral;
    document.getElementById("cartCount").innerText = itemsTotal;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        carrito = []; updateCartUI(); closeAll();
    }

    // --- FUNCIONES ADMIN Y UI ---
    function switchTab(id) {
        document.querySelectorAll('.admin-tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.target.classList.add('active');
    }
    function renderAdminUsers() {
        document.getElementById("adminUsersList").innerHTML = usuarios.map(u => `<div class="admin-item"><div style="flex-grow:1"><b>${u.user}</b></div>${u.activo ? '<span>✓</span>' : `<button onclick="aprobarUser('${u.id}', true)">Aprobar</button>`}</div>`).join("");
    }
    function renderAdminOrders() {
        document.getElementById("adminOrdersList").innerHTML = pedidos.map(o => `<div class="admin-item" style="flex-direction:column; align-items:start"><b>${o.total}</b><small>${new Date(o.fecha).toLocaleString()}</small></div>`).join("");
    }
    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = { nombre: document.getElementById("fNom").value, precio: Number(document.getElementById("fPre").value), precio_may: Number(document.getElementById("fPreM").value), promo: document.getElementById("fPromo").value, categoria: document.getElementById("fCat").value.toLowerCase(), stock: Number(document.getElementById("fStock").value), imagen: document.getElementById("fImg").value };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        alert("Guardado exitoso");
    }
    function renderAdminProds() {
        document.getElementById("adminProdsList").innerHTML = productos.map(p => `<div class="admin-item"><img src="${p.imagen}"><b>${p.nombre}</b><div style="margin-left:auto"><button onclick="editP('${p.id}')">✏️</button><button onclick="borrarDoc('productos','${p.id}')">🗑️</button></div></div>`).join("");
    }
    function editP(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("editId").value = p.id;
        document.getElementById("fNom").value = p.nombre; document.getElementById("fPre").value = p.precio;
        document.getElementById("fPreM").value = p.precio_may; document.getElementById("fPromo").value = p.promo || "";
        document.getElementById("fCat").value = p.categoria || ""; document.getElementById("fStock").value = p.stock;
        document.getElementById("fImg").value = p.imagen;
    }
    async function crearCuenta() {
        const u = document.getElementById("regUser").value, p = document.getElementById("regPass").value, t = document.getElementById("regTel").value;
        await db.collection("usuarios").add({ user: u, pass: p, tel: t, activo: false });
        alert("Enviado"); closeAll();
    }
    async function checkLogin() {
        const u = document.getElementById("userInp").value, p = document.getElementById("passInp").value;
        if(u === "admin" && p === "admin") return abrirModal("adminModal");
        const user = usuarios.find(x => x.user === u && x.pass === p);
        if(user && user.activo) { localStorage.setItem("ms47_may_v2", "true"); location.reload(); } else alert("No autorizado");
    }
    async function aprobarUser(id, val) { await db.collection("usuarios").doc(id).update({activo: val}); }
    async function borrarDoc(col, id) { if(confirm("¿Seguro?")) await db.collection(col).doc(id).delete(); }
    function logout() { localStorage.removeItem("ms47_may_v2"); location.reload(); }
    function setSearch(v) { document.getElementById("searchInput").value = v; render(); }
    function closeAll() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active")); document.getElementById("mainOverlay").classList.remove("active"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("mainOverlay").classList.toggle("active"); }
    function verificarAdmin() { let p = prompt("Clave:"); if(p==="admin") abrirModal("adminModal"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
</script>
</body>
</html>
