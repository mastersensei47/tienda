<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repuestos PRO - Oficial</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #2563eb; --sidebar-bg: #1e40af;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --success: #10b981; --coral: #ff8a80;
        }
        body.light { --bg: #f4f6f9; --card: #ffffff; --text: #111; --sidebar-bg: #2563eb; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); transition:.3s; overflow-x: hidden; }
        
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:5px 20px; background:var(--card); box-shadow:var(--shadow); 
            position:sticky; top:0; z-index:1000; height: 50px;
        }
        .search-bar { flex-grow: 1; max-width: 350px; margin: 0 15px; }
        .search-bar input {
            width: 100%; padding: 6px 15px; border-radius: 20px; border: 1px solid #444;
            background: rgba(0,0,0,0.2); color: white; font-size: 13px; outline: none;
        }
        .icon-group { display: flex; gap: 12px; align-items: center; }
        .icon { cursor:pointer; font-size:18px; position: relative; }
        .badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; }

        .sidebar { 
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%; 
            background: var(--sidebar-bg); color: white; transition: 0.3s; z-index: 2000;
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #ffffff22; }
        .sidebar-nav { flex-grow: 1; }
        .sidebar a { display: block; padding: 15px 20px; color: white; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); }
        .sidebar-promo { background: var(--coral); padding: 20px; color: white; font-weight: bold; text-align: center; cursor: pointer; font-size: 14px; }

        .cart-drawer {
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%;
            background: var(--card); transition: 0.3s; z-index: 3000; padding: 15px; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .cart-drawer.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 13px; }
        
        .delivery-section { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; }
        .delivery-section h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent); }
        .delivery-section label { font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        #form-envio { display: none; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        
        .cart-input { width: 100%; padding: 8px; margin: 4px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: white; font-size: 12px; box-sizing: border-box; }

        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:15px; }
        .card { background:var(--card); padding:12px; border-radius:12px; text-align:center; box-shadow: var(--shadow); transition: 0.3s; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 110px; object-fit: contain; margin-bottom: 8px; }
        .price-main { font-size: 1.1em; font-weight: bold; color: var(--accent); }

        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .admin-content { background: var(--card); width: 90%; max-width: 600px; max-height: 85vh; border-radius: 15px; padding: 20px; overflow-y: auto; position: relative; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.show { display: block; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-wa { background: #25d366; margin-top: 10px; font-size: 15px; }
        input { background: rgba(0,0,0,0.3); color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .tab-content { padding-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="cursor:pointer; font-size: 22px;" onclick="toggleSidebar()">☰</span>
        <div style="font-weight:bold; font-size: 14px;">NEO REPUESTOS</div>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
    </div>
    <div class="icon-group">
        <span class="icon" onclick="abrirLogin()">👤</span>
        <span class="icon" onclick="toggleLightMode()">🌗</span>
        <span class="icon" onclick="abrirAdmin()">🔑</span>
        <span class="icon" onclick="toggleCart()">🛒<span id="cartCount" class="badge">0</span></span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">MENU</div>
    <div class="sidebar-nav">
        <a href="#" onclick="closeAll()">🏠 Inicio</a>
        <a href="#" onclick="alert('Información de la tienda')">ℹ️ Información</a>
        <a href="#" onclick="alert('Ubicación: Calle Falsa 123')">📍 Ubicación</a>
        <a href="https://instagram.com" target="_blank">📸 Instagram</a>
    </div>
    <div class="sidebar-promo" onclick="window.open('https://wa.me/5493434508948?text=Hola!%20Quiero%20una%20tienda%20asi%20para%20mi%20emprendimiento!')">
        ¡Quiero una tienda así para mi emprendimiento!
    </div>
</nav>

<div class="cart-drawer" id="cartDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
        <h3 style="margin:0; font-size:18px;">Mi Carrito</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size: 20px;">✕</span>
    </div>
    <div class="cart-items" id="cartList"></div>
    <div class="delivery-section">
        <h4>Método de Entrega</h4>
        <label><input type="radio" name="delivery" value="Local" checked onclick="toggleEnvio(false)"> Retiro por local</label>
        <label><input type="radio" name="delivery" value="Envio" onclick="toggleEnvio(true)"> Envío a domicilio</label>
        <div id="form-envio">
            <input id="f_nombre" class="cart-input" placeholder="Nombre completo">
            <input id="f_direccion" class="cart-input" placeholder="Dirección">
        </div>
    </div>
    <div style="border-top: 2px solid #444; padding-top: 10px;">
        <div style="display:flex; justify-content:space-between; font-weight: bold; font-size: 1.1em;">
            <span>Total:</span> <span id="cartTotal">$0</span>
        </div>
        <div id="savingsBox" style="color: #10b981; font-size: 11px; margin-top: 4px; font-weight: bold;"></div>
        <button onclick="enviarPedido()" class="btn-wa">Confirmar Pedido</button>
    </div>
</div>

<div class="products" id="products"></div>

<div class="admin-modal" id="loginModal">
    <div class="admin-content" style="max-width: 350px;">
        <span style="float:right; cursor:pointer;" onclick="cerrarModales()">✕</span>
        <h3 id="loginTitle">Acceso Mayorista</h3>
        <input id="loginEmail" placeholder="Email" style="margin-bottom:10px">
        <input id="loginPass" type="password" placeholder="Contraseña" style="margin-bottom:10px">
        <div id="loginBtns">
            <button onclick="loginMayorista()">Ingresar</button>
            <button onclick="registrarMayorista()" style="background:#444; margin-top:5px">Registrarse</button>
        </div>
        <div id="logoutBtn" style="display:none">
            <p>Sesión iniciada correctamente.</p>
            <button onclick="cerrarSesion()" style="background:#ef4444">Cerrar Sesión</button>
        </div>
    </div>
</div>

<div class="admin-modal" id="adminModal">
    <div class="admin-content">
        <span style="float:right; cursor:pointer; font-size:24px;" onclick="cerrarModales()">✕</span>
        <div style="display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px;">
            <button onclick="showTab('tab-prods')" style="background:#444; font-size:12px">📦 Productos</button>
            <button onclick="showTab('tab-users')" style="background:#444; font-size:12px">👥 Mayoristas</button>
            <button onclick="showTab('tab-hist')" style="background:#444; font-size:12px">📜 Historial</button>
        </div>

        <div id="tab-prods" class="tab-content">
            <h4 id="formTitle">Nuevo / Editar Producto</h4>
            <input type="hidden" id="editIdx" value="-1">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom:10px">
                <input id="n" placeholder="Nombre">
                <input id="img" placeholder="URL Imagen">
                <input id="p1" type="number" placeholder="Precio Normal">
                <input id="pm" type="number" placeholder="Precio Mayorista">
            </div>
            <button onclick="guardarProducto()" id="btnGuardar" style="background:var(--success)">Guardar</button>
            <div id="listaAdmin" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
        </div>

        <div id="tab-users" class="tab-content" style="display:none">
            <h4>Lista de Mayoristas</h4>
            <div id="listaMayoristas"></div>
        </div>

        <div id="tab-hist" class="tab-content" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h4>Historial</h4>
                <button onclick="borrarHistorialTotal()" style="width:auto; background:#ef4444; font-size:10px">Limpiar</button>
            </div>
            <div id="listaHistorial"></div>
        </div>
    </div>
</div>

<script>
    // 1. VARIABLES
    let productos = JSON.parse(localStorage.getItem("products")) || [];
    let mayoristas = JSON.parse(localStorage.getItem("mayoristas")) || [];
    let historial = JSON.parse(localStorage.getItem("historial")) || [];
    let currentUser = JSON.parse(sessionStorage.getItem("currentUser")) || null;
    let carrito = [];

    // 2. RENDER PRINCIPAL
    function render(filtro = "") {
        const cont = document.getElementById("products");
        const filtrados = productos.filter(p => p.name.toLowerCase().includes(filtro.toLowerCase()));
        
        cont.innerHTML = filtrados.map((p, i) => {
            const realIdx = productos.indexOf(p);
            let precio = (currentUser && p.p_may > 0) ? p.p_may : p.p_ind;
            return `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <h4>${p.name}</h4>
                    <div class="price-main">$${precio} ${currentUser ? '<small>(MAY)</small>' : ''}</div>
                    <button onclick="addCart(${realIdx})" style="margin-top:8px;">🛒 Agregar</button>
                </div>`;
        }).join("");
    }

    // 3. CARRITO
    function addCart(idx) {
        const item = carrito.find(c => c.id === idx);
        if(item) item.qty++; else carrito.push({id: idx, qty: 1});
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById("cartList");
        let total = 0; let count = 0;
        list.innerHTML = carrito.map((item, i) => {
            const p = productos[item.id];
            let precio = (currentUser && p.p_may > 0) ? p.p_may : p.p_ind;
            let sub = precio * item.qty;
            total += sub; count += item.qty;
            return `<div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px">
                <span>${p.name} x${item.qty}</span>
                <span>$${sub} <b onclick="removeCart(${i})" style="color:red; cursor:pointer">✕</b></span>
            </div>`;
        }).join("");
        document.getElementById("cartTotal").innerText = "$" + total;
        document.getElementById("cartCount").innerText = count;
    }

    function removeCart(i) { carrito.splice(i, 1); updateCart(); }

    function enviarPedido() {
        if(carrito.length === 0) return alert("Carrito vacío");
        const entrega = document.querySelector('input[name="delivery"]:checked').value;
        let msg = `NUEVO PEDIDO ${currentUser ? '(MAYORISTA)' : ''}\n`;
        carrito.forEach(c => msg += `- ${productos[c.id].name} (x${c.qty})\n`);
        msg += `TOTAL: ${document.getElementById("cartTotal").innerText}\n`;
        
        if(entrega === "Envio") {
            const n = document.getElementById("f_nombre").value;
            const d = document.getElementById("f_direccion").value;
            if(!n || !d) return alert("Completa datos de envío");
            msg += `ENTREGA: Envio a ${n} en ${d}`;
        } else { msg += `ENTREGA: Retiro Local`; }

        // Guardar en historial
        historial.push({fecha: new Date().toLocaleString(), detalles: msg});
        localStorage.setItem("historial", JSON.stringify(historial));
        
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }

    // 4. ADMIN Y PESTAÑAS
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(tab).style.display = 'block';
        if(tab === 'tab-prods') cargarAdminList();
        if(tab === 'tab-users') cargarUserList();
        if(tab === 'tab-hist') cargarHistList();
    }

    function guardarProducto() {
        const idx = parseInt(document.getElementById("editIdx").value);
        const p = {
            name: document.getElementById("n").value,
            p_ind: parseInt(document.getElementById("p1").value),
            p_may: parseInt(document.getElementById("pm").value),
            img: document.getElementById("img").value
        };
        if(idx === -1) productos.push(p); else productos[idx] = p;
        localStorage.setItem("products", JSON.stringify(productos));
        location.reload();
    }

    function cargarAdminList() {
        document.getElementById("listaAdmin").innerHTML = productos.map((p, i) => `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #444; padding:5px; font-size:12px">
                <span>${p.name}</span>
                <span>
                    <button onclick="prepararEdit(${i})" style="width:auto; background:orange; padding:2px 5px">✏️</button>
                    <button onclick="eliminarProd(${i})" style="width:auto; background:red; padding:2px 5px">✕</button>
                </span>
            </div>`).join("");
    }

    function prepararEdit(i) {
        const p = productos[i];
        document.getElementById("n").value = p.name;
        document.getElementById("p1").value = p.p_ind;
        document.getElementById("pm").value = p.p_may;
        document.getElementById("img").value = p.img;
        document.getElementById("editIdx").value = i;
        document.getElementById("formTitle").innerText = "Editando...";
    }

    function eliminarProd(i) { if(confirm("¿Borrar?")) { productos.splice(i,1); localStorage.setItem("products", JSON.stringify(productos)); cargarAdminList(); render(); }}

    function cargarUserList() {
        document.getElementById("listaMayoristas").innerHTML = mayoristas.map((u, i) => `
            <div style="display:flex; justify-content:space-between; padding:5px; font-size:12px; border-bottom:1px solid #444">
                <span>${u.email}</span>
                <button onclick="eliminarUser(${i})" style="width:auto; color:red; background:none">Borrar</button>
            </div>`).join("");
    }
    function eliminarUser(i) { mayoristas.splice(i,1); localStorage.setItem("mayoristas", JSON.stringify(mayoristas)); cargarUserList(); }

    function cargarHistList() {
        document.getElementById("listaHistorial").innerHTML = historial.map((h, i) => `
            <div style="font-size:10px; border-bottom:1px solid #444; padding:5px">
                <b>${h.fecha}</b> <button onclick="borrarUnoH(${i})" style="width:auto; background:none; color:red; float:right">✕</button>
                <br>${h.detalles.replace(/\n/g, '<br>')}
            </div>`).reverse().join("");
    }
    function borrarUnoH(i) { historial.splice(i,1); localStorage.setItem("historial", JSON.stringify(historial)); cargarHistList(); }
    function borrarHistorialTotal() { if(confirm("¿Limpiar todo?")) { historial = []; localStorage.setItem("historial", "[]"); cargarHistList(); }}

    // 5. LOGIN Y OTROS
    function loginMayorista() {
        const e = document.getElementById("loginEmail").value;
        const p = document.getElementById("loginPass").value;
        const u = mayoristas.find(x => x.email === e && x.pass === p);
        if(u) {
            currentUser = u; sessionStorage.setItem("currentUser", JSON.stringify(u));
            alert("Bienvenido"); checkLoginState(); render();
        } else alert("Error");
    }

    function registrarMayorista() {
        const e = document.getElementById("loginEmail").value;
        const p = document.getElementById("loginPass").value;
        if(e && p) { mayoristas.push({email:e, pass:p}); localStorage.setItem("mayoristas", JSON.stringify(mayoristas)); alert("Registrado!"); }
    }

    function checkLoginState() {
        if(currentUser) {
            document.getElementById("loginBtns").style.display = "none";
            document.getElementById("logoutBtn").style.display = "block";
            document.getElementById("loginTitle").innerText = "Hola, " + currentUser.email.split('@')[0];
        } else {
            document.getElementById("loginBtns").style.display = "block";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("loginTitle").innerText = "Acceso Mayorista";
        }
    }

    function cerrarSesion() { currentUser = null; sessionStorage.removeItem("currentUser"); checkLoginState(); render(); }
    function abrirLogin() { document.getElementById("loginModal").style.display = "flex"; checkLoginState(); }
    function abrirAdmin() { if(prompt("Clave:")==="admin") { document.getElementById("adminModal").style.display = "flex"; showTab('tab-prods'); }}
    function cerrarModales() { document.querySelectorAll(".admin-modal").forEach(m => m.style.display="none"); }
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("show"); }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("overlay").classList.toggle("show"); }
    function closeAll() { document.querySelectorAll(".active, .show").forEach(el => el.classList.remove("active", "show")); }
    function toggleLightMode() { document.body.classList.toggle("light"); }
    function filtrarProductos() { render(document.getElementById("searchInput").value); }
    function toggleEnvio(s) { document.getElementById("form-envio").style.display = s ? "block" : "none"; }

    render();
</script>

</body>
</html>
