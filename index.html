<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DISTRIBUIDORA ELNEN - Sistema Integral</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f1f5f9; 
            --accent: #3b82f6;
            --glass: rgba(30, 41, 59, 0.8);
            --radius: 18px;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            scroll-behavior: smooth;
        }

        /* --- 6. HEADER MEJORADO (Glass Effect) --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; 
            background: var(--glass); 
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-info { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }

        /* --- 1. HERO SECTION --- */
        .hero {
            height: 70vh;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1500&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; font-weight: 800; text-transform: uppercase; }
        .hero p { font-size: 1.2rem; opacity: 0.9; margin: 15px 0 30px; max-width: 600px; }
        .cta-btn { 
            background: var(--accent); color: white; padding: 18px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: 800;
            transition: 0.3s; border: none; cursor: pointer;
        }
        .cta-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }

        /* --- 2. CATEGORÍAS VISUALES --- */
        .categories-section { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .cat-card {
            background: var(--card); padding: 25px 15px; border-radius: var(--radius);
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .cat-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* --- 3. PRODUCT CARDS & 7. MOBILE OPTIMIZATION --- */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 columnas en mobile */
            gap: 15px; padding: 20px; max-width: 1200px; margin: auto;
        }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } }

        .product-card { 
            background: var(--card); border-radius: var(--radius); overflow: hidden; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }
        .product-card:hover { transform: scale(1.03); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); }
        
        .img-container { background: white; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .p-name { font-size: 14px; font-weight: 600; margin: 0 0 10px; height: 35px; overflow: hidden; }
        .p-price { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: auto; }

        /* Botón de añadir (Más grande para mobile) */
        .add-btn { 
            width: 100%; padding: 12px; margin-top: 15px; border-radius: 12px;
            background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer;
        }

        /* Utilidades */
        .search-container { padding: 20px; max-width: 600px; margin: auto; }
        input[type="text"] { 
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: white; outline: none; box-sizing: border-box;
        }
        .icon-btn { font-size: 24px; cursor: pointer; padding: 8px; }

        /* Admin/Modals (Manteniendo tus estilos funcionales) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: var(--radius); width: 90%; max-width: 500px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <div>
            <b style="font-size: 18px; letter-spacing: 1px;">ELNEN</b>
            <div class="header-info">📍 Santa Fe | Envíos disponibles</div>
        </div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()" style="position: relative;">
            🛒 <small id="cartCount" style="position: absolute; top: 0; right: 0; background: #ef4444; font-size: 10px; padding: 2px 5px; border-radius: 10px;">0</small>
        </div>
    </div>
</header>

<section class="hero">
    <h1>DISTRIBUIDORA ELNEN</h1>
    <p>Calidad mayorista y minorista directo a tu puerta. El catálogo más completo de Santa Fe.</p>
    <button class="cta-btn" onclick="document.getElementById('productos-inicio').scrollIntoView()">VER PRODUCTOS</button>
</section>

<section class="categories-section">
    <h3 style="margin-bottom: 20px; font-weight: 800;">Explorar Categorías</h3>
    <div class="cat-grid">
        <div class="cat-card" onclick="setSearch('bebida')">
            <i>🥤</i> <b>Bebidas</b>
        </div>
        <div class="cat-card" onclick="setSearch('snack')">
            <i>🍿</i> <b>Snacks</b>
        </div>
        <div class="cat-card" onclick="setSearch('almacen')">
            <i>🥫</i> <b>Almacén</b>
        </div>
    </div>
</section>

<div id="productos-inicio" class="search-container">
    <input type="text" id="searchInput" placeholder="Buscar productos..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div id="mainOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000;" onclick="closeAll()"></div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>Panel Admin</h3>
        <input type="hidden" id="editId">
        <input id="fNom" placeholder="Nombre" style="width:100%; margin-bottom:10px; padding:10px;">
        <input id="fPre" type="number" placeholder="Precio" style="width:100%; margin-bottom:10px; padding:10px;">
        <input id="fImg" placeholder="Link Imagen" style="width:100%; margin-bottom:10px; padding:10px;">
        <button onclick="guardarProducto()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px;">GUARDAR</button>
        <button onclick="closeAll()" style="width:100%; margin-top:10px; background:none; color:white; border:none;">Cerrar</button>
    </div>
</div>

<script>
    // --- Lógica de Firebase (Reemplaza con tus credenciales si no son estas) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];

    // Carga de datos
    db.collection("productos").onSnapshot(snap => {
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    });

    // --- FUNCIÓN RENDER MEJORADA VISUALMENTE ---
    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        
        cont.innerHTML = productos.filter(p => p.nombre.toLowerCase().includes(query)).map(p => `
            <div class="product-card">
                <div class="img-container">
                    <img src="${p.imagen || 'https://via.placeholder.com/150'}" alt="${p.nombre}">
                </div>
                <div class="info">
                    <h4 class="p-name">${p.nombre}</h4>
                    <div class="p-price">$${p.precio}</div>
                    <button class="add-btn" onclick="addToCart('${p.id}')">AÑADIR AL CARRITO</button>
                </div>
            </div>
        `).join("");
    }

    // Funciones auxiliares de UI
    function setSearch(val) {
        document.getElementById("searchInput").value = val;
        render();
        document.getElementById("productos-inicio").scrollIntoView();
    }

    // --- MANTENEMOS TUS FUNCIONES ORIGINALES (No tocamos lógica) ---
    function addToCart(id) {
        const item = carrito.find(c => c.id === id);
        if(item) item.qty++; else carrito.push({id, qty:1});
        document.getElementById("cartCount").innerText = carrito.reduce((a, b) => a + b.qty, 0);
        // Aquí podrías llamar a tu función de actualizar UI de carrito si la tenías
    }

    function verificarAdmin() {
        const pass = prompt("Clave de administrador:");
        if(pass === "admin") document.getElementById("adminModal").style.display = "flex";
    }

    function closeAll() {
        document.getElementById("adminModal").style.display = "none";
    }

    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = {
            nombre: document.getElementById("fNom").value,
            precio: Number(document.getElementById("fPre").value),
            imagen: document.getElementById("fImg").value
        };
        if(id) await db.collection("productos").doc(id).update(d);
        else await db.collection("productos").add(d);
        closeAll();
    }

    // El resto de tus funciones (toggleCart, toggleInfo, etc) van aquí
    function toggleCart() { alert("Carrito: " + carrito.length + " items"); }
    function toggleInfo() { alert("Info: Distribuidora ELNEN - Santa Fe"); }
</script>

</body>
</html>
