<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
            --img-bg: #ffffff;
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9; --img-bg: #ffffff;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); height: 80px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .main-logo { height: 50px; width: auto; filter: drop-shadow(0 0 5px var(--accent)); }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        /* HERO & CATEGORIES */
        .hero {
            height: 250px; background: linear-gradient(rgba(15,23,42,0.7), rgba(15,23,42,0.9)), url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1500&auto=format&fit=crop');
            background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px; max-width: 800px; margin: -30px auto 30px; position: relative; z-index: 10; }
        .cat-card { background: var(--card); padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid rgba(128,128,128,0.2); transition: 0.3s; }
        .cat-card.active { background: var(--accent); color: white; transform: translateY(-5px); }
        .cat-card span { display: block; font-size: 20px; }
        .cat-card b { font-size: 10px; text-transform: uppercase; }

        /* SEARCH & GRID */
        .search-container { max-width: 600px; margin: 0 auto 20px; padding: 0 15px; }
        .search-bar { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); position: relative; display: flex; flex-direction: column; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: var(--promo); color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; }
        .img-box { background: white; height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .price-val { font-size: 20px; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* MODALES Y DRAWERS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .drawer { position: fixed; top: 0; width: 85%; max-width: 350px; height: 100%; background: var(--card); transition: 0.4s; z-index: 5000; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        #cartDrawer { right: -100%; } #cartDrawer.active { right: 0; }
        #infoDrawer { left: -100%; } #infoDrawer.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 4000; }
        .overlay.active { display: block; }

        /* ADMIN TABS */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; background: rgba(255,255,255,0.05); color: white; border: none; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); }
        .admin-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: var(--input-bg); color: white; box-sizing: border-box; }
        
        /* BOTÓN VOLVER ATRÁS */
        .btn-back { background: transparent; color: #94a3b8; border: none; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 600; }
        .btn-back:hover { color: white; text-decoration: underline; }

        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 25px; height: 25px; border-radius: 5px; border: none; background: var(--accent); color: white; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌓</span>
        <span class="icon-btn" onclick="openModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" style="background:var(--danger); font-size:10px; padding:2px 6px; border-radius:10px; position:absolute; top:0; right:0;">0</b></div>
    </div>
</header>

<section class="hero">
    <h1 style="margin:0; font-size:2rem; font-weight:800;">DISTRIBUIDORA ELNEN</h1>
    <p style="opacity:0.8;">Tu pedido listo en minutos.</p>
</section>

<div class="cat-grid">
    <div class="cat-card active" onclick="setCat('')"><span>🌐</span><b>Todos</b></div>
    <div class="cat-card" onclick="setCat('bebida')"><span>🥤</span><b>Bebidas</b></div>
    <div class="cat-card" onclick="setCat('snack')"><span>🍿</span><b>Snacks</b></div>
    <div class="cat-card" onclick="setCat('almacen')"><span>🥫</span><b>Almacén</b></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar productos..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px; text-align:center;">
        <h2 style="margin-top:0;">Acceso</h2>
        <input id="uInp" placeholder="Usuario">
        <input id="pInp" type="password" placeholder="Contraseña">
        <button class="btn-add" style="width:100%;" onclick="doLogin()">ENTRAR</button>
        <p style="font-size:12px; color:#94a3b8; margin-top:15px;">¿Sos mayorista? <b style="color:var(--accent); cursor:pointer" onclick="openModal('regModal')">Registrate</b></p>
        <button class="btn-back" onclick="closeAll()">Volver atrás</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 style="margin:0;">Panel Maestro MS47</h2>
            <button onclick="closeAll()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="tab('t-prod')">Productos</button>
            <button class="tab-btn" onclick="tab('t-user')">Usuarios</button>
            <button class="tab-btn" onclick="tab('t-order')">Pedidos</button>
        </div>
        <div id="t-prod">
            <input id="fId" type="hidden">
            <input id="fNom" placeholder="Nombre">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input id="fPre" type="number" placeholder="Precio Final">
                <input id="fPreM" type="number" placeholder="Precio May">
            </div>
            <input id="fPro" placeholder="Promo (Ej: 3x10000)">
            <input id="fCat" placeholder="Categoría">
            <input id="fImg" placeholder="Link Imagen">
            <button class="btn-add" style="width:100%; background:var(--success);" onclick="saveP()">GUARDAR PRODUCTO</button>
            <div id="admListP" style="margin-top:20px;"></div>
        </div>
        <div id="t-user" style="display:none;"><div id="admListU"></div></div>
        <div id="t-order" style="display:none;"><div id="admListO"></div></div>
    </div>
</div>

<div class="modal" id="regModal">
    <div class="modal-content" style="max-width:350px;">
        <h2>Registro Mayorista</h2>
        <input id="rU" placeholder="Usuario">
        <input id="rP" type="password" placeholder="Contraseña">
        <input id="rT" placeholder="WhatsApp">
        <button class="btn-add" style="width:100%; background:var(--success);" onclick="regU()">SOLICITAR ALTA</button>
        <button class="btn-back" onclick="openModal('loginModal')">Volver</button>
    </div>
</div>

<div class="overlay" id="ov" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <h2 style="color:var(--accent);">Mi Perfil</h2>
    <div id="mayBadge" style="display:none; padding:10px; background:rgba(16,185,129,0.1); border-radius:10px; color:var(--success); font-weight:800; border:1px solid var(--success); margin-bottom:20px;">✓ MAYORISTA ACTIVO</div>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; cursor:pointer; margin-top:auto;">Cerrar Sesión</button>
</div>

<div id="cartDrawer" class="drawer">
    <h2>Mi Pedido</h2>
    <div id="cartItems" style="flex-grow:1; overflow-y:auto;"></div>
    <div style="padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
        <div id="cartTotal" style="font-size:22px; font-weight:800; color:var(--accent); margin-bottom:15px;">Total: $0</div>
        <button class="btn-add" style="width:100%; background:#25d366;" onclick="sendOrder()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let prods = [], cart = [], users = [], orders = [];
    let isMay = localStorage.getItem("ms47_may") === "true";
    let filterCat = "";

    // Sync Firebase
    db.collection("productos").onSnapshot(s => { prods = s.docs.map(d => ({id:d.id, ...d.data()})); render(); renderAdmP(); });
    db.collection("usuarios").onSnapshot(s => { users = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdmU(); });
    db.collection("pedidos").orderBy("fecha", "desc").limit(15).onSnapshot(s => { orders = s.docs.map(d => ({id:d.id, ...d.data()})); renderAdmO(); });

    function render() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        const list = prods.filter(p => p.nombre.toLowerCase().includes(q) && (filterCat === "" || p.categoria === filterCat));
        
        cont.innerHTML = list.map(p => `
            <div class="product-card">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="img-box"><img src="${p.imagen}"></div>
                <div class="info-box">
                    <div class="product-title">${p.nombre}</div>
                    <div class="price-val">$${isMay ? p.precio_may : p.precio}</div>
                    <button class="btn-add" onclick="add('${p.id}')">AGREGAR</button>
                </div>
            </div>`).join("");
        if(isMay) document.getElementById("mayBadge").style.display = "block";
    }

    function add(id) {
        const ex = cart.find(c => c.id === id);
        if(ex) ex.qty++; else cart.push({id, qty:1});
        updateCartUI();
    }

    function updateCartUI() {
        let total = 0, itemsCount = 0;
        const list = document.getElementById("cartItems");
        list.innerHTML = cart.map(it => {
            const p = prods.find(x => x.id === it.id);
            const price = isMay ? p.precio_may : p.precio;
            let sub = price * it.qty;
            
            // Lógica de Promo (Ej: 3x10000)
            if(!isMay && p.promo && p.promo.toLowerCase().includes('x')) {
                const parts = p.promo.toLowerCase().replace('$', '').split('x');
                const cant = parseInt(parts[0]), val = parseInt(parts[1]);
                if(it.qty >= cant) {
                    sub = (Math.floor(it.qty / cant) * val) + ((it.qty % cant) * price);
                }
            }
            total += sub; itemsCount += it.qty;
            return `<div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between;">
                <div><b>${p.nombre}</b><br><div class="qty-controls">
                <button class="qty-btn" onclick="modQ('${it.id}',-1)">-</button><span>${it.qty}</span><button class="qty-btn" onclick="modQ('${it.id}',1)">+</button></div></div>
                <b>$${sub}</b></div>`;
        }).join("");
        document.getElementById("cartTotal").innerText = "Total: $" + total;
        document.getElementById("cartCount").innerText = itemsCount;
    }

    function modQ(id, d) {
        const it = cart.find(c => c.id === id);
        if(it) { it.qty += d; if(it.qty <= 0) cart = cart.filter(c => c.id !== id); }
        updateCartUI();
    }

    async function sendOrder() {
        if(cart.length === 0) return;
        const total = document.getElementById("cartTotal").innerText;
        const items = cart.map(it => ({n: prods.find(p=>p.id===it.id).nombre, q: it.qty}));
        await db.collection("pedidos").add({ items, total, fecha: Date.now() });
        let msg = `*PEDIDO MS47*\n` + items.map(i => `• ${i.n} (x${i.q})`).join("\n") + `\n\n*${total}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
        cart = []; updateCartUI(); closeAll();
    }

    // Admin Functions
    async function saveP() {
        const id = document.getElementById("fId").value;
        const d = { nombre: document.getElementById("fNom").value, precio: Number(document.getElementById("fPre").value), precio_may: Number(document.getElementById("fPreM").value), promo: document.getElementById("fPro").value, categoria: document.getElementById("fCat").value.toLowerCase(), imagen: document.getElementById("fImg").value };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        document.querySelectorAll("#t-prod input").forEach(i => i.value = "");
    }

    function renderAdmP() {
        document.getElementById("admListP").innerHTML = prods.map(p => `
            <div class="admin-item"><span>${p.nombre}</span><div style="margin-left:auto;"><button onclick="editP('${p.id}')">✏️</button><button onclick="del('productos','${p.id}')">🗑️</button></div></div>`).join("");
    }
    function editP(id) {
        const p = prods.find(x => x.id === id);
        document.getElementById("fId").value = p.id; document.getElementById("fNom").value = p.nombre;
        document.getElementById("fPre").value = p.precio; document.getElementById("fPreM").value = p.precio_may;
        document.getElementById("fPro").value = p.promo || ""; document.getElementById("fCat").value = p.categoria;
        document.getElementById("fImg").value = p.imagen;
    }

function renderAdmU() {
    const cont = document.getElementById("admListU");
    
    // Filtramos los usuarios por estado
    const pendientes = users.filter(u => !u.activo);
    const registrados = users.filter(u => u.activo);

    let html = `<h3 style="color:var(--promo); margin-bottom:10px; font-size:16px;">⏳ Solicitudes Pendientes (${pendientes.length})</h3>`;
    
    if (pendientes.length === 0) {
        html += `<p style="font-size:12px; opacity:0.6; margin-bottom:20px;">No hay solicitudes nuevas.</p>`;
    } else {
        html += pendientes.map(u => `
            <div class="admin-item" style="flex-direction:column; align-items:flex-start; gap:5px;">
                <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                    <b style="font-size:15px;">${u.user}</b>
                    <div style="display:flex; gap:5px;">
                        <button onclick="updU('${u.id}', true)" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; font-weight:700;">Aprobar</button>
                        <button onclick="del('usuarios','${u.id}')" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; font-weight:700;">Rechazar</button>
                    </div>
                </div>
                <small style="color:var(--accent); font-weight:600;">📞 WhatsApp: ${u.tel || 'No cargado'}</small>
                <small style="opacity:0.7;">ID: ${u.id}</small>
            </div>`).join("");
    }

    html += `<h3 style="color:var(--success); margin:20px 0 10px 0; font-size:16px;">✅ Clientes Registrados (${registrados.length})</h3>`;
    
    html += registrados.map(u => `
        <div class="admin-item" style="display:flex; justify-content:space-between; align-items:center; opacity:0.9;">
            <div>
                <b style="display:block;">${u.user}</b>
                <small style="color:var(--accent);">WhatsApp: ${u.tel}</small>
            </div>
            <button onclick="del('usuarios','${u.id}')" title="Eliminar acceso" style="background:none; border:none; cursor:pointer; font-size:16px;">🗑️</button>
        </div>`).join("");

    cont.innerHTML = html;
}
    async function updU(id) { await db.collection("usuarios").doc(id).update({activo:true}); }

function renderAdmO() {
    const cont = document.getElementById("admListO");
    // Botón para vaciar todo al principio
    let html = `
        <button onclick="vaciarPedidos()" style="width:100%; background:var(--danger); color:white; border:none; padding:10px; border-radius:10px; margin-bottom:15px; font-weight:700; cursor:pointer;">
            🗑️ VACIAR TODO EL HISTORIAL
        </button>
    `;
    
    html += orders.map(o => {
        const fecha = new Date(o.fecha);
        const horaFormateada = fecha.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const fechaFormateada = fecha.toLocaleDateString();

        return `
            <div class="admin-item" style="flex-direction:column; align-items:flex-start; position:relative;">
                <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--accent);">${o.total}</b>
                    <button onclick="del('pedidos','${o.id}')" style="background:none; border:none; cursor:pointer; font-size:16px;">❌</button>
                </div>
                <small style="color:#94a3b8;">${fechaFormateada} - ${horaFormateada} hs</small>
                <small style="margin-top:5px;">${o.items.map(i => i.n + " (x"+i.q+")").join(", ")}</small>
            </div>`;
    }).join("");
    
    cont.innerHTML = html;
}
async function updU(id, estado) {
    if(confirm("¿Confirmar acción sobre este usuario?")) {
        await db.collection("usuarios").doc(id).update({ activo: estado });
        alert("Usuario actualizado correctamente.");
    }
}
    async function doLogin() {
        const u = document.getElementById("uInp").value, p = document.getElementById("pInp").value;
        if(u === "admin" && p === "admin") return openModal("adminModal");
        const user = users.find(x => x.user === u && x.pass === p);
        if(user && user.activo) { localStorage.setItem("ms47_may", "true"); location.reload(); } else alert("No autorizado");
    }

    async function regU() {
        const u = document.getElementById("rU").value, p = document.getElementById("rP").value, t = document.getElementById("rT").value;
        if(!u || !p) return;
        await db.collection("usuarios").add({ user: u, pass: p, tel: t, activo: false });
        alert("Solicitud enviada"); closeAll();
    }

    // UI Helpers
    function setCat(c) { 
        filterCat = c; 
        document.querySelectorAll('.cat-card').forEach(card => card.classList.remove('active'));
        event.currentTarget.classList.add('active');
        render(); 
    }
    function tab(id) {
        document.querySelectorAll('#adminModal [id^="t-"]').forEach(d => d.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.target.classList.add('active');
    }
    function openModal(id) { closeAll(); document.getElementById(id).style.display = 'flex'; }
    function toggleCart() { document.getElementById("cartDrawer").classList.toggle("active"); document.getElementById("ov").classList.toggle("active"); }
    function toggleInfo() { document.getElementById("infoDrawer").classList.toggle("active"); document.getElementById("ov").classList.toggle("active"); }
    function closeAll() { 
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        document.querySelectorAll(".drawer").forEach(d => d.classList.remove("active"));
        document.getElementById("ov").classList.remove("active");
    }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function logout() { localStorage.removeItem("ms47_may"); location.reload(); }
    function verificarAdmin() { let p = prompt("Clave:"); if(p==="admin") openModal("adminModal"); }
    async function del(c,i) { if(confirm("¿Borrar?")) await db.collection(c).doc(i).delete(); }
</script>
</body>
</html>
