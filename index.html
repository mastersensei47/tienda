<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS47 - SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6;
            --success: #10b981; --promo: #f59e0b; --danger: #ef4444;
            --input-bg: rgba(30, 41, 59, 0.7); --radius: 18px;
            --img-bg: rgba(255,255,255,0.05);
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --input-bg: #f1f5f9; --img-bg: #ffffff;
        }
        body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(128,128,128,0.1);
            height: 90px; box-sizing: border-box; 
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .main-logo { height: 70px; width: auto; object-fit: contain; filter: drop-shadow(0 0 8px var(--accent)); }
        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; display: flex; align-items: center; padding: 8px; border-radius: 50%; }

        .hero {
            height: 30vh; min-height: 200px;
            background: linear-gradient(rgba(15,23,42,0.7), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1500&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        /* --- CATEGORÍAS --- */
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px; max-width: 900px; margin: -30px auto 30px; position: relative; z-index: 10; }
        .cat-card { background: var(--card); padding: 15px 5px; border-radius: var(--radius); text-align: center; cursor: pointer; border: 1px solid rgba(128,128,128,0.2); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .cat-card:hover, .cat-card.active { transform: translateY(-5px); border-color: var(--accent); background: var(--accent); color: white; }
        .cat-card span { font-size: 20px; display: block; margin-bottom: 5px; }
        .cat-card b { font-size: 10px; text-transform: uppercase; }

        /* --- PRODUCTOS --- */
        .search-container { max-width: 600px; margin: 0 auto 20px; padding: 0 15px; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; font-size: 16px; outline: none; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; } }
        
        .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(128,128,128,0.1); transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: var(--promo); color: #000; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; }
        .stock-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 9px; padding: 3px 6px; border-radius: 4px; z-index: 5; }
        
        .img-box { background: var(--img-bg); width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { margin: 0 0 8px; font-size: 14px; font-weight: 600; height: 34px; overflow: hidden; }
        .price-val { font-size: 22px; font-weight: 800; color: var(--accent); }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: auto; }
        .btn-add:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }

        /* --- DRAWERS --- */
        .drawer { position: fixed; top: 0; width: 85%; max-width: 350px; height: 100%; background: var(--card); transition: 0.4s; z-index: 5000; padding: 25px; box-shadow: 0 0 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; box-sizing: border-box; }
        #infoDrawer { left: -100%; } 
        #infoDrawer.active { left: 0; }
        #cartDrawer { right: -100%; } 
        #cartDrawer.active { right: 0; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; z-index: 4000; }
        .overlay.active { display: block; }
        .qty-badge { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* --- MODALES --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 15px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); background: var(--input-bg); color: inherit; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* --- ESTÉTICA PANEL ADMIN MEJORADA --- */
        .admin-section-title { font-size: 12px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; font-weight: 800; margin: 20px 0 10px; display: block; }
        .admin-card-list { display: grid; gap: 10px; margin-top: 15px; }
        .admin-item { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: white; }
        .admin-item-info { flex-grow: 1; }
        .admin-item-info b { display: block; font-size: 14px; margin-bottom: 2px; }
        .admin-item-info span { font-size: 11px; opacity: 0.7; }
        .admin-actions { display: flex; gap: 8px; }
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        
        .map-container { width: 100%; height: 150px; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 1px solid rgba(128,128,128,0.2); }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <span class="icon-btn" onclick="toggleInfo()">☰</span>
        <img src="logoo.png" alt="Logo" class="main-logo">
    </div>
    <div class="header-icons">
        <span class="icon-btn" onclick="toggleTheme()">🌗</span>
        <span class="icon-btn" onclick="abrirModal('loginModal')">👤</span>
        <span class="icon-btn" onclick="verificarAdmin()">⚙️</span>
        <div class="icon-btn" onclick="toggleCart()">🛒 <b id="cartCount" class="qty-badge">0</b></div>
    </div>
</header>

<section class="hero">
    <h1 style="color:white; font-weight:800; margin:0">MS47 DISTRIBUIDORA</h1>
</section>

<div class="cat-grid">
    <div class="cat-card active" id="cat-all" onclick="setSearch('')"><span>🌐</span><b>Todos</b></div>
    <div class="cat-card" id="cat-bebida" onclick="setSearch('bebida')"><span>🥤</span><b>Bebidas</b></div>
    <div class="cat-card" id="cat-snack" onclick="setSearch('snack')"><span>🍿</span><b>Snacks</b></div>
    <div class="cat-card" id="cat-almacen" onclick="setSearch('almacen')"><span>🥫</span><b>Almacén</b></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar producto..." onkeyup="render()">
</div>

<div class="products-grid" id="productsCont"></div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div id="infoDrawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="margin: 0; color: var(--accent);">Información</h2>
        <span onclick="toggleInfo()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div id="userBadge" style="display:none; background:rgba(16,185,129,0.1); padding:10px; border-radius:10px; color:var(--success); font-weight:bold; margin-bottom:15px; border:1px solid var(--success)">✓ MAYORISTA ACTIVO</div>
    
    <p>📍 <b>Belgrano 7102</b><br>Santa Fe Capital</p>
    <div class="map-container">
        <iframe width="100%" height="100%" frameborder="0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3406.467384168128!2d-60.6865039!3d-31.5936499!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95b9409866657905%3A0xb3679808a3d5483b!2sBelgrano%207102%2C%20S3006GAP%20Santa%20Fe!5e0!3m2!1ses-419!2sar!4v1700000000000" allowfullscreen></iframe>
    </div>

    <p>📞 <b>WhatsApp:</b><br>3434508948</p>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:12px; border-radius:10px; width:100%; cursor:pointer; margin-top:auto; font-weight: 700;">Cerrar Sesión</button>
</div>

<div id="cartDrawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="margin: 0;">Mi Pedido</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:24px">✕</span>
    </div>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto;"></div>
    <div style="border-top:1px solid rgba(128,128,128,0.2); padding-top:15px">
        <select id="deliveryMethod" onchange="toggleDeliveryForm()">
            <option value="retiro">Retiro en local</option>
            <option value="envio">Envío a domicilio</option>
        </select>
        <div id="deliveryForm" style="display:none">
            <input id="envioNombre" placeholder="Tu Nombre">
            <input id="envioDireccion" placeholder="Dirección">
        </div>
        <div id="cartTotalText" style="margin: 15px 0; font-weight:800; font-size:20px; color:var(--accent)">Total: $0</div>
        <button class="btn-add" style="width:100%; background:#25d366" onclick="enviarWhatsApp()">ENVIAR WHATSAPP</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">Panel Maestro</h2>
            <button onclick="closeAll()" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer">✕</button>
        </div>

        <span class="admin-section-title">Editor de Producto</span>
        <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid rgba(255,255,255,0.05)">
            <input type="hidden" id="editId">
            <input id="fNom" placeholder="Nombre del Producto">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <input id="fPre" type="number" placeholder="Precio Público ($)">
                <input id="fPreM" type="number" placeholder="Precio Mayor ($)">
            </div>
            <input id="fPromo" placeholder="Texto de Promo (Ej: 2x $5000)">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <input id="fCat" placeholder="Categoría">
                <input id="fStock" type="number" placeholder="Stock Actual">
            </div>
            <input id="fImg" placeholder="URL de la Imagen">
            <button class="btn-add" style="width:100%; margin-top:10px; height:50px; background:var(--success)" onclick="guardarProducto()">GUARDAR CAMBIOS</button>
        </div>

        <span class="admin-section-title">Inventario Actual</span>
        <div class="admin-card-list" id="adminProdsList">
            </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h2 style="text-align:center">Acceso Mayorista</h2>
        <input id="userInp" placeholder="Usuario">
        <input id="passInp" type="password" placeholder="Contraseña">
        <button class="btn-add" style="width:100%; margin-top:15px" onclick="checkLogin()">INGRESAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAqlchDsLHIMMbv6YL2ipggaShXlFqiW8",
        authDomain: "tienda-online-baaf6.firebaseapp.com",
        projectId: "tienda-online-baaf6",
        storageBucket: "tienda-online-baaf6.firebasestorage.app",
        messagingSenderId: "121093097347",
        appId: "1:121093097347:web:ca8ea54b592cb20f5098b6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let productos = [];
    let carrito = [];
    let esMayorista = localStorage.getItem("neo_may") === "true";

    db.collection("productos").onSnapshot(snap => { 
        productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
        render(); 
        renderAdminProds();
        if(esMayorista) document.getElementById("userBadge").style.display = "block";
    });

    function render() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cont = document.getElementById("productsCont");
        const filtrados = productos.filter(p => {
            const n = p.nombre.toLowerCase().includes(query);
            const c = p.categoria && p.categoria.toLowerCase() === query;
            return n || c;
        });

        cont.innerHTML = filtrados.map(p => {
            const outOfStock = p.stock <= 0;
            return `
            <div class="product-card" style="opacity: ${outOfStock ? '0.6' : '1'}">
                ${p.promo ? `<div class="promo-badge">${p.promo}</div>` : ''}
                <div class="stock-tag">${outOfStock ? 'AGOTADO' : 'Disponibles: '+p.stock}</div>
                <div class="img-box"><img src="${p.imagen || 'https://via.placeholder.com/150'}"></div>
                <div class="info-box">
                    <h4 class="product-title">${p.nombre}</h4>
                    <div class="price-val">$${esMayorista ? p.precio_may : p.precio}</div>
                    <button class="btn-add" ${outOfStock ? 'disabled' : ''} onclick="addToCart('${p.id}')">
                        ${outOfStock ? 'SIN STOCK' : 'AGREGAR'}
                    </button>
                </div>
            </div>`}).join("");
    }

    function addToCart(id) {
        const p = productos.find(x => x.id === id);
        const ex = carrito.find(c => c.id === id);
        if (p.stock <= 0) return alert("Producto agotado.");
        if(ex) {
            if (ex.qty >= p.stock) return alert("Límite de stock alcanzado.");
            ex.qty++; 
        } else { carrito.push({id, qty:1}); }
        updateCartUI();
    }

    function updateCartUI() {
        let total = 0, count = 0;
        const list = document.getElementById("cartItemsList");
        list.innerHTML = carrito.map(it => {
            const p = productos.find(x => x.id === it.id);
            const precio = esMayorista ? p.precio_may : p.precio;
            total += precio * it.qty; count += it.qty;
            return `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.1)">
                <div style="display:flex; justify-content:space-between"><b>${p.nombre}</b> <span>$${precio * it.qty}</span></div>
                <div style="margin-top:5px; font-size:12px; opacity:0.7">Cantidad: ${it.qty}</div>
            </div>`;
        }).join("");
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotalText").innerText = "Total: $" + total;
    }

    function checkLogin() {
        if(document.getElementById("userInp").value === "elnen" && document.getElementById("passInp").value === "mayorista") {
            localStorage.setItem("neo_may", "true");
            location.reload();
        } else alert("Datos incorrectos");
    }
    function logout() { localStorage.removeItem("neo_may"); location.reload(); }

    function verificarAdmin() { if(prompt("Clave de Administrador:") === "admin") abrirModal("adminModal"); }
    function abrirModal(id) { closeAll(); document.getElementById(id).style.display = "flex"; }
    
    async function guardarProducto() {
        const id = document.getElementById("editId").value;
        const d = { 
            nombre: document.getElementById("fNom").value, 
            precio: Number(document.getElementById("fPre").value), 
            precio_may: Number(document.getElementById("fPreM").value),
            promo: document.getElementById("fPromo").value,
            categoria: document.getElementById("fCat").value.toLowerCase(), 
            stock: Number(document.getElementById("fStock").value), 
            imagen: document.getElementById("fImg").value 
        };
        id ? await db.collection("productos").doc(id).update(d) : await db.collection("productos").add(d);
        document.getElementById("editId").value = "";
        document.querySelectorAll("#adminModal input").forEach(i => i.value = "");
        alert("¡Sistema Actualizado!");
    }

    function renderAdminProds() {
        const list = document.getElementById("adminProdsList");
        list.innerHTML = productos.map(p => `
            <div class="admin-item">
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                <div class="admin-item-info">
                    <b>${p.nombre}</b>
                    <span style="color:${p.stock < 5 ? 'var(--danger)' : 'inherit'}">Stock: ${p.stock} | $${p.precio}</span>
                </div>
                <div class="admin-actions">
                    <button class="btn-circle" style="background:var(--accent); color:white" onclick="editP('${p.id}')">✏️</button>
                    <button class="btn-circle" style="background:rgba(239, 68, 68, 0.1); color:var(--danger)" onclick="borrarP('${p.id}')">🗑️</button>
                </div>
            </div>
        `).join("");
    }

    async function borrarP(id) {
        if(confirm("¿Eliminar este producto definitivamente?")) {
            await db.collection("productos").doc(id).delete();
        }
    }

    function editP(id) {
        const p = productos.find(x => x.id === id);
        document.getElementById("editId").value = p.id;
        document.getElementById("fNom").value = p.nombre;
        document.getElementById("fPre").value = p.precio;
        document.getElementById("fPreM").value = p.precio_may;
        document.getElementById("fPromo").value = p.promo || "";
        document.getElementById("fCat").value = p.categoria || "";
        document.getElementById("fStock").value = p.stock || 0;
        document.getElementById("fImg").value = p.imagen || "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setSearch(val) {
        document.getElementById("searchInput").value = val;
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
        if(val === '') document.getElementById('cat-all').classList.add('active');
        else if(document.getElementById('cat-'+val)) document.getElementById('cat-'+val).classList.add('active');
        render();
    }

    function toggleInfo() { 
        document.getElementById("infoDrawer").classList.toggle("active"); 
        document.getElementById("mainOverlay").classList.toggle("active"); 
    }
    function toggleCart() { 
        document.getElementById("cartDrawer").classList.toggle("active"); 
        document.getElementById("mainOverlay").classList.toggle("active"); 
    }
    function closeAll() { 
        document.getElementById("infoDrawer").classList.remove("active");
        document.getElementById("cartDrawer").classList.remove("active");
        document.getElementById("mainOverlay").classList.remove("active");
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
    }

    function toggleTheme() { document.body.classList.toggle("light"); }
    function toggleDeliveryForm() { document.getElementById("deliveryForm").style.display = document.getElementById("deliveryMethod").value === "envio" ? "block" : "none"; }
    
    function enviarWhatsApp() {
        if(carrito.length === 0) return alert("Carrito vacío");
        let msg = "*NUEVO PEDIDO MS47*\n\n";
        const metodo = document.getElementById("deliveryMethod").value;
        if(metodo === "envio") {
            msg += `👤 *Cliente:* ${document.getElementById("envioNombre").value}\n`;
            msg += `📍 *Dirección:* ${document.getElementById("envioDireccion").value}\n\n`;
        } else { msg += `🏪 *Retiro en local*\n\n`; }
        carrito.forEach(it => {
            const p = productos.find(x => x.id === it.id);
            msg += `• ${p.nombre} (x${it.qty}) - $${(esMayorista ? p.precio_may : p.precio) * it.qty}\n`;
        });
        msg += `\n*TOTAL: ${document.getElementById("cartTotalText").innerText}*`;
        window.open(`https://wa.me/5493434508948?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
